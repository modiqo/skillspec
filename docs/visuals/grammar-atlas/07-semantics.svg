 y="191" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="12" fill="#7a4f33" text-anchor="middle">fold over rules</text><text x="872" y="192" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="14" fill="#b07a52">→</text><rect x="892" y="174" width="110" height="26" rx="3" fill="#eef0f2" stroke="#dbdee3"></rect><text x="947" y="191" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="12" fill="#41485c" text-anchor="middle">decision</text><text x="618" y="218" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="9.5" fill="#9298a4" font-weight="600">ACCUMULATOR</text><rect x="618" y="226" width="45.5" height="18" rx="3" fill="#f4f4f2" stroke="#dde0e4"></rect><text x="625" y="239" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="10" fill="#5a6072">route</text><rect x="668.5" y="226" width="83.3" height="18" rx="3" fill="#f4f4f2" stroke="#dde0e4"></rect><text x="675.5" y="239" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="10" fill="#5a6072">route_order</text><rect x="756.8" y="226" width="77" height="18" rx="3" fill="#f4f4f2" stroke="#dde0e4"></rect><text x="763.8" y="239" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="10" fill="#5a6072">forbid-set</text><rect x="838.8" y="226" width="70.69999999999999" height="18" rx="3" fill="#f4f4f2" stroke="#dde0e4"></rect><text x="845.8" y="239" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="10" fill="#5a6072">allow-map</text><rect x="914.5" y="226" width="64.4" height="18" rx="3" fill="#f4f4f2" stroke="#dde0e4"></rect><text x="921.5" y="239" font-family="&#39