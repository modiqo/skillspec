<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">SkillSpec makes a skill followable, testable, and provable</title>
  <desc id="desc">A chalkboard explainer showing a long skill manual being distilled into a contract, then followed by an agent through route, steps, checks, and proof.</desc>
  <defs>
    <filter id="chalk" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/>
    </filter>
    <filter id="boardDust" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="4"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.96 0 0 0 0 0.93 0 0 0 0 0.86 0 0 0 0.08 0"/>
    </filter>
    <style>
      .board { fill: #26302c; }
      .dust { opacity: 0.7; }
      .chalk { fill: none; stroke: #f2efe4; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; filter: url(#chalk); }
      .chalk-thin { fill: none; stroke: #f2efe4; stroke-width: 4.5; stroke-linecap: round; stroke-linejoin: round; filter: url(#chalk); }
      .chalk-fill { fill: #f2efe4; filter: url(#chalk); }
      .accent { fill: none; stroke: #f5a24b; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; filter: url(#chalk); }
      .accent-fill { fill: #f5a24b; filter: url(#chalk); }
      .ghost { fill: none; stroke: #f2efe4; stroke-width: 7; stroke-linecap: round; opacity: 0.12; filter: url(#chalk); }
      .label { fill: #f2efe4; font: 700 34px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; filter: url(#chalk); }
      .small { font-size: 24px; font-weight: 650; }
      .tiny { font-size: 19px; font-weight: 650; }
      .accent-text { fill: #f5a24b; }
    </style>
  </defs>
  <rect class="board" width="1200" height="820" rx="28"/>
  <rect class="dust" width="1200" height="820" filter="url(#boardDust)"/>
  <path class="ghost" d="M122 118c140-42 261-30 364 36"/>
  <path class="ghost" d="M802 644c78 38 170 42 278 12"/>
  <path class="chalk-thin" d="M58 64h1084M58 756h1084"/>

  <g transform="translate(86 128)">
