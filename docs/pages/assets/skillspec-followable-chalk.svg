    <path class="chalk-thin" d="M119 108h145M118 152h152M119 196h133M119 240h160M118 284h125M119 328h151M119 372h110"/>
    <path class="accent" d="M93 430c48-19 176-19 226 0"/>
    <text class="label small" x="82" y="548">long skill</text>
    <text class="label tiny" x="82" y="582">instructions, examples,</text>
    <text class="label tiny" x="82" y="610">rules, snippets, references</text>
