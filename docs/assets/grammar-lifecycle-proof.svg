<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 980" role="img" aria-labelledby="title desc">
  <title id="title">SkillSpec lifecycle and proof grammar</title>
  <desc id="desc">Visual lexical cards for states, commands, snippets, closures, tests, and proof metrics.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="0.8" flood-color="#8a7a60" flood-opacity="0.28"/>
    </filter>
    <style>
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #27313a; letter-spacing: 0; }
      .headline { font-size: 38px; font-weight: 760; }
      .subtitle { font-size: 18px; font-weight: 450; }
      .title { font-size: 22px; font-weight: 740; }
      .body { font-size: 16px; font-weight: 460; }
      .mono { font-family: "SFMono-Regular", Menlo, Consolas, ui-monospace, monospace; font-size: 14px; fill: #26313a; }
      .card { fill: #fbfaf6; stroke: #29323a; stroke-width: 2.4; filter: url(#shadow); }
      .blue { fill: #f7fbff; stroke: #29323a; stroke-width: 2.4; filter: url(#shadow); }
      .gold { fill: #fffaf0; stroke: #8a6c1f; stroke-width: 2.4; filter: url(#shadow); }
      .soft { fill: #f4efe4; stroke: #29323a; stroke-width: 2.1; }
      .line { stroke: #29323a; stroke-width: 2.2; fill: none; }
      .arrowhead { fill: #29323a; }
    </style>
  </defs>

  <rect width="1320" height="980" fill="#f7f2e8"/>
  <text class="label headline" x="660" y="68" text-anchor="middle">Lifecycle And Proof Grammar</text>
  <text class="label subtitle" x="660" y="102" text-anchor="middle">The sections that make lifecycle, commands, prose, closure work, scenario tests, and metrics inspectable.</text>

  <g transform="translate(70 164)">
    <rect class="blue" width="340" height="270" rx="12"/>
    <text class="label title" x="170" y="43" text-anchor="middle">STATES</text>
    <text class="mono" x="26" y="88">do? : command | action[]</text>
    <text class="mono" x="26" y="118">say? : snippet-id</text>
    <text class="mono" x="26" y="148">ask? : elicitation-id</text>
    <text class="mono" x="26" y="178">next? : state-id</text>
    <text class="mono" x="26" y="208">yes? / no? : state-id</text>
    <text class="label body" x="26" y="248">Visible lifecycle, not execution runtime.</text>
  </g>

  <g transform="translate(490 164)">
    <rect class="card" width="340" height="270" rx="12"/>
    <text class="label title" x="170" y="43" text-anchor="middle">COMMANDS</text>
    <text class="mono" x="26" y="88">template : string</text>
    <text class="mono" x="26" y="118">safety? : safety-class</text>
    <text class="mono" x="26" y="148">requires? : deps/resources</text>
    <text class="mono" x="26" y="178">parse? : mapping</text>
    <text class="mono" x="26" y="208">success_when? : mapping</text>
    <text class="label body" x="26" y="248">Instruction surface, not permission.</text>
  </g>

  <g transform="translate(910 164)">
    <rect class="gold" width="340" height="270" rx="12"/>
    <text class="label title" x="170" y="43" text-anchor="middle">SNIPPETS</text>
    <text class="mono" x="26" y="96">snippet.text : string</text>
    <rect class="soft" x="26" y="134" width="288" height="82" rx="8"/>
    <text class="label body" x="46" y="168">Questions, completion copy,</text>
    <text class="label body" x="46" y="196">and short explanations.</text>
  </g>

  <path class="line" d="M410 299 H476"/>
  <polygon class="arrowhead" points="490,299 476,292 476,306"/>
  <path class="line" d="M830 299 H896"/>
  <polygon class="arrowhead" points="910,299 896,292 896,306"/>

  <g transform="translate(120 560)">
    <rect class="gold" width="320" height="250" rx="12"/>
    <text class="label title" x="160" y="43" text-anchor="middle">CLOSURES</text>
    <text class="mono" x="26" y="92">closures : mapping</text>
    <text class="label body" x="26" y="144">Post-task behavior:</text>
    <text class="label body" x="26" y="170">summaries, digest writing,</text>
    <text class="label body" x="26" y="196">remember/share prompts,</text>
    <text class="label body" x="26" y="222">and proof obligations.</text>
  </g>

  <g transform="translate(500 560)">
    <rect class="blue" width="320" height="250" rx="12"/>
    <text class="label title" x="160" y="43" text-anchor="middle">TESTS</text>
    <text class="mono" x="26" y="88">name : string</text>
    <text class="mono" x="26" y="116">input : string</text>
    <text class="mono" x="26" y="144">expect.route?</text>
    <text class="mono" x="26" y="172">expect.forbid? / not_forbid?</text>
    <text class="mono" x="26" y="200">expect.elicit? / matched_rules?</text>
  </g>

  <g transform="translate(880 560)">
    <rect class="card" width="320" height="250" rx="12"/>
    <text class="label title" x="160" y="43" text-anchor="middle">PROOF</text>
    <text class="mono" x="26" y="96">proof.metrics : metric-id[]</text>
    <rect class="soft" x="26" y="138" width="268" height="80" rx="8"/>
    <text class="label body" x="46" y="170">What the policy is trying</text>
    <text class="label body" x="46" y="198">to improve or measure.</text>
  </g>

  <path class="line" d="M440 685 H486"/>
  <polygon class="arrowhead" points="500,685 486,678 486,692"/>
  <path class="line" d="M820 685 H866"/>
  <polygon class="arrowhead" points="880,685 866,678 866,692"/>

  <text class="label subtitle" x="660" y="900" text-anchor="middle">Tests prove steering behavior. Proof metrics name the value the skill should improve.</text>
</svg>

