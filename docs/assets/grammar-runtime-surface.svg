<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1420 1060" role="img" aria-labelledby="title desc">
  <title id="title">SkillSpec runtime surface grammar</title>
  <desc id="desc">Visual lexical cards for trace, dependencies, imports, resources, code, artifacts, and recipes.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="0.8" flood-color="#8a7a60" flood-opacity="0.28"/>
    </filter>
    <style>
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #27313a; letter-spacing: 0; }
      .headline { font-size: 38px; font-weight: 760; }
      .subtitle { font-size: 18px; font-weight: 450; }
      .title { font-size: 22px; font-weight: 740; }
      .body { font-size: 16px; font-weight: 460; }
      .mono { font-family: "SFMono-Regular", Menlo, Consolas, ui-monospace, monospace; font-size: 14px; fill: #26313a; }
      .card { fill: #fbfaf6; stroke: #29323a; stroke-width: 2.4; filter: url(#shadow); }
      .blue { fill: #f7fbff; stroke: #29323a; stroke-width: 2.4; filter: url(#shadow); }
      .gold { fill: #fffaf0; stroke: #8a6c1f; stroke-width: 2.4; filter: url(#shadow); }
      .soft { fill: #f4efe4; stroke: #29323a; stroke-width: 2.1; }
      .line { stroke: #29323a; stroke-width: 2.2; fill: none; }
      .arrowhead { fill: #29323a; }
    </style>
  </defs>

  <rect width="1420" height="1060" fill="#f7f2e8"/>
  <text class="label headline" x="710" y="68" text-anchor="middle">Runtime Surface Grammar</text>
  <text class="label subtitle" x="710" y="102" text-anchor="middle">The sections that name evidence, prerequisites, loadable guidance, source material, executable knowledge, and dataflow.</text>

  <g transform="translate(70 164)">
    <rect class="gold" width="300" height="266" rx="12"/>
    <text class="label title" x="150" y="43" text-anchor="middle">TRACE</text>
    <text class="mono" x="24" y="88">mode : event_log</text>
    <text class="mono" x="24" y="116">required? : boolean</text>
    <text class="mono" x="24" y="144">record? : event-kind[]</text>
    <text class="mono" x="24" y="190">route_selected</text>
    <text class="mono" x="24" y="216">rule_matched</text>
    <text class="mono" x="24" y="242">outcome_recorded</text>
  </g>

  <g transform="translate(410 164)">
    <rect class="blue" width="300" height="266" rx="12"/>
    <text class="label title" x="150" y="43" text-anchor="middle">DEPENDENCIES</text>
    <text class="mono" x="24" y="88">kind : cli | file | env</text>
    <text class="mono" x="24" y="116">     | package | service</text>
    <text class="mono" x="24" y="144">     | adapter | browser</text>
    <text class="mono" x="24" y="190">check?</text>
    <text class="mono" x="24" y="216">permission?</text>
    <text class="mono" x="24" y="242">provision?</text>
  </g>

  <g transform="translate(750 164)">
    <rect class="card" width="300" height="266" rx="12"/>
    <text class="label title" x="150" y="43" text-anchor="middle">IMPORTS</text>
    <text class="mono" x="24" y="88">path : string</text>
    <text class="mono" x="24" y="116">role : policy | reference</text>
    <text class="mono" x="24" y="144">     | procedure | example</text>
    <text class="mono" x="24" y="172">load : always | on_demand</text>
    <text class="mono" x="24" y="200">requires.imports[]</text>
    <text class="mono" x="24" y="228">used_by[]</text>
  </g>

  <g transform="translate(1090 164)">
    <rect class="card" width="260" height="266" rx="12"/>
    <text class="label title" x="130" y="43" text-anchor="middle">RESOURCES</text>
    <text class="mono" x="24" y="88">path : string</text>
    <text class="mono" x="24" y="116">role : source_material</text>
    <text class="mono" x="24" y="144">     | script | asset</text>
    <text class="mono" x="24" y="190">used_by[]</text>
    <text class="mono" x="24" y="216">load_when[]</text>
  </g>

  <path class="line" d="M370 297 H396"/>
  <polygon class="arrowhead" points="410,297 396,290 396,304"/>
  <path class="line" d="M710 297 H736"/>
  <polygon class="arrowhead" points="750,297 736,290 736,304"/>
  <path class="line" d="M1050 297 H1076"/>
  <polygon class="arrowhead" points="1090,297 1076,290 1076,304"/>

  <g transform="translate(142 552)">
    <rect class="blue" width="340" height="304" rx="12"/>
    <text class="label title" x="170" y="43" text-anchor="middle">CODE</text>
    <text class="mono" x="26" y="88">language : string</text>
    <text class="mono" x="26" y="114">kind : runnable_script | probe</text>
    <text class="mono" x="26" y="140">     | transform | validator</text>
    <text class="mono" x="26" y="166">source : inline | file</text>
    <text class="mono" x="26" y="192">provenance? : resource | import</text>
    <text class="mono" x="26" y="218">requires?</text>
    <text class="mono" x="26" y="244">inputs[] / outputs[]</text>
  </g>

  <g transform="translate(540 552)">
    <rect class="gold" width="340" height="304" rx="12"/>
    <text class="label title" x="170" y="43" text-anchor="middle">ARTIFACTS</text>
    <text class="mono" x="26" y="88">kind : file | directory | json</text>
    <text class="mono" x="26" y="114">     | image | pdf | report</text>
    <text class="mono" x="26" y="160">path? : string</text>
    <text class="mono" x="26" y="186">schema? : value</text>
    <text class="mono" x="26" y="232">produced_by[]</text>
    <text class="mono" x="26" y="258">consumed_by[]</text>
  </g>

  <g transform="translate(938 552)">
    <rect class="card" width="340" height="304" rx="12"/>
    <text class="label title" x="170" y="43" text-anchor="middle">RECIPES</text>
    <text class="mono" x="26" y="88">ordered? : boolean</text>
    <text class="mono" x="26" y="114">requires? : imports/resources</text>
    <text class="mono" x="26" y="140">          dependencies/artifacts</text>
    <text class="mono" x="26" y="186">steps : load_import | run_command</text>
    <text class="mono" x="26" y="212">      | run_code | ask</text>
    <text class="mono" x="26" y="238">      | branch | note</text>
  </g>

  <path class="line" d="M482 704 H526"/>
  <polygon class="arrowhead" points="540,704 526,697 526,711"/>
  <path class="line" d="M880 704 H924"/>
  <polygon class="arrowhead" points="938,704 924,697 924,711"/>
  <path class="line" d="M900 430 C900 492 740 532 482 612"/>
  <polygon class="arrowhead" points="482,612 497,601 501,616"/>

  <text class="label subtitle" x="710" y="956" text-anchor="middle">Imports are runtime-loadable guidance. Resources are provenance and support. Artifacts make dataflow explicit.</text>
</svg>

