<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="728" viewBox="0 0 1180 728" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace"><defs><pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse"><path d="M26 0H0V26" fill="none" stroke="#e7e7e3" stroke-width="1"></path></pattern><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0L6 3L0 6z" fill="#7a8090"></path></marker></defs><rect width="1180" height="728" fill="#f7f7f4"></rect><rect width="1180" height="728" fill="url(#grid)"></rect><line x1="36" y1="30" x2="1144" y2="30" stroke="#2f3545" stroke-width="2"></line><text x="36" y="24" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="10" fill="#9298a4" font-weight="500">SKILLSPEC/V0 · GRAMMAR ATLAS</text><text x="1144" y="24" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="10" fill="#9298a4" font-weight="500" text-anchor="end">PLATE 10</text><text x="36" y="62" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="24" fill="#854a72" font-weight="600">Dataflow &amp; Loading</text><text x="315" y="62" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12" fill="#6a7080">How artifacts flow and how imports/resources become reachable</text><rect x="36" y="74" width="1108" height="4" rx="2" fill="#a86593"></rect><rect x="36" y="104" width="1108" height="200" rx="4" fill="#ffffff" stroke="#dadade"></rect><text x="54" y="132" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="15" fill="#854a72" font-weight="600">Artifact dataflow</text><text x="54" y="150" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="11" fill="#6a7080">Code, commands, and recipes name the files &amp; data products they read and write — dataflow without a workflow engine.</text><rect x="96" y="178" width="120" height="26" rx="4" fill="#e9f5ef" stroke="#cfe1d6"></rect><text x="156" y="195" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="12" fill="#3a7a58" text-anchor="middle">command</text><rect x="96" y="212" width="120" height="26" rx="4" fill="#e9f5ef" stroke="#cfe1d6"></rect><text x="156" y="229" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="12" fill="#3a7a58" text-anchor="middle">code</text><rect x="96" y="246" width="120" height="26" rx="4" fill="#e9f5ef" stroke="#cfe1d6"></rect><text x="156" y="263" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="12" fill="#3a7a58" text-anchor="middle">recipe</text><rect x="386" y="192" width="150" height="72" rx="6" fill="#f6eef3" stroke="#e3c9da"></rect><rect x="386" y="192" width="4" height="72" rx="2" fill="#a86593"></rect><text x="464" y="214" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="14" fill="#854a72" font-weight="600" text-anchor="middle">artifact</text><text x="464" y="234" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="10" fill="#8a7384" text-anchor="middle">file·json·report</text><text x="464" y="252" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="10" fill="#8a7384" text-anchor="middle">… image·pdf</text><rect x="964" y="178" width="120" height="26" rx="4" fill="#e9f5ef" stroke="#cfe1d6"></rect><text x="1024" y="195" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="12" fill="#3a7a58" text-anchor="middle">command</text><rect x="964" y="212" width="120" height="26" rx="4" fill="#e9f5ef" stroke="#cfe1d6"></rect><text x="1024" y="229" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="12" fill="#3a7a58" text-anchor="middle">code</text><rect x="964" y="246" width="120" height="26" rx="4" fill="#e9f5ef" stroke="#cfe1d6"></rect><text x="1024" y="263" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="12" fill="#3a7a58" text-anchor="middle">recipe</text><path d="M221 222 C 336 222, 276 222, 382 222" fill="none" stroke="#7a8090" stroke-width="1.4" marker-end="url(#arr)"></path><path d="M538 222 C 656 222, 844 222, 960 222" fill="none" stroke="#7a8090" stroke-width="1.4" marker-end="url(#arr)"></path><text x="220" y="205" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="11" fill="#6a7080">produced_by → ExecRef</text><text x="666" y="212" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="11" fill="#6a7080">consumed_by → ExecRef</text><text x="96" y="286" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="9.5" fill="#9298a4" font-weight="600">PRODUCERS</text><text x="964" y="286" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="9.5" fill="#9298a4" font-weight="600">CONSUMERS</text><rect x="36" y="322" width="545" height="232" rx="4" fill="#ffffff" stroke="#dadade"></rect><text x="54" y="350" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="15" fill="#854a72" font-weight="600">Import / resource loading</text><text x="54" y="368" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="11" fill="#6a7080">When instruction material enters the agent context.</text><rect x="54" y="394" width="150" height="24" rx="3" fill="#eef4ef" stroke="#cfe1d6"></rect><text x="64" y="410" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#3a7a58">load: always</text><text x="216" y="410" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="10.5" fill="#6a7080">loaded after spec, before actions</text><rect x="54" y="428" width="180" height="24" rx="3" fill="#f6eef3" stroke="#e3c9da"></rect><text x="64" y="444" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72">load: on_demand</text><text x="246" y="444" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="10.5" fill="#6a7080">reachable only via ↓</text><text x="76" y="472" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#41485c">• used_by  → target it names</text><text x="76" y="493" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#41485c">• requires.imports  (nested, DAG)</text><text x="76" y="514" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#41485c">• Code.requires.imports / .resources</text><text x="76" y="535" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#41485c">• Recipe.requires.* / load_import step</text><line x1="54" y1="546" x2="563" y2="546" stroke="#e4e4e6"></line><text x="54" y="566" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="11" fill="#8a4f30" font-style="italic">Orphan (no incoming ref, no used_by) ⇒ invalid.</text><rect x="599" y="322" width="545" height="232" rx="4" fill="#ffffff" stroke="#dadade"></rect><text x="617" y="350" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="15" fill="#854a72" font-weight="600">requires.imports is a DAG</text><text x="617" y="368" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="11" fill="#6a7080">Nested imports are explicit; load required imports first (topological). Cycles are invalid.</text><rect x="639" y="414" width="96" height="26" rx="4" fill="#f6eef3" stroke="#e3c9da"></rect><text x="687" y="431" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72" text-anchor="middle">policy</text><rect x="789" y="386" width="96" height="26" rx="4" fill="#f6eef3" stroke="#e3c9da"></rect><text x="837" y="403" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72" text-anchor="middle">glossary</text><rect x="789" y="442" width="96" height="26" rx="4" fill="#f6eef3" stroke="#e3c9da"></rect><text x="837" y="459" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72" text-anchor="middle">examples</text><rect x="939" y="414" width="96" height="26" rx="4" fill="#f6eef3" stroke="#e3c9da"></rect><text x="987" y="431" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72" text-anchor="middle">INDEX</text><path d="M735 427 L789 399" stroke="#7a8090" stroke-width="1.3" marker-end="url(#arr)"></path><path d="M735 427 L789 455" stroke="#7a8090" stroke-width="1.3" marker-end="url(#arr)"></path><path d="M885 399 L939 419" stroke="#7a8090" stroke-width="1.3" marker-end="url(#arr)"></path><path d="M885 455 L939 435" stroke="#7a8090" stroke-width="1.3" marker-end="url(#arr)"></path><text x="617" y="510" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="11" fill="#6a7080">load order →  INDEX, glossary, examples, then policy</text><text x="617" y="530" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="10.5" fill="#9298a4" font-style="italic">(dependency-first; siblings follow requires.imports order)</text><rect x="36" y="572" width="1108" height="120" rx="4" fill="#ffffff" stroke="#dadade"></rect><text x="54" y="600" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="15" fill="#854a72" font-weight="600">Recipe steps</text><text x="54" y="618" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="11" fill="#6a7080">A recipe is an ordered procedure; each step is exactly one verb (⊻). Validated, never executed.</text><rect x="54" y="634" width="95" height="24" rx="4" fill="#f6eef3" stroke="#e3c9da"></rect><text x="63" y="650" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72">load_import</text><rect x="157" y="634" width="109" height="24" rx="4" fill="#f6eef3" stroke="#e3c9da"></rect><text x="166" y="650" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72">load_resource</text><rect x="274" y="634" width="95" height="24" rx="4" fill="#f6eef3" stroke="#e3c9da"></rect><text x="283" y="650" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72">run_command</text><rect x="377" y="634" width="74" height="24" rx="4" fill="#f6eef3" stroke="#e3c9da"></rect><text x="386" y="650" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72">run_code</text><rect x="459" y="634" width="130" height="24" rx="4" fill="#f6eef3" stroke="#e3c9da"></rect><text x="468" y="650" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72">produce_artifact</text><rect x="597" y="634" width="130" height="24" rx="4" fill="#f6eef3" stroke="#e3c9da"></rect><text x="606" y="650" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72">consume_artifact</text><rect x="735" y="634" width="39" height="24" rx="4" fill="#f6eef3" stroke="#e3c9da"></rect><text x="744" y="650" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72">ask</text><rect x="782" y="634" width="60" height="24" rx="4" fill="#f6eef3" stroke="#e3c9da"></rect><text x="791" y="650" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72">branch</text><rect x="850" y="634" width="46" height="24" rx="4" fill="#f6eef3" stroke="#e3c9da"></rect><text x="859" y="650" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="11" fill="#854a72">note</text><text x="908" y="650" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="10.5" fill="#8a4f30" font-style="italic">⊻ exactly one per step</text></svg>