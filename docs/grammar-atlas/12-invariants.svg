<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace"><defs><pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse"><path d="M26 0H0V26" fill="none" stroke="#e7e7e3" stroke-width="1"></path></pattern><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0L6 3L0 6z" fill="#7a8090"></path></marker></defs><rect width="1180" height="520" fill="#f7f7f4"></rect><rect width="1180" height="520" fill="url(#grid)"></rect><line x1="36" y1="30" x2="1144" y2="30" stroke="#2f3545" stroke-width="2"></line><text x="36" y="24" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="10" fill="#9298a4" font-weight="500">SKILLSPEC/V0 · GRAMMAR ATLAS</text><text x="1144" y="24" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="10" fill="#9298a4" font-weight="500" text-anchor="end">PLATE 12</text><text x="36" y="62" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="24" fill="#6f6328" font-weight="600">Invariants</text><text x="199" y="62" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12" fill="#6a7080">Well-formedness rules the v0 CLI enforces</text><rect x="36" y="74" width="1108" height="4" rx="2" fill="#9a8a3e"></rect><rect x="36" y="104" width="542" height="34" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="52" y="128" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="72" y="126" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">Identifiers are stable API — human labels can change, ids should not churn.</text><rect x="36" y="148" width="542" height="46" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="52" y="172" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="72" y="170" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">Rules are evaluated in file order; effects are additive except prefer (sets</text><text x="72" y="186" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">route) and route_order (replaces order).</text><rect x="36" y="204" width="542" height="46" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="52" y="228" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="72" y="226" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">Every on-demand import must be reachable: used_by, requires.imports,</text><text x="72" y="242" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">Code/Recipe requires.imports, or a load_import step.</text><rect x="36" y="260" width="542" height="46" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="52" y="284" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="72" y="282" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">Code.provenance declares exactly one of resource | import; Code.source is</text><text x="72" y="298" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">exactly one of inline | file.</text><rect x="36" y="316" width="542" height="46" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="52" y="340" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="72" y="338" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">Command ids from State.do and Rule.after_success must exist in commands or</text><text x="72" y="354" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">closures.</text><rect x="36" y="372" width="542" height="46" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="52" y="396" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="72" y="394" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">Trace.record items must be valid v0 trace-event kinds; empty record lets the</text><text x="72" y="410" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">evaluator record all.</text><rect x="36" y="428" width="542" height="34" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="52" y="452" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="72" y="450" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">Typed objects are strict — unknown fields are invalid.</text><rect x="602" y="104" width="542" height="46" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="618" y="128" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="638" y="126" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">References are symbolic; a document is well-formed only when every reference</text><text x="638" y="142" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">resolves to an existing id.</text><rect x="602" y="160" width="542" height="46" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="618" y="184" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="638" y="182" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">import.requires.imports forms a directed acyclic graph — cycles are invalid;</text><text x="638" y="198" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">load required imports first (topological order).</text><rect x="602" y="216" width="542" height="46" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="618" y="240" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="638" y="238" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">Every resource must be referenced by code/recipe or declare used_by — an</text><text x="638" y="254" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">orphan resource is invalid.</text><rect x="602" y="272" width="542" height="46" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="618" y="296" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="638" y="294" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">Elicitation.default and choice references must resolve to existing choices /</text><text x="638" y="310" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">routes / states.</text><rect x="602" y="328" width="542" height="46" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="618" y="352" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="638" y="350" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">Artifact producer / consumer refs must point at an existing command, code</text><text x="638" y="366" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">block, or recipe.</text><rect x="602" y="384" width="542" height="34" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="618" y="408" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="638" y="406" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">Every scenario test declares at least one concrete expectation.</text><rect x="602" y="428" width="542" height="46" rx="4" fill="#ffffff" stroke="#e6ddc4"></rect><text x="618" y="452" font-family="&#39;IBM Plex Mono&#39;,ui-monospace,&#39;SFMono-Regular&#39;,Menlo,Consolas,monospace" font-size="13" fill="#4e9b73" font-weight="600">✓</text><text x="638" y="450" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">Open surfaces may carry arbitrary values: metadata, allow, choice.sets,</text><text x="638" y="466" font-family="&#39;IBM Plex Sans&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" font-size="12.5" fill="#41485c">artifact.schema, command.success_when, closures.</text></svg>