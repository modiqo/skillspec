review_required:
  - Execution evidence remains unproven until the generated skill runs a real user task end-to-end through the target harness.
  - Remote staging assumes a public GitHub source; private repositories and non-GitHub archives need explicit auth/source handling.
  - Remote source-map requests for one atomic skill may use `skillspec source map <uri> --out <draft>/.skillspec/source-map`, which performs SkillSpec-owned URI staging and reports the local source_path. Remote import/port requests that may be repo/workspace/plugin shaped must use `skillspec source stage <uri> --json` first; repo-root staging preserves plugin metadata and shared folders, explicit subfolder staging stays scoped to the requested folder, and source_shape.kind is authoritative for staged_source_path. Web search, raw GitHub fetching, and ad hoc sparse-checkout probing are troubleshooting paths only after SkillSpec staging fails and the user approves.
  - durable-executor is optional and not assumed to be bundled with router mode; install requires an explicit local durable-executor source folder, and remote sources must be staged before lifecycle install.
  - Observed-workspace spec creation is a rote-specific optional integration; it depends on the quality of the durable rote workspace log and should mark inferred behavior in the coverage matrix.
  - The value-report command is the intended UX surface; until implemented as a native CLI command, the harness must synthesize the report from sensemake, test, deps, imports, decide, and align outputs.
  - Mechanical import now generates a scaffolded deps.toml and declares it as a file dependency/artifact; the prompt import loop must inspect, complete, and review deps.toml before proof, compile, install, or release.
  - The optional Claude compile/install path should be verified in a Claude-compatible harness before release claims.
