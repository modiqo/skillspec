  priority: domain
applies_when:
  - user_intent:
      - run SkillSpec post-install setup inside the harness prompt
      - inspect the shape of a skill, skill folder, repository, or URL without importing it
      - convert a prose SKILL.md to skill.spec.yml
      - port a local skill folder into SkillSpec
      - run one-shot porting for one atomic skill package
      - map a skills repository that contains multiple SKILL.md packages before import
      - map a plugin-shaped skills repository without flattening repeated skill names
      - validate a multi-skill workspace graph before fanout import
      - fanout-import a validated workspace graph into one generated package draft per atomic skill
      - converge generated workspace package drafts against the workspace graph before compile or install
      - compile converged workspace package drafts into harness-ready SKILL.md loaders without installing them
      - dry-run or install compiled workspace packages into harness roots using install_slug folders and collision proof
      - detect cross-skill references, shared standards packages, and skill dependency edges
      - import a public GitHub skill into SkillSpec
      - import an existing prose skill from a local folder or public URI
      - diagnose reliability debt and context burden in a prose skill before porting
      - preserve imported dependency evidence, package authority, install risk, and missing dependency proof gaps
      - inspect installed SkillSpec status, lifecycle state, roots, router index state, and skill inventory
      - install skill-router after SkillSpec is installed
      - install router mode after SkillSpec is installed
      - update, enable, disable, or repair an installed skill-router mode
      - install durable-executor as an optional first-hop skill
      - update, enable, disable, or delete a managed durable-executor install
      - create a SkillSpec skill by observing a durable-executor rote-exec workspace
      - revise an existing SkillSpec-backed skill
      - add phase planning and progress tracking to a SkillSpec-backed skill
      - compile and optionally install a reviewed SkillSpec-backed skill
      - replace an existing active prose skill with a reviewed SkillSpec-backed skill without leaving both discoverable
      - run proof or value reporting for a ported skill
entry:
  prompt: Multiplex SkillSpec setup inside the harness prompt. Teach the harness the current grammar, choose the right route, answer read-only assess/source-shape questions with doctor and doctor checklist only, run assessment as the first gate for import requests, stop import requests before harness mutation while offering an install dry-run option, map multi-skill and plugin-shaped workspaces before import, drive semantic imports through shape-specific import checklist stages, choose sequential phase gates versus isolated package fanout deliberately, stage or map single-skill sources, treat install requests for raw sources as assess plus import plus compile plus dry-run plus approved install, install compiled workspaces only after dry-run proof, install router or optional durable-executor only through reviewed commands, prefer compact summaries and handles over full reports in chat, observe durable workspaces when requested, then validate, phase-plan, record progress evidence, and prove value before install.
  decision_required: true
  forbid_before_decision:
    - edit_yaml_from_memory
    - skip_grammar_sensemake
    - import_without_reading_source_skill
    - install_before_dependency_surface_approval
    - claim_unproven_execution_evidence
    - consult_existing_ports_without_user_request
    - consult_repo_history_without_user_request
    - consult_memory_or_prior_examples_without_user_request
    - drop_imported_dependency_mentions
    - work_around_missing_dependency_without_waiver
    - claim_partial_dependency_proof_as_full
    - leave_old_and_new_skill_discoverable_without_user_choice
    - use_generic_skill_installer_for_skillspec_install
    - copy_raw_skill_md_as_skillspec_install
    - treat_harness_availability_as_skillspec_install
    - bulk_promote_scaffolds_without_package_checklist
    - apply_yaml_generator_across_packages
    - parallelize_dependency_bound_or_mutating_phases
    - load_full_reports_when_summary_suffices
    - claim_token_savings_without_metrics
  tool_boundary:
    default: deny
    allow:
      - skillspec_cli
      - skillspec_grammar_commands
      - local_skill_files
      - local_repo_files
      - git
      - cargo
      - rote_workspace
      - declared_commands_dependencies_imports_resources
    forbid:
      - edit_yaml_from_memory
      - skip_grammar_sensemake
      - install_before_dependency_surface_approval
      - claim_unproven_execution_evidence
      - consult_existing_ports_without_user_request
      - consult_repo_history_without_user_request
      - consult_memory_or_prior_examples_without_user_request
      - parallelize_dependency_bound_or_mutating_phases
      - load_full_reports_when_summary_suffices
      - claim_token_savings_without_metrics
    permission_required_for:
      - any_unlisted_tool
      - any_forbidden_action
      - any_new_data_source
      - any_new_execution_substrate
      - any_new_provider_or_adapter
      - any_external_side_effect
routes:
  - id: inspect_source_shape
    label: Inspect source shape
    rank: 12
    description: Use when the user asks what shape a skill, skill folder, repository, or URL has, or asks to run doctor without requesting import, port, compile, install, or proof.
    execution_plan:
      mode: ordered
      reason: Shape inspection is a read-only diagnostic gate. It should run doctor, report simple_skill, entry_skill_with_subskills, multi_skill_workspace, plugin_workspace, or non_skill_repository, and stop before source-map, import, mutation, progress-ledger, or alignment proof work.
      phases:
        - id: run_shape_doctor
          owner_skill: skillspec
          description: Run skillspec doctor on the supplied local folder, skill folder, or public GitHub repo URI and capture the shape report.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_skill_files
              - local_repo_files
              - git
            permission_required_for:
              - network_access
              - any_unlisted_tool
          requires:
            - doctor_source_shape
            - doctor_checklist_entry
          forbid:
            - source_map_create
            - source_map_coverage
            - source_map_nodes
            - source_map_dependencies
            - source_map_code
            - source_map_stale
            - progress_record_phase
            - progress_record_requirement
            - progress_checkpoint
            - progress_batch
            - trace_align
            - port_one_shot_or_manual_import
            - import_skill_draft
            - workspace_import_packages
            - workspace_converge_build
            - workspace_compile_build
            - workspace_install_packages
            - workspace_install_apply_visibility
            - install_skill
            - install_dry_run
            - install_from_remote_checkout
            - execute_imported_snippets_during_staging
        - id: report_shape
          owner_skill: skillspec
          description: Explain the detected shape, the recommended next command, and whether full structural scoring ran or stopped as shape_only.
          requires:
            - report_source_shape
          forbid:
            - source_map_create
            - source_map_coverage
            - source_map_nodes
            - source_map_dependencies
            - source_map_code
            - source_map_stale
            - progress_record_phase
            - progress_record_requirement
            - progress_checkpoint
            - progress_batch
            - trace_align
            - port_one_shot_or_manual_import
            - import_skill_draft
            - workspace_import_packages
            - workspace_compile_build
            - workspace_install_packages
            - install_skill
            - install_dry_run
  - id: local_skill_port
    label: Port local skill
    rank: 1
    description: Use when source-shape recon proves exactly one atomic local prose skill package. If the source has multiple SKILL.md files, plugin markers, cross-skill references, or an existing reviewed skill.spec.yml, route to workspace or revision instead.
    execution_plan:
      mode: ordered
      reason: Local ports need source-shape classification, source preservation, grammar preflight, a mechanical draft, semantic promotion, QA, and a value report. One-shot is allowed only after recon confirms a single atomic prose package.
      phases:
        - id: resolve_local_source
          owner_skill: skillspec
          description: Resolve the user-supplied local path, classify the source shape, and preserve package-local sibling resources. Use one-shot only for exactly one SKILL.md with no workspace/plugin markers; hand multi-skill, cross-referenced, or plugin-shaped roots to workspace map; hand existing reviewed skill.spec.yml changes to the revision route.
          requires:
            - decide_import_mode_from_source_shape
            - inventory_source_folder
            - doctor_source_skill
            - source_map_create
            - source_map_coverage
            - source_map_nodes
            - source_map_dependencies
            - source_map_code
            - source_map_stale
          forbid:
            - copy_only_skill_md_when_resources_exist
            - load_large_source_without_source_map
            - use_port_one_shot_without_shape_recon
            - use_port_one_shot_for_workspace_root
            - use_port_one_shot_for_plugin_root
            - revise_existing_spec_through_import
        - id: grammar_preflight
          owner_skill: skillspec
          description: Run the grammar sensemaking and checklist commands before import or YAML editing.
          tool_boundary:
            allow:
              - skillspec_cli
              - skillspec_grammar_commands
              - local_skill_files
            permission_required_for:
              - any_grammar_source_outside_embedded_runtime_artifacts
          requires:
            - grammar_sensemake_index
            - grammar_sensemake_porting
            - grammar_checklist_import
          forbid:
            - infer_grammar_from_memory
        - id: mechanical_import
          owner_skill: skillspec
          description: Generate and inspect the draft spec without treating it as final truth. Run port-one-shot only when source-shape recon has proven one atomic prose package; otherwise stop and switch to workspace or revision flow.
          requires:
            - port_one_shot_or_manual_import
            - import_skill_draft
            - sensemake_draft
            - produce_mechanical_draft
          forbid:
            - port_one_shot_for_multi_skill_workspace
            - port_one_shot_for_plugin_workspace
            - port_one_shot_for_existing_reviewed_spec
        - id: semantic_promotion
          owner_skill: skillspec
          description: Guide the agent through a small source-backed promotion pass instead of auto-filling the scaffold. Fill the coverage matrix from the current source only, split source code into package-local resources/code entries, and promote only evidenced activation, routes, rules, deps, imports, resources, artifacts, commands, recipes, states, closures, tests, and review notes. Quote YAML string scalars that contain colon-space, especially elicitation questions, descriptions, steps[].note, recipe/procedure notes, and review notes. Use artifact produced_by/consumed_by only for command, code, or recipe refs; do not attach artifacts directly to routes or rules.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_skill_files
              - local_repo_files
              - file_edit_tool
              - declared_commands_dependencies_imports_resources
            permission_required_for:
              - any_unlisted_tool
              - any_new_data_source
              - install_or_release_side_effect
          requires:
            - fill_coverage_matrix
            - promote_only_source_backed_behavior
            - split_source_code_into_resources
            - review_and_promote_draft
            - produce_reviewed_spec
          forbid:
            - auto_fill_scaffold_from_inference
            - guess_routes_rules_or_tests
            - leave_colon_strings_unquoted
            - use_route_or_rule_as_artifact_consumer
            - consult_existing_ports_without_user_request
            - consult_repo_history_without_user_request
            - consult_memory_or_prior_examples_without_user_request
        - id: qa_and_proof
          owner_skill: skillspec
          description: Validate, test, check imports and dependencies, run a demo phase plan/action checklist, record progress evidence, and align the trace.
          tool_boundary:
            allow:
              - skillspec_cli
              - cargo
              - local_repo_files
              - local_trace_files
            permission_required_for:
              - install_or_release_side_effect
              - network_access
              - any_unlisted_tool
          requires:
            - run_structural_qa
            - plan_phase_order
            - act_named_phase
            - progress_show
            - prove_value
        - id: report_value
          owner_skill: skillspec
          description: Print the value report and contract-quality grades.
          requires:
            - generate_value_report
  - id: remote_skill_port
    label: Port remote skill
    rank: 2
    description: Use when the source is an owner/repo shorthand, GitHub URL, owner/repo/path, or GitHub tree URL.
    execution_plan:
      mode: ordered
      phases:
        - id: approve_remote_source
          owner_skill: skillspec
          requires:
            - approve_remote_source_access
        - id: stage_remote_source
          owner_skill: skillspec
          requires:
            - stage_remote_folder
          forbid:
            - install_from_remote_checkout
            - execute_imported_snippets_during_staging
            - web_search_for_remote_source
            - fetch_raw_github_skill_md_for_import
        - id: continue_as_local_port
          owner_skill: skillspec
          description: Continue only when source-shape recon proves the staged remote source is one atomic skill package. If the staged source is a parent folder, multi-skill workspace, or plugin-shaped skill root, switch to workspace import/promotion/install routing instead of treating fanout scaffolds as completion.
          route: local_skill_port
          requires:
            - local_porting_loop
  - id: remote_source_import_install
    label: Import and install remote source
    rank: 2
    description: "Use when the user asks to import/port/convert a public remote source and install it. In SkillSpec, install means doctor -> import -> install: stage the source, doctor/map its shape, import into SkillSpec drafts, semantically promote every generated package draft, converge, compile, dry-run install, then install. A fanout import that produced scaffolds is an intermediate artifact, not a completed request; recoverable blockers become the next work queue until user intervention is genuinely required."
    execution_plan:
      mode: ordered
      reason: Compound import-and-install requests need one uninterrupted SkillSpec path from doctor through import to reviewed install. Workspace fanout may produce one package or many, but no package can be installed until its scaffold is promoted and convergence, compile, and dry-run install have passed. A scaffold, missing promotion proof, or dependency review note is a continuation gate, not a final blocker, unless resolving it requires user approval, credentials, unavailable source, a policy waiver, or another external state change. Installing raw SKILL.md folders through a generic harness installer is not a SkillSpec install.
      phases:
        - id: approve_remote_source
          owner_skill: skillspec
          requires:
            - approve_remote_source_access
        - id: stage_remote_source
          owner_skill: skillspec
          requires:
            - stage_remote_folder
          forbid:
            - install_from_remote_checkout
            - execute_imported_snippets_during_staging
            - web_search_for_remote_source
            - fetch_raw_github_skill_md_for_import
        - id: map_staged_source_graph
          owner_skill: skillspec
          description: Classify the staged source and build a workspace manifest. A single atomic skill is still represented as one workspace package for this compound install path; plugin and multi-skill roots keep their shape.
          requires:
            - decide_import_mode_from_source_shape
            - inventory_source_folder
            - doctor_source_skill
            - import_checklist_entry
            - workspace_map_source
            - workspace_validate_manifest
          forbid:
            - import_workspace_root_as_single_skill
            - use_port_one_shot_for_workspace_root
            - use_port_one_shot_for_plugin_root
            - skip_doctor_before_import
        - id: scope_large_plugin_workspace
          owner_skill: skillspec
          description: If the validated manifest is a plugin workspace with more than 20 skill packages, warn that quantity creates agent follow-through risk and ask the user to approve a starting scope. Default to the top 20 dependency-ready or entry-priority packages from the manifest order, then continue in later batches until the full requested port is complete.
          requires:
            - choose_execution_strategy
            - choose_large_plugin_port_scope
          forbid:
            - silently_attempt_over_20_plugin_full_port
            - bulk_promote_scaffolds_without_package_checklist
            - claim_top_twenty_scope_as_full_plugin_port
        - id: import_workspace_packages
          owner_skill: skillspec
          description: Run fanout import for each package under the mapped build root. Generated package drafts remain scaffolds.
          requires:
            - workspace_import_packages
            - import_checklist_loop
            - produce_workspace_import_report
          forbid:
            - compile_or_install_during_workspace_import
            - install_generated_scaffold
            - use_generic_skill_installer_for_skillspec_install
            - copy_raw_skill_md_as_skillspec_install
        - id: promote_workspace_packages
          owner_skill: skillspec
          description: Promote every generated package draft from its own source map and source lens before convergence.
          requires:
            - classify_workspace_scaffolds
            - import_checklist_loop
            - promote_workspace_scaffold_batches
            - validate_promoted_package_specs
            - deps_check_promoted_packages
            - test_promoted_packages
            - produce_workspace_promotion_report
          forbid:
            - claim_scaffold_as_finished_skill
            - install_generated_scaffold
            - auto_fill_scaffold_from_inference
            - use_generic_skill_installer_for_skillspec_install
            - copy_raw_skill_md_as_skillspec_install
        - id: converge_workspace_build
          owner_skill: skillspec
          requires:
            - workspace_converge_build
            - produce_workspace_converge_report
        - id: compile_workspace_build
          owner_skill: skillspec
          requires:
            - workspace_compile_build
            - produce_workspace_compile_report
          forbid:
            - install_during_workspace_compile
            - use_generic_skill_installer_for_skillspec_install
        - id: install_workspace_build
          owner_skill: skillspec
          requires:
            - workspace_install_dry_run
            - produce_workspace_install_report
            - approve_install_targets
            - approve_retire_existing_skill
            - workspace_install_packages
            - produce_workspace_install_manifest
          forbid:
            - install_without_workspace_dry_run
            - refresh_router_during_workspace_install
            - use_generic_skill_installer_for_skillspec_install
            - copy_raw_skill_md_as_skillspec_install
            - treat_harness_availability_as_skillspec_install
  - id: local_source_import_install
    label: Import and install local source
    rank: 2
    description: "Use when the user asks to install a raw local SKILL.md file or skill folder. In SkillSpec, install means doctor -> import -> install: assess shape first, import and semantically review the source, then compile, dry-run, and install only after dependency, target, and retirement gates."
    execution_plan:
      mode: ordered
      reason: A raw local source install request is an end-state intent, not permission to copy prose into a harness. It must run the same source-shape assessment and import/review ladder as import, then add dependency review, compile, dry-run install, target approval, retirement approval, and final install. Generic harness skill installation or raw SKILL.md copying is not a SkillSpec install.
      phases:
        - id: assess_local_source_for_install
          owner_skill: skillspec
          description: Classify the local source before importing or installing. If doctor reports a multi-skill, entry-with-subskills, or plugin-shaped source, switch to workspace map/import/promotion/install instead of flattening it.
          requires:
            - decide_import_mode_from_source_shape
            - inventory_source_folder
            - doctor_source_skill
            - import_checklist_entry
          forbid:
            - import_workspace_root_as_single_skill
            - use_port_one_shot_without_shape_recon
            - use_port_one_shot_for_workspace_root
            - use_port_one_shot_for_plugin_root
            - skip_doctor_before_import
        - id: scope_large_plugin_workspace
          owner_skill: skillspec
          description: If the local source is a plugin workspace with more than 20 skill packages, warn that quantity creates agent follow-through risk and ask the user to approve a starting scope. Default to the top 20 dependency-ready or entry-priority packages from the manifest order, then continue in later batches until the full requested port is complete.
          requires:
            - choose_execution_strategy
            - choose_large_plugin_port_scope
          forbid:
            - silently_attempt_over_20_plugin_full_port
            - bulk_promote_scaffolds_without_package_checklist
            - claim_top_twenty_scope_as_full_plugin_port
        - id: import_and_review_local_source
          owner_skill: skillspec
          route: local_skill_port
          description: Import and semantically promote the source-backed SkillSpec before any harness mutation.
          requires:
            - local_porting_loop
            - run_structural_qa
          forbid:
            - install_unreviewed_draft
            - treat_mechanical_draft_as_final
            - install_before_validate_test_imports_deps
            - use_generic_skill_installer_for_skillspec_install
            - copy_raw_skill_md_as_skillspec_install
        - id: plan_local_install
          owner_skill: skillspec
          description: Review dependency surface, compile the reviewed SkillSpec, and dry-run the harness install before writing to any skill root.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
              - local_skill_files
            permission_required_for:
              - install_or_release_side_effect
              - any_unlisted_tool
          requires:
            - deps_check_all
            - show_dependency_surface
            - approve_dependency_surface
            - compile_codex_skill
            - compile_claude_skill
            - list_install_targets
            - install_dry_run
            - approve_install_targets
            - approve_retire_existing_skill
          forbid:
            - install_before_dependency_surface_approval
            - install_before_validate_test_imports_deps
            - leave_old_and_new_skill_discoverable_without_user_choice
            - use_generic_skill_installer_for_skillspec_install
            - copy_raw_skill_md_as_skillspec_install
        - id: install_reviewed_local_result
          owner_skill: skillspec
          description: Install only the compiled, reviewed result after the dry-run and approvals are clean.
          requires:
            - install_skill
          forbid:
            - install_unreviewed_draft
            - install_from_remote_checkout
            - leave_old_and_new_skill_discoverable_without_user_choice
            - use_generic_skill_installer_for_skillspec_install
            - copy_raw_skill_md_as_skillspec_install
            - treat_harness_availability_as_skillspec_install
        - id: report_local_import_install
          owner_skill: skillspec
          description: Report the import artifacts, installed target paths, retired backup paths when applicable, and value proof.
          requires:
            - generate_value_report
  - id: workspace_skill_authoring
    label: Map multi-skill workspace
    rank: 3
