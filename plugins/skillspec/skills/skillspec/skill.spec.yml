schema: skillspec/v0
id: skillspec
title: SkillSpec
description: SkillSpec post-install setup and skill-authoring multiplexer for inspecting skill/repo shape with doctor, mapping multi-skill and plugin-shaped workspaces, importing existing prose skills, inspecting SkillSpec status, installing compiled workspaces with visibility planning, installing/updating/enabling/disabling router mode, installing/updating/enabling/disabling/deleting durable-executor, creating specs from observed durable execution workspaces, revising SkillSpecs, compiling reviewed skills, optional install, and value reporting.
activation:
  summary: >
    Multiplex SkillSpec post-install setup: inspect skill/repo shape with doctor, map multi-skill and plugin-shaped repositories before fanout import, import existing SKILL.md skills from
    local folders or public URIs, inspect installed status, install compiled workspaces with entry/support visibility planning, install/update/enable/disable router mode, optionally
    install/update/enable/disable/delete durable-executor, create specs from observed durable execution workspaces,
    revise SkillSpec YAML, and prove value before install or release.
  keywords:
    - skillspec
    - /skillspec
    - skillspec setup
    - post install setup
    - import SKILL.md
    - import existing skill
    - port skill
    - what is the shape of this skill
    - what is the shape of skill
    - shape of skill
    - skill shape
    - source shape
    - classify skill repo
    - run doctor on this repo
    - run doctor on this url
    - port-one-shot
    - one-shot port
    - workspace map
    - workspace validate
    - workspace import
    - workspace converge
    - workspace compile
    - workspace install
    - skillspec workspace
    - skillspec workspace install
    - skillspec.workspace.yml
    - multi-skill repo
    - multi-skill workspace
    - plugin-shaped repo
    - plugin-shaped workspace
    - plugin namespace
    - plugin namespaces
    - namespaced skills
    - namespaced skill packages
    - plugin metadata manifest
    - .agent-plugin/marketplace.json
    - .codex-plugin/plugin.json
    - .claude-plugin/plugin.json
    - .mcp.json
    - plugin slash command
    - harness plugin skills
    - plugin skills
    - many SKILL.md files
    - parent folder with multiple skills
    - fanout converge
    - fanout import
    - workspace cache
    - workspace-cache.json
    - cache hits
    - run-loop
    - command batching
    - chunked source map
    - parallel strategy
    - sequential strategy
    - converge workspace
    - compile workspace
    - install workspace
    - token economy
    - token savings
    - compact metrics
    - agent-visible tokens
    - workspace proof
    - workspace install proof
    - workspace-install.report.md
    - workspace-install.manifest.json
    - workspace visibility
    - workspace visibility policy
    - visibility-policy
    - apply visibility
    - apply-visibility
    - entry-implicit
    - manual-only support skill
    - workspace-visibility.manifest.json
    - import workspace packages
    - cross-skill references
    - skill dependency graph
    - shared standards package
    - local folder or uri
    - dependency ledger
    - deps.toml
    - dependency preservation
    - skillspec status
    - status report
    - lifecycle status
    - installed skills inventory
    - skillspec-backed skills
    - legacy prose skills
    - install router
    - install skill-router
    - update router
    - enable router
    - disable router
    - repair skill-router
    - router mode
    - install durable-executor
    - durable executor install
    - update durable-executor
    - durable executor update
    - enable durable-executor
    - durable executor enable
    - disable durable-executor
    - durable executor disable
    - delete durable-executor
    - durable executor delete
    - observe durable executor
    - observed durable workspace
    - create spec skill from workspace
    - rote exec workspace
    - revise existing SkillSpec
    - update skill.spec.yml
    - prose skill to skillspec
    - skill.spec.yml
    - skillspec import-skill
    - skillspec port-one-shot
    - skillspec doctor
    - skillspec doctor checklist
    - skillspec import checklist
    - skillspec run checklist
    - skillspec source map
    - skillspec source query
    - source-map.json
    - skillspec plan
    - skillspec act
    - skillspec progress
    - phase progress
    - grammar sensemake
    - grammar checklist
    - compile skill
    - install codex agents
    - retire existing skill
    - replace old skill
    - --retire-existing
    - backup old skill
