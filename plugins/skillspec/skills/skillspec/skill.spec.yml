      - compile_or_install_during_workspace_import
    after_success:
      - report_workspace_import
      - promote_workspace_scaffold_batches
    reason: Fanout import starts from a validated workspace manifest and writes one generated mechanical draft per atomic skill; it must not compile, install, refresh router indexes, or call the drafts finished before scaffold promotion.
