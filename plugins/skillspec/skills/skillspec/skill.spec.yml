        id: value_report
  decision_trace:
    kind: directory
    path: .skillspec/traces/run-*
    description: Decision trace captured during the realistic demo route.
    produced_by:
      - kind: command
        id: decide_demo
    consumed_by:
      - kind: command
        id: trace_align
  execution_ledger:
    kind: file
    path: .skillspec/traces/<run-id>/execution.jsonl
    description: Structured progress and action evidence ledger for phase completion, requirement proof, handoffs, and evidence references.
    produced_by:
      - kind: command
        id: progress_record_phase
      - kind: command
        id: progress_record_requirement
      - kind: command
        id: progress_checkpoint
      - kind: command
        id: progress_batch
    consumed_by:
      - kind: command
        id: progress_show
      - kind: command
        id: trace_align
  progress_report:
    kind: file
    path: .skillspec/traces/<run-id>/progress.json
    description: Derived view of completed, current, blocked, and remaining phases for the selected route.
    produced_by:
      - kind: command
        id: progress_show
    consumed_by:
      - kind: command
        id: value_report
  alignment_report:
    kind: file
    path: .skillspec/traces/<run-id>/alignment.json
    description: Full trace alignment report written by quiet trace_align; inspect only for debugging, blockers, failures, or explicit proof requests.
    produced_by:
      - kind: command
        id: trace_align
    consumed_by:
      - kind: command
        id: value_report
  proof_digest:
    kind: file
    path: .skillspec/traces/<run-id>/proof-digest.json
    description: Grouped missing-proof digest from trace_align, used to report partial alignment and plan real repair work. Do not use this digest to invent route, obligation, elicitation, or phase events after the fact.
    produced_by:
      - kind: command
        id: trace_align
    consumed_by:
      - kind: command
        id: progress_batch
      - kind: command
        id: value_report
  final_proof_batch:
    kind: file
    path: .skillspec/traces/<run-id>/final-proof.jsonl
    description: Optional troubleshooting-only batch for real evidence rows that were captured during the work but not yet appended. It must not be used to manufacture route fulfillment, obligations, elicitations, or phase proof after alignment reports missing evidence.
    produced_by:
      - kind: recipe
        id: local_porting_loop
    consumed_by:
      - kind: command
        id: progress_batch
  durable_workspace_report:
    kind: report
    path: .skillspec/reports/durable-workspace-report.md
    description: Summary of the observed rote workspace commands, dependencies, inputs, outputs, stats, artifacts, and proof gaps.
    produced_by:
      - kind: command
        id: observe_workspace_stats
      - kind: command
        id: observe_workspace_log
      - kind: command
        id: observe_workspace_meta
    consumed_by:
      - kind: code
        id: synthesize_observed_skill_spec
  observed_skill_spec:
    kind: file
    path: skill.spec.yml
    description: Reviewed SkillSpec synthesized from a durable workspace observation rather than from a prose SKILL.md source.
    produced_by:
      - kind: code
        id: synthesize_observed_skill_spec
    consumed_by:
      - kind: command
        id: validate_spec
      - kind: command
        id: test_spec
commands:
  grammar_sensemake_index:
    description: Learn the available grammar affordances without reading compiler source.
    template: skillspec grammar sensemake --view index
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  grammar_sensemake_porting:
    description: Load prose-to-SkillSpec mapping guidance and the import coverage checklist.
    template: skillspec grammar sensemake --view porting
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  grammar_checklist_import:
    description: Load the explicit checklist that gates semantic promotion and install readiness.
    template: skillspec grammar checklist --for import-skill
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  grammar_schema_json:
    description: Inspect the runtime JSON schema when a field shape is unclear.
    template: skillspec grammar schema
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  inventory_source_folder:
    description: Inventory source files before import so resources, scripts, examples, and sibling references are not dropped.
    template: rg --files <source-skill-folder>
    safety: local_read
    requires:
      dependencies:
        - rg_cli
  decide_import_mode_from_source_shape:
    description: Decide whether the source path is a single atomic prose skill, a multi-skill workspace, a plugin-shaped workspace, or an existing SkillSpec revision before choosing one-shot versus workspace/revision.
    template: "rg --files <source-root> | rg '(^|/)SKILL\\.md$|(^|/)skill\\.spec\\.yml$|(^|/)(\\.claude-plugin/plugin\\.json|\\.mcp\\.json|CLAUDE\\.md)$'"
    safety: local_read
    requires:
      dependencies:
        - rg_cli
  doctor_source_skill:
    description: Run the static doctor shape gate and score frontmatter discovery risk, agent drift risk, activation-loaded surface, primacy-bias risk, code/instruction mixing, ambiguity, dependency contract, and proof gaps. Multi-skill, entry-with-subskills, and plugin-shaped roots return workspace reports with one package report per SKILL.md plus workspace_identity counts for total source files, namespaces, namespaced packages, unique byte-identical skill content, repeated content groups, repeated frontmatter names, estimated copied-vs-referenced source tokens, and source_content_ref aliases; non-skill code repos return shape-only reports.
    template: mkdir -p <draft-dir>/.skillspec/reports && skillspec doctor <source-skill-folder-or-repo-uri> --json > <draft-dir>/.skillspec/reports/doctor.json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  doctor_source_shape:
    description: Print the default formatted source shape and risk report for a local skill folder, parent folder, public GitHub skill folder, or public GitHub repo URI. The report includes a Shape Contract section with detected kind, kind-specific handling, analysis status, skill-file count, package count, namespace count, plugin-root count/details, referenced skill paths, and next command. Workspace reports also include a Workspace Identity section that distinguishes namespaced package identity from repeated byte-identical source content and shows source_content_ref aliases. Use for user questions like "what is the shape of this skill", "shape of skill", or "run doctor on this repo/url"; stop after reporting shape and recommended next command. Do not run source-map, import, progress, or alignment commands for this read-only diagnostic unless the user explicitly asks for proof. Use `--html` only when the user asks for a shareable report, and `--json` only when a downstream command needs machine fields.
    template: skillspec doctor <source-skill-folder-or-repo-uri>
    safety: network_read
    requires:
      dependencies:
        - skillspec_cli
  doctor_checklist_entry:
    description: Generate the read-only source-shape checklist for a local folder or public GitHub URI, including detected shape, activation policy, entry commands, evidence requirements, repeat-until condition, and forbids.
    template: skillspec doctor checklist <source-skill-folder-or-repo-uri> --stage entry --json
    safety: network_read
    requires:
      dependencies:
        - skillspec_cli
  source_map_create:
    description: Build a Markdown AST-backed source map before import so large prose sources can be read by handle and exact span. The source may be a local skill folder or a public GitHub skill URI. URI source-map requests stage the selected source and report source_path for stale/import-skill, but repo/workspace imports should run source stage first so shape classification can preserve plugin metadata and shared folders.
    template: skillspec source map <source-skill-folder-or-github-uri> --out <draft-dir>/.skillspec/source-map
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  source_map_coverage:
    description: Summarize mapped nodes, review-required classifications, and stale counts before semantic promotion.
    template: skillspec source coverage <draft-dir>/.skillspec/source-map/source-map.json
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  source_map_lens:
    description: Review one parsed Markdown block at a time from source-map.json, with cursor/countdown, source hash, classifications, references, suggested constructs, conditional-rule signals, and required SkillSpec target kinds. Use this during promotion before editing each block's corresponding activation/routes/rules/resources/code/dependencies/proof.
    template: skillspec source lens <draft-dir>/.skillspec/source-map/source-map.json --cursor <n>
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  source_map_nodes:
    description: Inspect structural source handles before opening detailed spans. Use the bounded index view; do not run `nodes --view summary` or `nodes --view full` in chat unless the user explicitly asks for exhaustive source-map output.
    template: skillspec source query <draft-dir>/.skillspec/source-map/source-map.json nodes --view index
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  source_map_dependencies:
    description: Inspect dependency evidence and imported package signals from the mapped source before proof or install.
    template: skillspec source query <draft-dir>/.skillspec/source-map/source-map.json dependencies --view summary
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  source_map_code:
    description: Inspect mapped code block handles before deciding which snippets become resources, code, commands, recipes, or examples.
    template: skillspec source query <draft-dir>/.skillspec/source-map/source-map.json code --view summary
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  source_map_stale:
    description: Verify the source map still matches the staged source before import, proof, compile, or install.
    template: skillspec source stale <draft-dir>/.skillspec/source-map/source-map.json --root <source-skill-folder>
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  workspace_map_source:
    description: Build the authoring-side package graph for a source root with one or more atomic SKILL.md packages, preserving plugin-shaped namespace roots when present. This is structure recon before fanout import, not router indexing. Default install slugs use workspace-path namespacing and preserve parent/package shape for multi-skill and plugin-shaped installs. Use summary mode to preserve proof files while reporting wall-clock and estimated token metrics.
    template: skillspec workspace map <source-root> --out <draft-dir>/.skillspec/workspace/skillspec.workspace.yml --summary
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  workspace_map_replacement_source:
    description: Build the workspace package graph with canonical local-name install slugs only for single-package replacement or upgrade installs that must retire existing skill folders such as rote-setup instead of installing namespaced generated folders. Do not use this for multi-skill or plugin-shaped workspaces; validation rejects local-name because it flattens source-local identity.
    template: skillspec workspace map <source-root> --out <draft-dir>/.skillspec/workspace/skillspec.workspace.yml --install-slug-policy local-name --summary
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  workspace_validate_manifest:
    description: Validate workspace package boundaries, plugin namespace names, deterministic install slugs, hard dependency edges, cross-skill references, and cycles before fanout import planning. Use summary mode to report wall-clock and estimated token metrics.
    template: skillspec workspace validate <draft-dir>/.skillspec/workspace/skillspec.workspace.yml --summary
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  workspace_import_packages:
    description: Run fanout import from a validated workspace manifest, writing one generated mechanical package draft per atomic skill under a mirrored build root while preserving successes and blocking dependents of failed packages. Dependency-ready packages may import in parallel, and unchanged packages with intact artifacts may be reused from the workspace cache. These drafts are scaffolds and must be semantically promoted before converge, compile, install, or alignment-as-complete. Use summary mode to keep agent-visible output small while full source maps, cache hits/misses, and package evidence stay on disk.
    template: skillspec workspace import <draft-dir>/.skillspec/workspace/skillspec.workspace.yml --out <workspace-build-root> --summary
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  import_checklist_entry:
    description: Generate the shape-specific import entry checklist for a source root or workspace manifest. This is read-only and names the correct single-skill, multi-skill, plugin, or workspace command ladder before any promotion or install.
    template: skillspec import checklist <source-root-or-workspace-manifest> --stage entry --json
    safety: network_read
    requires:
      dependencies:
        - skillspec_cli
  import_checklist_loop:
    description: Generate the package-specific workspace import loop checklist from the manifest and build root, locating the next package missing promotion proof and naming the source-lens, validate, deps, and test commands for that package.
    template: skillspec import checklist <draft-dir>/.skillspec/workspace/skillspec.workspace.yml --build-root <workspace-build-root> --stage loop --json
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  import_checklist_exit:
    description: Generate the workspace import exit checklist, including converge, compile, dry-run install, approved retirement, and install gates. This is read-only and must precede workspace converge/compile/install when the import path is checklist-driven.
    template: skillspec import checklist <draft-dir>/.skillspec/workspace/skillspec.workspace.yml --build-root <workspace-build-root> --stage exit --json
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  workspace_converge_build:
    description: Verify a workspace build root against the validated manifest, checking reviewed package specs, package-local imports/resources, explicit failures, dependency readiness, source/spec-bound workspace-promotion proof, and mechanical-scaffold or prose-wrapper blockers before compile or install. Use summary mode to report compact readiness counts plus metrics.
    template: skillspec workspace converge <draft-dir>/.skillspec/workspace/skillspec.workspace.yml --build-root <workspace-build-root> --summary
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  workspace_compile_build:
    description: Compile a converged reviewed workspace build into harness-ready package loaders under the mirrored build root without installing or refreshing router state. Mechanical scaffolds must remain blocked. Use summary mode to report compact compile counts plus metrics.
    template: skillspec workspace compile <draft-dir>/.skillspec/workspace/skillspec.workspace.yml --build-root <workspace-build-root> --target codex-skill --summary
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  workspace_install_dry_run:
    description: Preflight a compiled reviewed workspace install into harness roots, showing every planned write, default entry-implicit visibility target, promotion-proof blocker, scaffold/prose-wrapper blocker, and folder or same-public-name retirement before writing harness files. For multi-skill and plugin-shaped manifests, verify the plan preserves the source parent folder, copies non-skill parent files from the reference source, replaces the source skill package subtree with compiled package folders at the same relative paths, and blocks flattened top-level package installs. Use --retire-existing by default after approval so a preexisting active skill, workspace parent, or plugin parent is backed up and removed instead of left discoverable beside the replacement.
    template: skillspec workspace install <draft-dir>/.skillspec/workspace/skillspec.workspace.yml --build-root <workspace-build-root> --target codex --retire-existing --dry-run --summary
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  workspace_install_replacement_dry_run:
    description: Preflight a replacement workspace install using canonical local-name install slugs and --retire-existing, so old prose folders with the same canonical names are backed up and replaced instead of leaving duplicate generated folders discoverable.
    template: skillspec workspace install <draft-dir>/.skillspec/workspace/skillspec.workspace.yml --build-root <workspace-build-root> --target codex --install-slug-policy local-name --retire-existing --dry-run --summary
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  workspace_install_packages:
    description: Install compiled reviewed workspace packages into harness roots after a clean dry-run, retiring approved preexisting active skill folders, workspace/plugin parent folders, or same-public-name collisions with backups and reporting visibility policy without refreshing router indexes. For multi-skill and plugin-shaped manifests, install the source parent folder as the harness unit, copy non-skill files from the reference parent, replace the source skill package subtree, and write compiled package folders back at the same relative paths instead of flattened top-level folders. Mechanical scaffolds, prose wrappers, and packages missing current workspace-promotion proof are blocked even if a stale loader exists. Use summary mode to report compact install counts plus metrics.
    template: skillspec workspace install <draft-dir>/.skillspec/workspace/skillspec.workspace.yml --build-root <workspace-build-root> --target codex --retire-existing --summary
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  workspace_install_apply_visibility:
    description: Install compiled reviewed workspace packages, retire approved preexisting active skill folders, workspace/plugin parent folders, or same-public-name collisions with backups, and apply the selected workspace visibility policy with a reversible visibility manifest. For multi-skill and plugin-shaped manifests, preserve the source parent shape and replace only the source skill package subtree with compiled packages at the same relative paths. Mechanical scaffolds, prose wrappers, and packages missing current workspace-promotion proof are blocked even if a stale loader exists. Use summary mode to report compact install counts plus metrics while preserving full install proof.
    template: skillspec workspace install <draft-dir>/.skillspec/workspace/skillspec.workspace.yml --build-root <workspace-build-root> --target codex --retire-existing --apply-visibility --summary
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  read_source_skill:
    description: Fallback for small sources only; prefer source-map handles and exact --view full queries for large or resource-heavy imports.
    template: sed -n '1,240p' <source-skill-folder>/SKILL.md
    safety: local_read
  preserve_source_skill:
    description: Preserve the full prose source before compiling over the visible SKILL.md loader.
    template: cp -f <source-skill-folder>/SKILL.md <output-skill-folder>/source/SKILL_md.old
    safety: local_write
  stage_remote_folder:
    description: Stage a public GitHub repository, tree URL, owner/repo shorthand, or owner/repo/path shorthand locally through the SkillSpec URI parser for candidate discovery or explicit persistent staging. Repo-root targets are cloned as the selected source root so plugin metadata, shared files, and folder shape remain available for doctor, import checklist, and workspace map. Explicit subfolder targets are sparse-staged only inside that requested folder. Treat source_shape.kind as authoritative for staged_source_path. Use selected_source_path for one atomic skill; when source_shape.kind is multi_skill_workspace or plugin_workspace, run shape/checklist/workspace handling against staged_source_path unless the user explicitly asked for one candidate skill. Do not web-search, fetch raw GitHub URLs, or hand-write sparse-checkout loops before this command.
    template: skillspec source stage <github-skill-uri> --out <staging-root> --json
    safety: network_read
    requires:
      dependencies:
        - skillspec_cli
        - git_cli
  find_skill_candidates:
    description: Fallback only when source stage was run with candidate detection disabled or a staged local checkout already exists; otherwise use candidates returned by skillspec source stage.
    template: rg --files <staged-repo> | rg '/SKILL\\.md$'
    safety: local_read
    requires:
      dependencies:
        - rg_cli
  import_skill_draft:
    description: Generate a deterministic draft from a local skill folder after verifying the staged source map is fresh.
    template: skillspec import-skill <source-skill-folder> --out <draft-dir>/skill.spec.yml --source-map <draft-dir>/.skillspec/source-map/source-map.json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  port_one_shot:
    description: Bundle grammar preflight, source map, doctor, typed mechanical import, schema-derived shape crib, validate, imports check, deps check, tests, compile, compact report, and optional estimated direct-run stats for one atomic local skill package.
    template: skillspec port-one-shot <source-skill-folder> --out <draft-dir> --target codex-skill --prove --run-dir <trace-dir> --phase mechanical_import --requirement estimated_token_metrics
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  sensemake_draft:
    description: Summarize the mechanical draft's actual routes, rules, deps, commands, imports, tests, and query handles.
    template: skillspec sensemake <draft-dir>/skill.spec.yml --view index
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  sensemake_current_spec:
    description: Summarize the current reviewed spec before revising it.
    template: skillspec sensemake <skill-folder>/skill.spec.yml --view index
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  plan_phase_order:
    description: List the selected route and ordered phase names before acting so the harness knows the task order.
    template: skillspec plan <skill-folder>/skill.spec.yml --input '<task>' --trace-dir <skill-folder>/.skillspec/traces
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  act_named_phase:
    description: Expand one named phase into the active OODA checklist, allowed actions, forbids, handoffs, dependencies, and evidence expectations.
    template: skillspec act <skill-folder>/skill.spec.yml --input '<task>' --run <trace-dir> --phase <phase-id>
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  progress_record_phase:
    description: Low-level troubleshooting command for one foreground phase progress row. Do not use for routine successful proof; use progress_checkpoint once for typed routine rows.
    template: skillspec progress record <trace-dir> phase-completed <phase-id> --evidence-kind <kind> --evidence-ref <ref>
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  progress_record_requirement:
    description: Low-level troubleshooting command for one foreground requirement row. Do not use for routine successful proof; use progress_checkpoint once for typed routine rows.
    template: skillspec progress record <trace-dir> requirement-satisfied <phase-id> <requirement-id> --evidence-kind <kind> --evidence-ref <ref>
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  progress_checkpoint:
    description: Append routine successful phase, requirement, route, closure, elicitation, obligation, or evidence proof events from typed flags as one quiet background checkpoint without hand-authoring event JSONL. Use --summary only for debugging or when the user asks to inspect proof recording.
    template: skillspec progress checkpoint <trace-dir> --requirement-satisfied <phase-id>/<requirement-id>=<kind>:<ref> --phase-completed <phase-id>=<kind>:<ref> --checkpoint "checkpointing evidence" --quiet
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  progress_batch:
    description: Append proof events from an existing JSONL or JSON array artifact as a quiet background checkpoint. Prefer progress_checkpoint for routine successful rows so agents do not hand-author event JSONL.
    template: skillspec progress batch <trace-dir> --file <trace-dir>/<proof-events>.jsonl --checkpoint "checkpointing evidence" --quiet
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  progress_stats_durable_workspace:
    description: Append measured durable-executor workspace token stats to execution.jsonl quietly so trace align can report measured token consumption and savings. Use only when the active route actually used durable-executor workspace evidence.
    template: skillspec progress stats <trace-dir> --workspace <workspace> --workspace-stats-report <trace-dir>/workspace-stats.txt --phase <phase-id> --requirement <stats-requirement-id> --quiet
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
        - rote_cli
  progress_stats_summary_metrics:
    description: Append direct-run summary metrics to execution.jsonl quietly so trace align can report estimated output economy instead of not recorded.
    template: skillspec progress stats <trace-dir> --agent-visible-tokens <n> --artifact-tokens-preserved <n> --avoided-tokens <n> --metrics-source estimated --phase <phase-id> --requirement <stats-requirement-id> --quiet
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  progress_show:
    description: Check completed, current, blocked, and remaining phases from the run execution ledger and write progress.json without transcript output. Treat this as an internal gate check; surface only gate-level status unless details are requested or needed for a blocker/failure.
    template: skillspec progress show <skill-folder>/skill.spec.yml --run <trace-dir> --quiet
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  run_loop:
    description: "Start the stateful agent guide in one spec load: select route, write trace, emit JSON control data, and persist guide-state.json plus guide-summary.md for compaction-safe resume."
    template: skillspec run-loop <skill-folder>/skill.spec.yml --input <user-task> --trace-dir <trace-dir> --guide agent --json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  run_loop_resume:
    description: Resume a stateful agent guide from an existing run directory by replaying the decision trace, reading execution.jsonl, validating fingerprints, and emitting JSON control data.
    template: skillspec run-loop <skill-folder>/skill.spec.yml --resume <trace-dir> --guide agent --json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  run_checklist_entry:
    description: Generate the read-only execution entry checklist from a skill.spec.yml before starting a guided run-loop.
    template: skillspec run checklist <skill-folder>/skill.spec.yml --stage entry --json
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  run_checklist_loop:
    description: Generate the current guided-run checklist from guide-state.json, including phase, open requirements, allowed commands, forbids, and repeat-until condition.
    template: skillspec run checklist <trace-dir> --stage loop --json
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  run_checklist_exit:
    description: Generate the guided-run exit checklist from guide-state.json, including token stats, final progress, alignment, and proof-path requirements.
    template: skillspec run checklist <trace-dir> --stage exit --json
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  query_active_handles:
    description: Inspect a specific route, rule, command, state, dependency, or test expectation handle instead of reading the whole YAML.
    template: skillspec query <skill-folder>/skill.spec.yml <handle> --view summary
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  refs_active_handles:
    description: Inspect references from an active handle, including test expectation references, during targeted revision.
    template: skillspec refs <skill-folder>/skill.spec.yml <handle> --view summary
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  validate_spec:
    description: Validate the reviewed spec schema and cross-references.
    template: skillspec validate <skill-folder>/skill.spec.yml
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  imports_check:
    description: Verify package-local imports and resource load relationships.
    template: skillspec imports check <skill-folder>/skill.spec.yml
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  deps_check_all:
    description: Check every declared dependency and surface permission/provision status.
    template: skillspec deps check <skill-folder>/skill.spec.yml
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  deps_check_command:
    description: Check only the dependencies for one command template.
    template: skillspec deps check <skill-folder>/skill.spec.yml --command <command-id>
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  inspect_dependency_ledger:
    description: Inspect the imported skill's package-local dependency ledger; failure means dependency preservation is incomplete.
    template: sed -n '1,240p' <skill-folder>/deps.toml
    safety: local_read
  test_spec:
    description: Run scenario tests for route, rule, forbid, elicitation, and closure expectations.
    template: skillspec test <skill-folder>/skill.spec.yml
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  compile_codex_skill:
    description: Compile the reviewed spec into a minimal Codex-style SKILL.md loader.
    template: skillspec compile <skill-folder>/skill.spec.yml --target codex-skill
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  compile_claude_skill:
    description: Compile the reviewed spec into a Claude-compatible skill loader when requested.
    template: skillspec compile <skill-folder>/skill.spec.yml --target claude-skill
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  list_install_targets:
    description: Show detected harness roots before writing generated files.
    template: skillspec install targets
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  router_help:
    description: Verify that the installed CLI exposes the router command surface.
    template: skillspec router --help
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  router_policy_help:
    description: Verify that the installed CLI exposes the router policy command surface.
    template: skillspec router policy --help
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  router_profile_help:
    description: Verify that the installed CLI exposes the router profile command surface.
    template: skillspec router profile --help
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  durable_help:
    description: Verify that the installed CLI exposes the durable-executor lifecycle command surface.
    template: skillspec durable-executor --help
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  verify_rote_cli:
    description: Verify that rote is on PATH before durable-executor install/update makes rote-exec the runtime substrate.
    template: rote --help
    safety: read_only
    requires:
      dependencies:
        - rote_cli
  router_install:
    description: Install or refresh router mode in the selected skill roots, install managed Codex/Claude prompt guard hooks with harness context, make routed skills explicit-only, and install a fast-path decision-gated provider-neutral router that collapses duplicate logical skills and loads a skill only for route decision use_skill.
    template: skillspec router install --roots <skill-roots> --index <router-index>
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  router_enable_or_disable:
    description: Switch installed router mode on or off without uninstalling router files; enable rebuilds the index from current roots and installs managed prompt guard hooks, while disable removes the managed hooks.
    template: skillspec router enable|disable --json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  status_help:
    description: Show the read-only SkillSpec status command help.
    template: skillspec status --help
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  status_lifecycle_inventory:
    description: Report installed router and durable-executor state, enabled/disabled mode, supported roots, router index status, and SkillSpec-backed versus legacy skill inventory.
    template: skillspec status --json
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  router_update:
    description: Back up and update every recorded skill-router install, preserve enabled/disabled mode, refresh managed guard hooks and decision-gated router text, then report the harness restart warning.
    template: skillspec router update --json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  verify_router_install:
    description: Verify the generated skill-router files, route decision gate, visibility metadata, and index status under the selected roots.
    template: skillspec router index status --roots <skill-roots> --index <router-index>
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  router_guard:
    description: Verify router-first readiness through the managed guard, repairing stale visibility/index drift and reporting first_hop_ready. Managed hooks pass --harness so route can prefer the current physical root when duplicate logical skills exist.
    template: skillspec router guard --json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  router_index_refresh:
    description: Refresh an installed router index through the router lifecycle; prefer this over direct skillspec index because refresh also reapplies router-managed visibility and checks preparedness.
    template: skillspec router index refresh --roots <skill-roots> --index <router-index>
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  router_policy_list_or_show:
    description: Inspect SQLite-backed router policy profiles and rules before editing policy state.
    template: skillspec router policy show --index <router-index> --profile <profile> --json
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  router_policy_get:
    description: Get one router policy profile or rule by id before editing it, preserving existing predicates, priority, anchor, and targets.
    template: skillspec router policy get <profile-or-rule-id> --index <router-index> --json
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  router_policy_set_profile:
    description: Create or update a SQLite-backed router policy profile in the router index; use route for normal routing and soft-passthrough for focus/code modes that bypass unless policy explicitly selects a skill.
    template: skillspec router policy set-profile <profile> --index <router-index> --mode route|soft-passthrough|native-passthrough --active --json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  router_policy_set_rule:
    description: Add or replace a provider-neutral router policy rule using query phrases and generic targets such as skill:<name>, tag:<tag>, source:<root>, or has_skill_spec:true. Read existing policy with router_policy_get or router_policy_list_or_show before replacing a rule.
    template: skillspec router policy set-rule <rule-id> --index <router-index> --profile <profile> --priority <n> --anchor none|policy --when-any <phrase> --prefer skill:<name> --json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  router_policy_explain:
    description: Explain how the active or named router policy profile changes a route decision, including base score, policy score, matched rules, and policy passthrough bypass.
    template: skillspec router policy explain --index <router-index> --profile <profile> --query <task> --json
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  router_profile_apply_or_clear:
    description: Switch the active SQLite-backed router policy profile or clear it without changing the router install.
    template: skillspec router profile apply <profile> --index <router-index> --json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  find_durable_executor:
    description: Check whether durable-executor is already present in the selected skill roots or source path.
    template: rg --files <skill-roots-or-source> | rg '(^|/)durable-executor/(SKILL.md|skill.spec.yml)$'
    safety: local_read
    requires:
      dependencies:
        - rg_cli
  durable_install:
    description: Install durable-executor from an explicit local source folder through the managed lifecycle after the rote preflight passes.
    template: skillspec durable-executor install <durable-source-folder> --target <target> --json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
        - rote_cli
  durable_update:
    description: Back up and update every recorded durable-executor install from durable config or an explicit replacement source after the rote preflight passes.
    template: skillspec durable-executor update --json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
        - rote_cli
  durable_enable_or_disable:
    description: Switch durable-executor implicit invocation on or off without uninstalling durable files. The enable path checks `rote` on PATH before making durable-executor implicit; the disable path only writes visibility metadata and config.
    template: skillspec durable-executor enable|disable --json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  durable_delete:
    description: Delete only recorded, marker-protected durable-executor installs and refresh router state when configured.
    template: skillspec durable-executor delete --json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  verify_durable_executor:
    description: Verify durable-executor exists after install, carries the managed marker when lifecycle-installed, and remains available as the router-managed implicit first hop.
    template: rg --files <skill-roots> | rg '(^|/)durable-executor/(SKILL.md|skill.spec.yml|\\.skillspec-durable-executor-managed|agents/openai.yaml)$'
    safety: local_read
    requires:
      dependencies:
        - rg_cli
  observe_workspace_stats:
    description: Collect rote workspace stats for token and evidence accounting before synthesizing a SkillSpec.
    template: rote workspace stats <workspace>
    safety: local_read
    requires:
      dependencies:
        - rote_cli
  observe_workspace_log:
    description: Inspect the rote workspace command log to recover observed commands, dependencies, files, and errors.
    template: rote workspace inspect log --last <count>
    safety: local_read
    requires:
      dependencies:
        - rote_cli
  observe_workspace_meta:
    description: Inspect rote workspace metadata and variables that explain the observed workflow context.
    template: rote workspace inspect meta
    safety: local_read
    requires:
      dependencies:
        - rote_cli
  synthesize_from_workspace:
    description: Rote-specific synthesis command that creates a draft SkillSpec skill from a named durable rote workspace after observed output has been shown and approved, and stats, command log, and metadata evidence are available. If live workspace resolution fails, first capture --workspace-stats-report, --workspace-log, and --workspace-meta files from inside the workspace and pass them explicitly.
    template: skillspec synthesize-from-workspace <workspace> --task '<observed-task>' --out <skill-folder> --observation-approved
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
        - rote_cli
  install_dry_run:
    description: Preview install writes for the selected target, including any backup path for retiring an existing active skill, without modifying harness roots.
    template: skillspec install skill <skill-folder> --target <target> --dry-run --retire-existing
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  install_skill:
    description: Install the compiled SKILL.md and reviewed skill.spec.yml into an explicitly approved harness target, backing up and removing any existing active skill at that name first.
    template: skillspec install skill <skill-folder> --target <target> --retire-existing
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  install_skill_new_name:
    description: Install the reviewed replacement under a different explicit name only when the user intentionally keeps the old active skill for side-by-side testing.
    template: skillspec install skill <skill-folder> --target <target> --name <new-skill-name>
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  decide_demo:
    description: Run a realistic demo decision against the reviewed spec and capture a trace.
    template: skillspec decide <skill-folder>/skill.spec.yml --input '<task>' --trace-dir <skill-folder>/.skillspec/traces
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  trace_align:
    description: Replay and align a captured decision trace plus execution ledger, writing full alignment.json and grouped proof-digest.json without transcript output. Use --summary only for debugging or explicit proof inspection.
    template: skillspec trace align <skill-folder>/skill.spec.yml --decision-trace <trace-dir> --execution-trace <trace-dir>/execution.jsonl --proof-digest <trace-dir>/proof-digest.json --quiet
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  value_report:
    description: Print the structured SkillSpec map used as one input to the harness-synthesized value report; the final value report is assembled from existing command outputs and explicit proof gaps.
    template: skillspec sensemake <skill-folder>/skill.spec.yml --view index
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
recipes:
  run_grammar_preflight:
    description: Required grammar-first setup before import or revision.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
    steps:
      - run_command: grammar_sensemake_index
      - run_command: grammar_sensemake_porting
      - run_command: grammar_checklist_import
      - note: Use the returned grammar map as the active contract. Do not infer grammar from memory or old examples.
  coverage_review_loop:
    description: Anti-bullshit review loop that maps prose obligations to concrete SkillSpec constructs.
    ordered: true
    requires:
      resources:
        - source_skill_md
      artifacts:
        - source_map
        - doctor_report
        - coverage_matrix
    steps:
      - run_command: source_map_nodes
      - run_command: source_map_code
      - run_command: doctor_source_skill
      - note: Query exact source-map handles with --view full as needed; load the full source file only for bounded small sources.
      - note: Use the doctor report to prioritize large activation surface, primacy-bias exposure, mixed code/instructions, ambiguous code fences, implicit dependency contracts, and missing proof surfaces.
      - note: Fill prose_span, obligation, skillspec_construct, confidence, status, and review_note for every mapped source section.
      - note: Use only the current source folder, embedded grammar, draft sensemake, and user-approved references; do not consult existing ports, repo history, memory, or examples unless the user explicitly asks.
      - note: Extract source code blocks and scripts into package-local resource files, then reference them from resources/code, commands, recipes, tests, or review notes.
      - produce_artifact: coverage_matrix
  dependency_preservation_loop:
    description: Preserve imported dependency evidence as typed deps.toml package evidence before QA, proof, compile, or install.
    ordered: true
    requires:
      resources:
        - source_skill_md
      artifacts:
        - source_map
        - dependency_ledger
    steps:
      - run_command: source_map_dependencies
      - note: Extract dependency evidence from SKILL.md, referenced docs, helper scripts, command examples, and package manifests. Treat fenced code imports as reference/example evidence unless reviewed into skill runtime; include typed source authority, package risk, local status, install candidate, required workflows, and degraded proof impact.
      - produce_artifact: dependency_ledger
      - run_command: inspect_dependency_ledger
      - ask: approve_dependency_surface
      - note: Do not delete or soften dependency records to pass QA. Missing required dependencies must be present in deps.toml as missing, provisionable, deferred, or required_but_unproven with explicit proof impact.
  workspace_recon_loop:
    description: "Phase 1-3 multi-skill workspace processing: inventory a source root, map atomic skill packages and plugin namespaces, validate the package graph, and report the next fanout/converge plan without importing yet."
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
        - rg_cli
      artifacts:
        - workspace_manifest
        - workspace_map_report
    steps:
      - run_command: inventory_source_folder
      - run_command: workspace_map_source
      - produce_artifact: workspace_manifest
      - produce_artifact: workspace_map_report
      - run_command: workspace_validate_manifest
      - note: Treat every folder containing SKILL.md as one atomic skill package. Do not import the parent root as a single skill.
      - note: Preserve plugin-shaped roots as namespaces when a folder has skills/ plus a plugin-named metadata folder containing a supported manifest, such as .agent-plugin/marketplace.json, .codex-plugin/plugin.json, .claude-plugin/plugin.json, or another supported plugin manifest. Treat .mcp.json and CLAUDE.md as compatibility markers only; use skill-safe public names to avoid collisions instead of flattening repeated local names.
      - note: Treat relative file references as hard dependencies. Treat plugin slash-command references as workflow links unless the manifest records a hard file dependency.
      - note: Use the workspace manifest for fanout planning; do not use skillspec index because router indexing serves runtime skill selection, not authoring recon.
      - note: Run recon as a sequential graph gate from compact command summaries; preserve the full workspace map and validation reports on disk instead of loading them into chat unless a blocker needs exact detail.
      - note: Stop after the validated graph in phases 1-3. Fanout import and converge generation belong to the next implementation phase.
      - note: Report plugin namespaces, package map, hard dependency graph, workflow references, warnings, and next fanout/converge phase from the validated workspace manifest.
      - note: If the validated source is a plugin workspace with more than 20 packages, report the quantity and agent follow-through risk before promotion, suggest the top 20 dependency-ready or entry-priority package IDs from manifest order as the starting scope, and require choose_large_plugin_port_scope before beginning semantic promotion.
  workspace_import_loop:
    description: "Phase 4 workspace fanout import: validate the workspace manifest, run per-package doctor/source-map/import-skill, preserve successful package outputs, and report failed or blocked packages."
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
      artifacts:
        - workspace_manifest
        - workspace_import_report
        - workspace_package_drafts
    steps:
      - run_command: import_checklist_entry
      - run_command: workspace_validate_manifest
      - run_command: workspace_import_packages
      - run_command: import_checklist_loop
      - produce_artifact: workspace_import_report
      - produce_artifact: workspace_package_drafts
      - note: Do not compile loaders, install skills, or refresh router indexes during workspace import.
      - note: Fanout is valid only for independent package import units with isolated output folders, source-map evidence, and package-scoped failures; keep dependency blockers and the phase boundary sequential.
      - note: Treat cached package imports as ready only when the workspace cache reports unchanged source hashes and required proof artifacts still exist.
      - note: Prefer the compact import summary in chat. Open per-package reports, source maps, or full generated specs only for failed packages, review, or exact proof.
      - note: Treat failed package imports as package-level failures and block dependents instead of deleting successful independent outputs.
      - note: Report built, cached, failed, skipped, and blocked packages with per-package doctor, source-map, and import evidence paths.
      - note: Generated package drafts are scaffolds, not finished ports. The next phase is workspace_scaffold_promotion_loop; do not converge, compile, install, align as complete, or report success until promotion is done.
  workspace_scaffold_promotion_loop:
    description: "Phase 5 workspace scaffold completion: classify generated package drafts, process the import checklist loop one package at a time with a manifest countdown, promote each scaffold into a reviewed SkillSpec from source evidence, and report remaining blockers before converge."
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
      artifacts:
        - workspace_manifest
        - workspace_package_drafts
        - workspace_promotion_report
    steps:
      - run_command: import_checklist_loop
      - run_command: workspace_converge_build
      - note: "Use converge as a classifier: generated mechanical scaffolds must report blocked until promoted. A package with id imported.skill, Imported SkillSpec scaffold description, empty routes, importer review_required notes, source/SKILL_md.old, or deps.toml review_required=true is not ready."
      - note: Use `skillspec import checklist ... --stage loop` as the work cursor. It must name one current package, its index/count, remaining packages, source-map cursor, package-local QA commands, required proof, and forbids before edits begin.
      - note: When choose_large_plugin_port_scope selected top_twenty_first or named_subset, process only that approved scope, report remaining package count, and continue later batches until the full requested plugin port is complete. Do not claim the scoped batch as a full plugin port.
      - note: Process one package per checklist loop result. Do not review one representative package, run a Ruby/Python YAML generator across packages, or bulk-apply routes/rules/tests to siblings.
      - note: For each package, read only its package-local source/SKILL_md.old, source-map lens block, doctor report, deps.toml, and referenced package summaries needed by its declared dependencies.
      - note: Promote real behavior into activation, routes, rules, elicitations, dependencies, imports, resources, code, artifacts, recipes, states, commands, closures, tests, and review_required. Do not auto-fill from vibes.
      - note: Do not create a wrapper that tells the harness to load the original SKILL.md as authoritative runtime instructions. The original prose may be preserved as evidence, but execution must be represented by source-backed routes, phase order, rules, tool boundaries, checks, dependencies, and proof obligations.
      - note: A promoted package must have at least one source-backed route or be explicitly classified as support/manual-only with a dependency/use relationship; empty-route entry skills remain blocked.
      - note: Preserve dependency evidence. Do not delete deps.toml entries or review_required notes just to pass QA; clear a review note only when the package has an evidence-backed replacement.
      - note: For each promoted package run validate, imports check, deps check, and scenario tests or record the exact blocker. Keep package failures isolated and block dependents.
      - note: For each promoted package write .skillspec/workspace-promotion.json with schema skillspec/workspace-promotion/v0, status reviewed, package_id, current source_sha256, spec_sha256, optional source_map_sha256, and true review flags for activation, routes, rules, dependencies, checks/tests, and proof. This is package-local promotion proof, not final alignment proof.
      - note: After each package, rerun the import checklist loop. The countdown must advance to the next package or report the exact blocker; do not print full package specs in chat.
      - produce_artifact: workspace_promotion_proof
      - produce_artifact: workspace_promotion_report
      - note: Run workspace converge only after all installable packages are promoted or intentionally blocked. Converge blocking on a scaffold is a correct signal to return to the import checklist loop for the named package, not a terminal final-response blocker.
  workspace_converge_loop:
    description: "Phase 6 workspace converge: verify reviewed package drafts and dependency readiness against the workspace graph before compile or install."
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
      artifacts:
        - workspace_manifest
        - workspace_package_drafts
        - workspace_converge_report
    steps:
      - run_command: workspace_validate_manifest
      - run_command: workspace_converge_build
      - produce_artifact: workspace_converge_report
      - note: Treat ready packages as compile candidates only after their dependencies are also ready.
      - note: Keep convergence sequential at the graph level even when checks are computed internally in parallel; do not let a ready independent package erase blocked or failed dependency evidence.
      - note: Prefer the compact convergence summary in chat and use report paths for the detailed proof.
      - note: Do not compile loaders, install skills, or refresh router indexes during convergence.
      - note: Report ready, failed, blocked, and missing packages. If any package is not ready, route back to the package promotion or repair loop with the exact next command; stop only when user approval, credentials, inaccessible source, a policy waiver, or another external state change is required.
  workspace_compile_loop:
    description: "Phase 6 workspace compile: recheck convergence, compile ready package specs into SKILL.md loaders, and report compile readiness before install."
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
      artifacts:
        - workspace_manifest
        - workspace_package_drafts
        - workspace_converge_report
        - workspace_compiled_loaders
        - workspace_compile_report
    steps:
      - run_command: workspace_validate_manifest
      - run_command: workspace_converge_build
      - run_command: workspace_compile_build
      - produce_artifact: workspace_compiled_loaders
      - produce_artifact: workspace_compile_report
      - note: Compile only packages that converged as ready and whose dependencies compiled successfully.
      - note: Compile may batch independent ready packages only when outputs are package-local; dependency ordering, missing-package blockers, and compile failure propagation stay sequential.
      - note: Prefer the compact compile summary in chat and keep generated loaders and detailed compile reports as artifact paths unless exact review is needed.
      - note: Do not install skills, retire existing skills, mutate harness roots, refresh router indexes, or change visibility during workspace compile.
      - note: Report compiled, failed, blocked, missing, and skipped packages. Continue to Phase 7 install planning only when compile succeeds; otherwise route back to converge or package promotion with the exact next command.
  workspace_install_loop:
    description: "Phase 7 workspace install: dry-run the compiled workspace install, block collisions before mutation, install packages in dependency order, report entry/support visibility, and keep router refresh separate."
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
      artifacts:
        - workspace_manifest
        - workspace_compiled_loaders
        - workspace_compile_report
        - workspace_install_report
        - workspace_install_manifest
    steps:
      - run_command: workspace_validate_manifest
      - run_command: workspace_install_dry_run
      - produce_artifact: workspace_install_report
      - note: Review the dry-run report before actual install; missing loaders, unapproved folder collisions, unapproved public-name collisions, blocked dependencies, or surprising visibility targets must stop the install.
      - note: Use --retire-existing by default after approval so old active folders, workspace/plugin parent folders, or same-public-name collisions are backed up and removed; use --install-slug-policy local-name only for single-package canonical replacement/upgrade installs such as rote-setup.
      - note: Keep workspace-path for multi-skill and plugin-shaped installs; local-name validation rejects those shapes because it flattens source-local identity.
      - run_command: workspace_install_packages
      - produce_artifact: workspace_install_manifest
      - produce_artifact: workspace_install_report
      - note: Use workspace_install_apply_visibility instead of the plain install command when the user wants native visibility metadata written; the reversible manifest is workspace-visibility.manifest.json by default.
      - note: For multi-skill and plugin-shaped manifests, install the source parent folder, copy non-skill parent files, and replace the source skill package subtree with compiled package folders at the same relative paths rather than flattened top-level package folders.
      - note: Keep install, visibility mutation, collision handling, and router-refresh advice sequential; do not parallelize writes to harness roots.
      - note: Prefer compact install counts and metrics in chat while preserving install manifests and visibility manifests on disk.
      - note: Do not refresh router indexes or silently overwrite existing skills during workspace install; router refresh remains a separate runtime command after install.
  local_porting_loop:
    description: End-to-end local conversion from prose folder to reviewed SkillSpec and value report.
    ordered: true
    requires:
      resources:
        - source_skill_md
      dependencies:
        - skillspec_cli
        - rg_cli
      artifacts:
        - preserved_source
        - doctor_report
        - source_map
        - mechanical_draft
        - dependency_ledger
        - reviewed_spec
        - value_report
    steps:
      - run_command: inventory_source_folder
      - run_command: doctor_source_skill
      - run_command: source_map_create
      - run_command: source_map_coverage
      - run_command: source_map_lens
      - run_command: source_map_nodes
      - run_command: source_map_dependencies
      - run_command: source_map_code
      - run_command: source_map_stale
      - note: >-
          Use source lens as the progressive review cursor: inspect one parsed
          block, port that block into matching SkillSpec constructs, validate
          the local spec, record its source_hash and structural target in
          coverage proof, then move to the next cursor. Do not script a single
          bulk rewrite across all blocks.
      - note: Use source-map handles and --view full for exact spans instead of loading large source files wholesale.
      - run_command: preserve_source_skill
      - run_command: grammar_sensemake_index
      - run_command: grammar_sensemake_porting
      - run_command: import_skill_draft
      - run_command: sensemake_draft
      - run_command: grammar_checklist_import
      - load_resource: source_skill_md
      - note: Before semantic promotion, inspect and complete the scaffolded deps.toml generated by import-skill. Preserve dependency evidence from source prose, references, helper scripts, command examples, package manifests, and fenced code imports, but classify it before creating a hard dependency. Record executable commands as cli only when the skill invokes them, live services/APIs only when the skill needs them to function, package dependencies only from package-manager evidence, and example-code/user-app imports as reference/example evidence unless reviewed into skill runtime. Quarantine invalid or low-confidence candidates such as Optional., TABLE, HTTP methods like GET, placeholders, and private/source variable names instead of blocking install.
      - produce_artifact: dependency_ledger
      - run_command: inspect_dependency_ledger
      - ask: approve_dependency_surface
      - run_code: review_and_promote_draft
      - note: If source code was found in source prose or sibling files, split durable snippets into resource files and declare matching resources/code entries before QA.
      - produce_artifact: reviewed_spec
      - run_command: validate_spec
      - run_command: imports_check
      - run_command: deps_check_all
      - run_command: test_spec
      - run_command: compile_codex_skill
      - run_command: run_checklist_entry
      - run_command: run_loop
      - run_command: run_checklist_loop
      - run_command: plan_phase_order
      - run_command: act_named_phase
      - note: >-
          For workspace/plugin imports, review packages in manifest order as a
          visible countdown: package <index>/<count>, <remaining_after>
          remaining. For each package, read its own source/SKILL_md.old and
          source map, fix that package spec, run validation/deps/tests/compile
          checks for that package, and write a package-local
          workspace-promotion.json with review_session matching the imported
          package countdown plus source_obligation_coverage rows containing the
          source lens source_hash and target kinds that match the lens-required
          constructs. Never review one representative package and bulk-apply
          that promotion to the rest.
      - note: Record routine successful phase and requirement proof rows with progress_checkpoint once. Do not hand-author event JSONL for routine rows, and do not run progress_record_requirement or progress_record_phase for successful routine rows; those low-level commands are only for foreground blockers, failures, or debugging.
      - note: Run trace_align once to create <trace-dir>/proof-digest.json. If rows are missing, report partial alignment unless the evidence was captured when the work happened. Do not create route, obligation, elicitation, or phase proof rows after the fact just to make alignment pass.
      - run_command: progress_checkpoint
      - run_command: progress_show
      - run_command: decide_demo
      - run_command: run_checklist_exit
      - run_command: trace_align
      - run_command: value_report
      - note: >-
          If the source folder is inside a Git checkout, use the port report's
          detected repo guidance or inspect the local .git metadata to recommend
          a pull request after semantic review, QA, compile, local install,
          harness restart, and a real agent interaction with the
          SkillSpec-backed skill. The PR should include the baseline Doctor
          report, reviewed skill.spec.yml, compiled SKILL.md loader, deps.toml,
          preserved source material, and alignment/value report. Do not create
          branches, push, or open a PR unless the user explicitly asks.
  remote_porting_loop:
    description: Stage a public remote source and continue through the local porting loop.
    ordered: true
    requires:
      dependencies:
        - git_cli
        - rg_cli
        - skillspec_cli
    steps:
      - ask: approve_remote_source_access
      - run_command: stage_remote_folder
      - note: Read source stage source_shape.kind before narrating the staged source. If it returns selected_source_path and source_shape.kind is simple_skill, use that local folder as the source and do not run additional remote discovery. If source_shape.kind is multi_skill_workspace or plugin_workspace, run doctor checklist/import checklist against staged_source_path and route through workspace map/import/converge/compile/install, preserving source shape. Ask choose_candidate_skill using candidates.source_path only when the user explicitly asked for one atomic skill. If staging returns no candidates or fails, stop with the exact staging error unless the user approves troubleshooting.
      - note: Do not search the web, fetch raw GitHub URLs, or run ad hoc git ls-tree/sparse-checkout loops to locate the same URI; source stage is the explicit candidate-discovery gate, and source map owns direct URI sparse staging for source-map evidence.
      - branch:
          if: selected source is one atomic skill
          then: local_porting_loop
          otherwise: workspace_recon_loop
  install_reviewed_skill_loop:
    description: Compile and install only after QA and explicit approvals.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
      artifacts:
        - reviewed_spec
        - compiled_codex_skill
    steps:
      - run_command: validate_spec
      - run_command: imports_check
      - run_command: deps_check_all
      - run_command: plan_phase_order
      - run_command: act_named_phase
      - run_command: progress_show
      - ask: approve_dependency_surface
      - run_command: compile_codex_skill
      - run_command: list_install_targets
      - run_command: install_dry_run
      - ask: approve_install_targets
      - ask: approve_retire_existing_skill
      - note: If the user chooses `install_new_name`, use `install_skill_new_name` with an explicit non-conflicting name instead of `install_skill`.
      - run_command: install_skill
      - note: >-
          After the retired replacement has been installed locally, restart the
          target harness and interact with the new SkillSpec-backed skill
          through the agent on a representative task before recommending
          publication back to the source skill repository through a pull
          request. Include install/retirement behavior and alignment proof in
          the PR notes. Do not push or open the PR unless the user explicitly
          asks.
  router_install_loop:
    description: Post-install router setup through the prompt skill.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
    steps:
      - run_command: router_help
      - run_command: list_install_targets
      - note: Choose roots explicitly; do not use or ask for a separate router root.
      - run_command: router_install
      - run_command: verify_router_install
      - run_command: router_guard
      - note: Treat direct skillspec index as router-catalog construction only. It is not source/workspace recon and does not activate disabled router mode.
      - note: Report guard hook paths from harness_hooks and whether router guard returned first_hop_ready. Router-first is guaranteed only when managed hooks are loaded by the active harness.
      - note: Report that every request should route through skill-router first, but ordinary prompts should use the fast path after guard readiness; run one route query, do not run index status, and load a domain skill only when route JSON says decision use_skill with a non-null selected skill. Duplicate physical roots are collapsed by logical skill identity before matching, and harness/root context only chooses the installed copy. The router is provider-neutral; execution substrate policy belongs to the selected skill or durable-executor. For bypass or ambiguous, continue normal behavior instead of forcing an unrelated skill.
      - note: Report whether durable-executor is present and remains implicit, or whether durable first-hop is unavailable.
  router_update_loop:
    description: Backup-first router maintenance through the prompt skill.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
    steps:
      - run_command: router_help
      - run_command: router_update
      - note: Report the backup path, every updated router root, preparedness status, durable-executor status, and the harness restart warning.
      - note: For index-only repair of an installed router, prefer skillspec router index refresh over direct skillspec index.
  router_switch_loop:
    description: Reversible router mode switch through the prompt skill.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
    steps:
      - run_command: router_help
      - run_command: router_enable_or_disable
      - run_command: verify_router_install
      - note: For enable, report index rebuild, preparedness, harness_hooks installed status, and that the router becomes the first hop when managed hooks are loaded. For disable, report harness_hooks removed/missing status, that router is explicit-only, routed skills are implicit/default, files remain installed, and active harnesses should restart.
      - note: If disabled, direct skillspec index may write a catalog, but it will not make router selection active until router mode is enabled.
  router_policy_loop:
    description: Read-before-write router preference policy setup through SQLite-backed policy/profile commands.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
    steps:
      - run_command: router_policy_help
      - run_command: router_profile_help
      - run_command: router_policy_list_or_show
      - note: Before changing an existing rule or profile, run router_policy_get for the target id and preserve existing priority, anchor, predicates, and targets unless the user asks to replace them.
      - run_command: router_policy_set_profile
      - run_command: router_policy_set_rule
      - run_command: router_policy_get
      - run_command: router_policy_explain
      - run_command: router_profile_apply_or_clear
      - note: Report the active profile, matched policy rule, selected or bypass decision, base score, policy score, and whether policy_passthrough applied.
  status_inspection_loop:
    description: Read-only SkillSpec lifecycle, roots, router-index, and skill inventory inspection.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
    steps:
      - run_command: status_help
      - run_command: status_lifecycle_inventory
      - note: Report router installed/enabled state, durable-executor installed/enabled state, supported and scanned roots, router index updated/stale data, and SkillSpec-backed versus legacy skill names and counts.
  durable_executor_install_loop:
    description: Optional durable-executor setup through an explicit local source folder and the managed lifecycle command.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
        - rg_cli
        - rote_cli
    steps:
      - run_command: durable_help
      - run_command: verify_rote_cli
      - run_command: find_durable_executor
      - ask: choose_durable_source
      - ask: approve_install_targets
      - run_command: durable_install
      - run_command: verify_durable_executor
      - note: Report the managed config path, every installed durable-executor folder, router refresh status if present, and the harness restart warning.
  durable_executor_update_loop:
    description: Backup-first durable-executor maintenance through the managed lifecycle command.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
        - rote_cli
    steps:
      - run_command: durable_help
      - run_command: verify_rote_cli
      - run_command: durable_update
      - run_command: verify_durable_executor
      - note: Report the backup path, every updated durable-executor folder, router refresh status if present, and the harness restart warning.
  durable_executor_switch_loop:
    description: Reversible durable-executor implicit-invocation switch through the prompt skill.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
    steps:
      - run_command: durable_help
      - run_command: durable_enable_or_disable
      - run_command: verify_durable_executor
      - note: For enable, report the rote preflight and that durable-executor is implicit. For disable, report that durable-executor is explicit-only, files remain installed, and active harnesses should restart.
  durable_executor_delete_loop:
    description: Marker-guarded durable-executor removal through the managed lifecycle command.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
    steps:
      - run_command: durable_help
      - run_command: durable_delete
      - note: Report removed managed durable-executor folders, removed config, router refresh status if present, and the harness restart warning.
  observed_workspace_to_spec_loop:
    description: Create a reviewed SkillSpec-backed skill from observed durable execution evidence.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
        - rote_cli
      artifacts:
        - durable_workspace_report
        - observed_skill_spec
    steps:
      - ask: choose_observation_workspace
      - note: If the prompt contains a concrete task and no existing workspace, hand it to durable-executor first and resume with the returned workspace.
      - run_command: observe_workspace_stats
      - run_command: observe_workspace_log
      - run_command: observe_workspace_meta
      - ask: approve_observed_result_for_synthesis
      - run_command: synthesize_from_workspace
      - produce_artifact: observed_skill_spec
      - run_command: validate_spec
      - run_command: deps_check_all
      - run_command: test_spec
      - run_command: decide_demo
      - run_command: trace_align
      - run_command: value_report
code:
  review_and_promote_draft:
    language: text
    kind: validator
    source:
      inline: "Guide the promotion pass; do not auto-fill the scaffold. For workspace fanout, split packages into dependency-ready batches from skillspec.workspace.yml and process only independent packages in bounded parallel increments, normally 3 to 5 packages per batch. For each package, use its own source/SKILL_md.old, source map, doctor report, deps.toml, and declared dependency summaries; keep edits and proof package-local. For each source-backed obligation, decide whether it becomes activation, route, rule, elicitation, dependency, import, resource, code, artifact, recipe, state, command, closure, test, review_required, or metadata. Keep each package pass short and deliberate: choose real activation/routes or explicitly classify the package as support/manual-only, promote only evidenced behavior, fill coverage rows for promoted and unresolved obligations, then run the QA ladder once per package. The mechanical draft is evidence, not authority. Do not consult existing ports, repo history, memory, or examples unless the user explicitly asks. Quote YAML string scalars that contain colon-space, especially elicitation questions, descriptions, steps[].note, recipe/procedure notes, and review notes. Artifact produced_by/consumed_by entries are executable refs only: command, code, or recipe; never route or rule. When source code appears in source prose or sibling files, preserve it as package-local resource files and connect it through resources/code with provenance. Preserve every dependency mention in deps.toml with authority, risk, local status, install candidate, required workflows, and degraded proof impact; do not delete dependencies to make validation or proof pass. After each batch, report promoted, still_scaffolded, failed, blocked, and next_batch package ids; do not converge, compile, install, or align the workspace as complete while any installable package remains a mechanical scaffold."
    provenance:
      resource: source_skill_md
      heading: Creation Procedure
    purpose: Semantic review checklist that turns prose obligations into typed SkillSpec constructs.
    requires:
      resources:
        - source_skill_md
      artifacts:
        - mechanical_draft
        - coverage_matrix
    inputs:
      - mechanical_draft
      - preserved_source
    outputs:
      - reviewed_spec
    safety:
      mutates_input: false
      writes_files: true
      network: false
      notes:
        - Produces a reviewed spec but does not install or run imported snippets.
  synthesize_observed_skill_spec:
    language: text
    kind: transform
    source:
      inline: "Read the durable workspace report, map observed user intent, capability-selection evidence, commands, dependencies, files, prompts, errors, outputs, and proof gaps into a reviewed skill.spec.yml. Preserve why a substrate such as a Parallel CLI, rote adapter, browser handoff, or CLI fallback was selected, and record alternatives rejected by policy or readiness. Use observed facts as evidence, mark inferred behavior in the coverage matrix, do not turn a transcript into a brittle command list, and do not replay mutating workspace actions without approval."
    provenance:
      resource: source_skill_md
      heading: Post-install multiplexer
    purpose: Convert a named durable rote workspace into a SkillSpec-backed skill contract; this path is rote-specific and depends on rote workspace evidence.
    requires:
      dependencies:
        - skillspec_cli
        - rote_cli
      artifacts:
        - durable_workspace_report
        - coverage_matrix
    inputs:
      - durable_workspace_report
    outputs:
      - observed_skill_spec
    safety:
      mutates_input: false
      writes_files: true
      network: false
      notes:
        - Observes local rote workspace evidence and synthesizes a draft; it does not replay commands or install the result.
states:
  start:
    do:
      - run_grammar_preflight
    next: resolve_source
  resolve_source:
    do:
      - inventory_source_folder
      - source_map_create
      - source_map_coverage
      - source_map_nodes
      - source_map_dependencies
      - source_map_code
      - source_map_stale
    next: import_draft
  import_draft:
    do:
      - import_skill_draft
      - sensemake_draft
    next: review
  review:
    do:
      - coverage_review_loop
      - review_and_promote_draft
    next: qa
  qa:
    do:
      - run_structural_qa
    next: prove
  prove:
    do:
      - prove_value
    next: done
  done:
    do:
      - generate_value_report
snippets:
  execution_strategy_shape:
    text: |
      Execution strategy SOP:
      - Treat selected route phases as sequential gates unless the route or command explicitly permits isolated package fanout.
      - Parallelize only independent read/build/proof units with package-scoped output directories, trace labels, and evidence paths.
      - Keep dependency ordering, convergence gates, installs, visibility writes, router lifecycle, destructive actions, and user approvals sequential.
      - In chat, report the strategy chosen and the reason when the source has many packages, plugins, cross-skill references, or expensive proof work.
  compact_evidence_shape:
    text: |
      Token economy SOP:
      - Prefer compact workspace summaries, quiet trace_align artifacts, --view index, --view summary, source-map handles, alignment rows, and artifact paths.
      - Keep full reports, source maps, loaders, manifests, logs, and JSON proof on disk.
      - Open full JSON, full reports, or full source spans only when the task, review, blocker, or proof gap needs exact evidence.
      - Keep SkillSpec implementation details in the background: do not narrate ledger writes, raw progress commands, trace plumbing, checkpoint rows, or alignment internals as user-visible progress.
      - For Doctor/source-shape diagnostic routes, answer from the doctor report and stop; do not create source maps, progress ledgers, final-response proof, or alignment summaries unless the user explicitly asks for proof.
      - Do not run `skillspec progress checkpoint --help`, `skillspec progress batch --help`, `skillspec progress record --help`, or `skillspec query ... command:progress_*` during normal execution; the guide emits the checkpoint flag shape and quiet command.
      - For source maps, use `nodes --view index` and exact handles for full text. Do not run collection-level `nodes --view summary` or `nodes --view full` in chat.
      - Treat durable-executor workspace stats as measured token accounting and direct CLI --summary blocks as estimated output economy.
      - Record direct-run summary metrics with progress_stats_summary_metrics before trace_align; otherwise alignment must report token usage as not recorded.
      - Record successful routine evidence rows with one quiet progress_checkpoint command at natural boundaries: after dry-run/planning, after mutation, after verification, before route fulfillment, and before final alignment.
      - Run one initial quiet trace_align with proof-digest, one quiet progress_checkpoint or progress_batch for grouped final proof, and one final quiet trace_align; do not rerun alignment after each individual proof row.
      - Surface individual progress rows only for failures, blocked requirements, or proof gaps the user must understand.
      - Report metrics_source with token numbers; say not recorded instead of inventing savings when neither measured nor estimated metrics exist.
  dependency_surface_shape:
    text: |
      Imported dependency preservation SOP:
      - import-skill creates deps.toml beside skill.spec.yml and declares it as a file dependency/artifact.
      - Complete the scaffolded ledger for every imported/shareable skill.
      - If review finds no dependencies, keep the scaffold with dependency_count = 0. Do not replace it with a byte-empty deps.toml.
      - Extract dependency evidence from SKILL.md, referenced docs, helper scripts, fenced code imports, command examples, and package manifests, but do not turn arbitrary prose, comments, placeholders, or example app snippets into executable dependencies.
      - Classify dependency source before creating [[dependency]]: cli only for commands the skill invokes, api/service only for live services the skill requires, package only from package-manager evidence, and reference/example for docs snippets or user-project code.
      - Quarantine low-confidence or invalid candidates such as Optional., Required, Replace, TABLE, GET, <personProp1>, and private/source variable names instead of adding them to [[dependency]] or blocking downstream packages.
      - Record authority as declared, command_evidence, package_manager_evidence, api_required, reference_import, example_only, or inferred_review_required.
      - Record local_status as present, missing, unknown, provisionable, deferred, or required_but_unproven.
      - Record package risk, install candidate, required workflows, degraded_without, proof substitution, and user approval or waiver.
      - Do not mutate the dependency set to make QA pass. Missing required dependencies make proof partial unless installed or explicitly deferred.

      Example:
      [[dependency]]
      id = "pypdf"
      ecosystem = "python"
      authority = "source_required"
      source = "SKILL.md:30"
      reason = "Used for PDF read/write, merge, split, rotate, watermark, and encryption workflows."
      local_status = "missing"
      required_for = ["pdf_operations"]
      degraded_without = true
      risk = "Third-party Python package; install only with user approval."
      install = "pip install pypdf"
closures:
  choose_execution_strategy:
    description: State whether the active work stays sequential or uses package-scoped fanout, and preserve the reason when many packages, plugins, cross-skill references, or expensive proof work are involved. For plugin workspaces with more than 20 packages, include the approved top-20, named-subset, or all-packages scope and the remaining package count.
  preserve_compact_evidence:
    description: Keep large proof artifacts on disk, report compact summaries plus paths in chat, and load full detail only for exact review, blockers, or proof gaps.
  fill_coverage_matrix:
    description: Record prose_span, obligation, skillspec_construct, confidence, status, and review_note before semantic edits or install.
  split_source_code_into_resources:
    description: When source material contains scripts or code blocks, preserve each durable code surface as a package-local resource file, declare matching resources/code entries with provenance, and reference them from commands, recipes, tests, artifacts, or review notes.
  preserve_dependency_ledger:
    description: Keep the scaffolded deps.toml beside skill.spec.yml for imported/shareable skills, preserving dependency evidence with typed authority, package risk, local status, install candidate, required workflows, degraded proof impact, and approval or waiver. Do not promote arbitrary prose, comments, placeholders, or reference/example code imports into hard runtime dependencies; quarantine low-confidence candidates until reviewed.
  produce_workspace_manifest:
    description: Write skillspec.workspace.yml with every atomic skill package, plugin namespace, skill-safe public name, deterministic install slug, package kind, cross-skill reference, and inferred hard depends_on edge found during structure recon.
    commands:
      - workspace_map_source
  validate_workspace_graph:
    description: Check that the workspace graph has valid package paths, one SKILL.md per package, unique install slugs, no self-dependencies, no cycles, and no uncovered hard cross-package references; plugin slash-command workflow references may cross packages without depends_on edges.
    commands:
      - workspace_validate_manifest
  produce_workspace_import_report:
    description: Run workspace fanout import and write a report that names built, failed, skipped, and blocked packages plus per-package evidence paths.
    commands:
      - workspace_import_packages
  promote_workspace_scaffold_batches:
    description: Complete generated workspace package scaffolds in dependency-ready bounded batches before converge, compile, or install.
    code:
      - review_and_promote_draft
  produce_workspace_promotion_report:
    description: Write a compact promotion report naming promoted, still-scaffolded, failed, blocked, and next-batch package ids.
    code:
      - review_and_promote_draft
  produce_workspace_converge_report:
    description: Run workspace converge and write a graph-level proof report that names ready, failed, blocked, and missing package drafts, dependency-readiness status, validation warnings, and cross-package reference counts.
    commands:
      - workspace_converge_build
  produce_workspace_compile_report:
    description: Run workspace compile and write a report that names compiled, failed, blocked, missing, and skipped packages plus loader paths and Phase 7 install guidance.
    commands:
      - workspace_compile_build
  produce_workspace_install_report:
    description: Run workspace install dry-run or install and write a report that names installed, planned, failed, blocked, and missing packages plus target paths, collision blockers, visibility policy, and router-refresh advice.
    commands:
      - workspace_install_dry_run
      - workspace_install_packages
      - workspace_install_apply_visibility
  produce_workspace_install_manifest:
    description: Install compiled workspace packages and write workspace-install.manifest.json with package ids, install slugs, public names, dependencies, target paths, and intended visibility.
    commands:
      - workspace_install_packages
      - workspace_install_apply_visibility
  produce_workspace_visibility_plan:
    description: "Report the workspace visibility policy before router refresh: entry packages implicit by default, shared/helper/wrapper packages manual-only when --apply-visibility is used, and policy none/all-* when explicitly selected."
    commands:
      - workspace_install_dry_run
      - workspace_install_packages
      - workspace_install_apply_visibility
  report_workspace_import:
    description: Summarize the workspace import result, generated mechanical package drafts, package-level failures, blocked dependents, and the next scaffold-promotion batch plan without converging, compiling, or installing anything.
    commands:
      - workspace_import_packages
  report_workspace_promotion:
    description: Summarize batch scaffold promotion results, including promoted, still-scaffolded, failed, blocked, and next-batch package ids before converge.
    code:
      - review_and_promote_draft
  report_workspace_converge:
    description: Summarize the workspace converge result, generated spec readiness, dependency blockers, missing package drafts, validation warnings, and Phase 6 or per-package compile next steps without compiling or installing anything.
    commands:
      - workspace_converge_build
  report_workspace_compile:
    description: Summarize the workspace compile result, generated loader paths, dependency compile blockers, missing package drafts, validation warnings, and Phase 7 install next steps without installing or refreshing router state.
    commands:
      - workspace_compile_build
  report_workspace_install:
    description: Summarize the workspace install dry-run or install result, installed target paths, blockers, install manifest, visibility policy or manifest, and the fact that router refresh is separate.
    commands:
      - workspace_install_dry_run
      - workspace_install_packages
      - workspace_install_apply_visibility
  report_workspace_recon:
    description: Summarize plugin namespaces, workspace package map, hard dependency graph, workflow references, unresolved references, duplicate public-name warnings, and the next fanout/converge phase without importing packages yet.
    commands:
      - workspace_map_source
      - workspace_validate_manifest
  report_source_shape:
    description: Summarize the doctor report, including shape.kind, analysis_status, recommended_command, skill_files count, plugin namespaces if any, negative signals, frontmatter discovery risk, agent or workspace risk, and package count. Do not source-map, import, port, compile, install, choose a remote candidate, record progress proof, or run alignment during read-only inspection.
    commands:
      - doctor_source_shape
  offer_install_after_import:
    description: After a successful import/port request, state that no harness install was performed by default, name the reviewed artifact or workspace build, and offer the exact dry-run install command or workspace install dry-run command as the next optional step.
  produce_mechanical_draft:
    description: Save the import-skill output and report its inferred deps, commands, imports, and review notes.
  produce_reviewed_spec:
    description: Write a reviewed skill.spec.yml that connects source obligations to typed constructs.
  run_structural_qa:
    description: Run validate, imports check, deps check, command-level deps check, scenario tests, phase plan, and current-phase action checklist.
    commands:
      - validate_spec
      - imports_check
      - deps_check_all
      - deps_check_command
      - test_spec
      - plan_phase_order
      - act_named_phase
  prove_value:
    description: Run a realistic phase plan, action checklist, progress ledger update, decision, align the trace, and grade unproven execution evidence honestly.
    commands:
      - plan_phase_order
      - act_named_phase
      - progress_record_requirement
      - progress_record_phase
      - progress_stats_durable_workspace
      - progress_stats_summary_metrics
      - progress_show
      - decide_demo
      - trace_align
  generate_value_report:
    description: Print extracted triggers, routes, rules, dependencies, commands, tests, resources moved out of prompt path, phase progress, token consumption and savings, decision trace, alignment summary, and contract-quality grades.
  retire_existing_skill_when_approved:
    description: When replacing an existing active skill, install with --retire-existing after approval, report the backup path, retire same-public-name collisions even when the old skill lives in a different folder, and avoid leaving duplicate old/new skills discoverable in harness roots. If the user chooses side-by-side testing, require a distinct --name or install slug instead.
  show_dependency_surface:
    description: Show dependency ids, source authority, local status, permission sensitivity, install risk, provision choices, missing required dependencies, optional/example dependencies, and degraded proof impact before compile/install/proof approval.
  report_dependency_waiver:
    description: If any required dependency is missing, report the missing package, source authority, affected workflows, proof substitution, user approval or waiver, and why final alignment is partial or blocked.
  verify_router_installed:
    description: Report the router install/index status, selected roots, router skill location, and whether a separate router root was avoided.
    commands:
      - router_install
      - verify_router_install
  verify_router_updated:
    description: Report the router update backup path, updated recorded roots, preparedness state, durable-executor status, and harness restart warning.
    commands:
      - router_update
  verify_router_policy:
    description: Report the active router policy profile, stored profile/rule readback, representative explain output, selected skill or policy passthrough bypass, base score, policy score, and matched rule.
    commands:
      - router_policy_get
      - router_policy_explain
  report_skillspec_status:
    description: Report router installed/enabled state, durable-executor installed/enabled state, supported and scanned roots, router index exists/stale/updated data, and SkillSpec-backed versus legacy skill counts and names.
    commands:
      - status_lifecycle_inventory
  verify_durable_optional_status:
    description: Report whether durable-executor is installed, skipped, or unavailable, and whether durable lifecycle currently leaves it implicit or explicit-only.
    commands:
      - find_durable_executor
      - verify_durable_executor
  produce_observed_workspace_spec:
    description: Produce a reviewed SkillSpec from durable workspace evidence, including observed commands, dependencies, artifacts, tests, token stats, and explicit proof gaps.
    commands:
      - observe_workspace_stats
      - observe_workspace_log
      - observe_workspace_meta
      - synthesize_from_workspace
      - validate_spec
      - test_spec
  capture_observation_task:
    description: Preserve the quoted or otherwise supplied real task that durable-executor should run before synthesis, without replacing it with a vague workspace placeholder.
  handoff_observation_task_to_durable_executor:
    description: Hand the observation task to durable-executor with return_to=skillspec so the task is executed once through durable workspace evidence before SkillSpec synthesis resumes.
  capture_observation_workspace:
    description: Record the durable workspace name, trace directory, artifacts, and return packet produced by durable-executor before inspecting logs or stats.
  record_capability_selection_ledger:
    description: Preserve why the execution substrate was chosen, including detected tools such as Parallel CLI, accepted or rejected adapter/browser options, readiness checks, and policy gates.
  report_alignment_status:
    description: Report trace alignment with Decision replay, Phase order, Requirements, Missing proof, Forbidden actions, and Alignment pass/partial/fail instead of a bare unproven label.
  report_degraded_status:
    description: Mark the generated skill draft-only when grammar, imports, deps, validate, test, or compile capability is missing.
  produce_decision_trace:
    description: Preserve the trace directory from the demo decision, including trace.jsonl, execution.jsonl, and progress.json when present.
  produce_return_packet:
    description: Return status, selected route, artifacts, evidence handles, blockers, and trace paths to durable-executor when invoked through a durable handoff.
trace:
  mode: event_log
  required: true
  record:
    - input_received
    - spec_loaded
    - rule_evaluated
    - rule_matched
    - route_selected
    - route_order_set
    - forbid_added
    - elicitation_requested
    - after_success_scheduled
    - outcome_recorded
proof:
  metrics:
    - grammar commands run before import or revision
    - multi-skill and plugin-shaped source roots are mapped with skillspec.workspace.yml, preserving plugin namespaces and validating before fanout import planning
    - workspace fanout import writes one generated package draft per atomic skill and reports built, failed, skipped, and blocked packages
    - workspace converge validates generated package drafts against the workspace graph and reports ready, failed, blocked, missing, validation warnings, and dependency-readiness proof before compile or install
    - workspace compile rechecks convergence, writes SKILL.md loaders only for ready packages whose dependencies compiled, and reports compiled, failed, blocked, missing, and skipped packages before install
    - workspace install dry-runs compiled package installs, blocks collisions before mutation, writes install and visibility proof, optionally applies native visibility metadata, and keeps router refresh separate
    - "execution strategy is explicit: sequential at phase, dependency, install, visibility, router, and approval gates; package fanout only for independent units with isolated artifacts"
    - "compact evidence mode is used by default: summaries, handles, alignment rows, and report paths are shown in chat while full proof remains on disk"
    - "wall-clock and token metrics are reported with their source: durable-executor workspace stats are measured, direct CLI summary blocks are estimated output economy, and missing metrics are stated as not recorded"
    - source package mapped with source-map.json before import and exact spans queried as needed
    - post-install router setup avoids a separate router root and verifies the router index
    - durable-executor install is optional and source-aware
    - observed durable workspace synthesis uses named rote workspace stats and logs
    - field imports do not consult existing ports, repo history, memory, or examples unless the user explicitly asks
    - mechanical draft sensemade before semantic edits
    - coverage matrix completed before install
    - source code in source material is preserved as package-local resources/code with provenance
    - validate/imports/deps/test pass
    - phase plan and current-phase action checklist produced
    - progress ledger and progress report generated when proving value
    - demo decision trace captured
    - trace alignment summary reported as pass, partial, or fail with missing proof rows
