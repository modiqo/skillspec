elicitations:
  choose_candidate_skill:
    question: Which discovered SKILL.md should be ported?
    required_when:
      - route: remote_skill_port
    choices:
      - id: first_candidate
        label: First candidate
        description: Port the highest-ranked discovered skill folder.
      - id: named_path
        label: Named path
        description: Use the exact path supplied by the user.
      - id: stop_and_list
        label: List only
        description: Stop after listing candidates for explicit selection.
    default: stop_and_list
  approve_remote_source_access:
    question: May I stage the public remote source locally for read-only import?
    required_when:
      - route: remote_skill_port
      - route: remote_source_import_install
    choices:
      - id: approve_read_only
        label: Approve read-only staging
        description: Clone or download the source into a temporary local folder without executing it.
      - id: local_source_only
        label: Use local source only
        description: Do not access the remote; wait for a local path.
    default: approve_read_only
  choose_large_plugin_port_scope:
    question: This plugin workspace has more than 20 skill packages, which creates follow-through risk. Which scope should be ported first?
    required_when:
      - route: remote_source_import_install
        predicate:
          user_says_any:
            - plugin with more than 20 skills
            - over 20 skills
            - more than 20 SKILL.md
            - 254 skills
            - large plugin workspace
            - PostHog/skills
      - route: local_source_import_install
        predicate:
          user_says_any:
            - plugin with more than 20 skills
            - over 20 skills
            - more than 20 SKILL.md
            - large plugin workspace
    choices:
      - id: top_twenty_first
        label: Top 20 first
        description: Port the top 20 dependency-ready or entry-priority packages from the workspace manifest, then continue remaining packages in later batches.
      - id: named_subset
        label: Named subset
        description: Port only the package IDs or plugin namespace paths the user names, then continue after review.
      - id: all_packages
        label: All packages
        description: Attempt the full plugin only after explicitly accepting quantity risk and longer follow-through time.
    default: top_twenty_first
  choose_durable_source:
    question: Which durable-executor source should be used?
    required_when:
      - route: install_durable_executor
    choices:
      - id: existing_installed
        label: Existing installed
        description: Use the durable-executor already present in a selected skill root.
      - id: supplied_source
        label: Supplied source
        description: Use the local durable-executor source folder supplied in the prompt.
      - id: skip_durable
        label: Skip durable
        description: Leave durable first-hop unavailable and report that router mode can still install.
    default: existing_installed
  choose_observation_workspace:
    question: Which durable execution evidence should be used?
    required_when:
      - route: observed_durable_workspace_to_skill
    choices:
      - id: run_task_first
        label: Run task first
        description: Use the concrete task in the prompt, run it through durable-executor, then observe the resulting workspace.
      - id: current_workspace
        label: Current workspace
        description: Observe the named rote workspace already active in this session.
      - id: named_workspace
        label: Named workspace
        description: Use the workspace name provided by the user.
    default: run_task_first
  approve_observed_result_for_synthesis:
    question: Here is the observed result and evidence summary. Is this satisfactory enough to synthesize a reusable SkillSpec, or should the observation be rerun/refined first?
    required_when:
      - route: observed_durable_workspace_to_skill
    choices:
      - id: satisfactory_for_skill_synthesis
        label: Satisfactory for synthesis
        description: Proceed only after the observed output, workspace stats, command log, metadata, dependency evidence, artifacts, and proof gaps have been shown and accepted.
      - id: rerun_or_refine_observation
        label: Rerun or refine
        description: Do not synthesize yet; rerun the durable observation or collect better evidence first.
    default: rerun_or_refine_observation
  approve_dependency_surface:
    question: Do you approve the imported dependency ledger and any missing dependency decisions for validation, proof, compile, or install?
    required_when:
      - route: compile_and_install_reviewed_skill
      - route: remote_source_import_install
    choices:
      - id: approve_checked_only
        label: Checked dependencies only
        description: Continue only when required dependencies are present or explicitly deferred in deps.toml with proof impact recorded.
      - id: draft_only
        label: Keep draft-only
        description: Do not install or release until missing dependencies are resolved.
      - id: defer_missing_with_waiver
        label: Defer missing
        description: Continue with partial proof only after missing dependencies, authority, install risk, and degraded workflows are recorded.
      - id: choose_provision
        label: Provision missing
        description: Ask before running any provision command for a missing tool.
    default: draft_only
  approve_install_targets:
    question: Which harness targets should receive the generated SkillSpec-backed skill?
    required_when:
      - route: compile_and_install_reviewed_skill
      - route: remote_source_import_install
    choices:
      - id: codex_and_agents
        label: Codex and Agents
        description: Install into both detected personal skill roots after dry-run.
      - id: codex_only
        label: Codex only
        description: Install only into the Codex skill root after dry-run.
      - id: agents_only
        label: Agents only
        description: Install only into the Agents skill root after dry-run.
    default: codex_and_agents
  approve_retire_existing_skill:
    question: If the target skill already exists in a harness root, should SkillSpec back up and remove the old active skill before installing the reviewed replacement?
    required_when:
      - route: compile_and_install_reviewed_skill
      - route: remote_source_import_install
    choices:
      - id: retire_existing
        label: Retire existing
        description: Back up the current active skill under SKILLSPEC_HOME/backups/retired-skills, remove it from harness discovery, then install the reviewed SkillSpec-backed replacement at the same name.
      - id: install_new_name
        label: Install new name
        description: Keep the old skill discoverable only when the user intentionally chooses a different installed name for side-by-side testing.
      - id: stop_before_install
        label: Stop before install
        description: Do not write harness roots until the retirement or side-by-side choice is explicit.
    default: retire_existing
dependencies:
  skillspec_cli:
    kind: cli
    description: SkillSpec CLI with grammar, import, validate, imports, deps, test, compile, plan, act, progress, decide, and trace commands.
    command: skillspec
    check:
      command: skillspec
    permission:
      required: false
      reason: Read-only checks and local compilation are safe, but install commands need explicit target approval.
      safety: local_read
    provision:
      elicit: approve_dependency_surface
      options:
        - id: install_from_repo
          label: Build from repo
          description: Build the checked-out workspace binary when developing SkillSpec itself.
          command: cargo build
          safety: local_write
  git_cli:
    kind: cli
    description: Required only for staging public GitHub repositories or tree URLs.
    command: git
    check:
      command: git
    permission:
      required: true
      reason: Remote staging performs network reads and writes a temporary local checkout.
      safety: network_read
  rg_cli:
    kind: cli
    description: Fast local inventory and candidate discovery for staged skill folders.
    command: rg
    check:
      command: rg
    permission:
      required: false
      safety: local_read
  cargo_cli:
    kind: cli
    description: Optional development fallback for building the checked-out SkillSpec binary when the installed CLI is stale.
    command: cargo
    check:
      command: cargo
    permission:
      required: true
      reason: Building from source writes local target artifacts.
      safety: local_write
  rote_cli:
    kind: cli
    description: Required when installing/updating durable-executor or creating a SkillSpec from observed durable execution evidence in a named rote workspace.
    command: rote
    check:
      command: rote
    permission:
      required: true
      reason: Observing a workspace reads local command logs, metadata, stats, and artifact references that may include sensitive user workflow evidence.
      safety: local_read
resources:
  source_skill_md:
    path: source/SKILL_md.old
    role: source_material
    description: Preserved full prose source for the skillspec skill before compilation replaces the visible loader; stored as SKILL_md.old so harnesses do not list it as another skill or Markdown source.
    used_by:
      - kind: route
        id: local_skill_port
      - kind: route
        id: revise_existing_skillspec
      - kind: recipe
        id: local_porting_loop
      - kind: artifact
        id: preserved_source
