        - namespaced skills
        - repeated skill names
        - parent folder with multiple skills
        - fanout converge
        - shared standards package
        - cross-skill references
        - cross references another skill
        - references another skill
        - coding-standards/SKILL.md
        - skill dependency graph
        - skill depends on another skill
        - plugin.json
        - .claude-plugin
        - plugin metadata manifest
        - CLAUDE.md plugin
