schema: skillspec/v0
id: dev.repo_readiness
title: repo readiness
description: Check a local repository against remote state, CI, contributors, and public profile context.

routes:
  - id: remembered_route
    label: Use saved repo readiness route
    rank: 10
  - id: local_cli
    label: Use local git and gh CLI
    rank: 20
  - id: tracked_background
    label: Run long local checks as a tracked background job
    rank: 25
  - id: connected_service
    label: Use GitHub service connection
    rank: 30
  - id: browser
    label: Use browser for public profile extraction
    rank: 40

rules:
  - id: local_repo_state_uses_cli
    when:
      user_says_any:
        - branch
        - in sync
        - local repo
    prefer: local_cli
    reason: Local branch state lives on this computer.

  - id: browse_profiles_uses_browser
    when:
      user_says_any:
        - browse profiles
        - social profile
        - public profile
    prefer: browser
    forbid:
      - native_search_as_answer
      - raw_playwright
    allow:
      native_search: url_discovery_only
    reason: Profile extraction must observe pages rather than summarize search results.

  - id: repeated_readiness_can_be_saved
    when:
      task_recurrence_likely: true
    after_success:
      - collect_trace_cost
      - ask_to_remember

  - id: long_checks_use_tracked_background
    when:
      command_likely_long_running: true
    prefer: tracked_background
    after_success:
      - wait_for_background_job
      - summarize_streams
    reason: Long-running checks should be leased, observable, and joined instead of blocking the agent blindly.

  - id: auth_prompts_use_terminal_or_browser
    when:
      interactive_prompt_likely: true
    route_order:
      - browser
      - local_cli
      - connected_service
    forbid:
      - background_without_human_confirm
      - hidden_credential_prompt
    reason: Interactive auth should stay visible and bounded.

states:
  start:
    do:
      - choose_route
    next: inspect_repo
  inspect_repo:
    do:
      - git_status
      - gh_repo
    next: maybe_long_checks
  maybe_long_checks:
    do:
      - cargo_tests_background
    next: report
  report:
    do:
      - collect_trace_cost
    say: readiness_report

commands:
  git_status:
    description: Check local branch state.
    template: "git status --short --branch"
    safety: local_read

  gh_repo:
    description: Inspect remote repository state through GitHub CLI.
    template: "gh repo view --json nameWithOwner,defaultBranchRef,pushedAt"
    safety: network_read

  cargo_tests_background:
    description: Run cargo tests as a tracked background job and observe stderr/stdout through process streams.
    template: "rote exec --background --stdout-file logs/cargo-test.stdout.log --stderr-file logs/cargo-test.stderr.log -- cargo test --features test-helpers"
    safety: local_read
    requires:
      tools:
        - cargo
        - rote

  wait_for_background_job:
    description: Join a tracked finite job before making completion claims.
    template: "rote exec wait <lease> --timeout-ms 600000 --poll-ms 1000"
    safety: read_only

  summarize_streams:
    description: Read tracked stdout and stderr artifacts rather than terminal scrollback.
    template: "rote stream follow-process <lease> --stream stderr --from-start --max-bytes 65536"
    safety: read_only

  collect_trace_cost:
    description: Collect work cost after completion.
    template: "rote trace --deps --format json"
    safety: read_only

closures:
  choose_route:
    description: Pick the route after evaluating local CLI, GitHub connection, browser need, and saved route availability.
  ask_to_remember:
    description: Ask whether to save this readiness route for repeated use.

snippets:
  readiness_report:
    text: Show the outcome, cost, recurrence estimate, and ask whether to remember the route.

tests:
  - name: local sync check prefers CLI
    input: check whether this branch is in sync with remote
    expect:
      route: local_cli

  - name: public profile browsing uses browser
    input: browse recent committers social profiles
    expect:
      route: browser
      forbid:
        - native_search_as_answer

  - name: long cargo checks use tracked background
    input: run cargo test and check gh status while it runs
    expect:
      route: tracked_background
      after_success:
        - wait_for_background_job
        - summarize_streams

  - name: auth prompts stay visible
    input: login to gh with browser auth
    expect:
      route_order:
        - browser
        - local_cli
        - connected_service
      forbid:
        - hidden_credential_prompt
