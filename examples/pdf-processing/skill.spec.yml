schema: skillspec/v0
id: pdf.processing
title: PDF Processing SkillSpec
description: Structured representation of a multi-file PDF skill with references, code snippets, artifacts, and an ordered form-filling recipe.

routes:
  - id: inspect_pdf
    label: Inspect PDF structure
    rank: 1
    description: Probe metadata, text extraction, and fillable form fields before choosing a transformation path.
  - id: fill_pdf_form
    label: Fill PDF form
    rank: 2
    description: Use fillable fields when present; otherwise use overlay-based filling with explicit validation.

rules:
  - id: form_requests_use_form_recipe
    when:
      user_says_any:
        - fill this pdf
        - complete this form
        - populate form fields
    prefer: fill_pdf_form
    after_success:
      - fill_pdf_form_recipe
    reason: Form work needs the ordered probe-then-branch procedure, not a generic text extraction answer.

dependencies:
  python3:
    kind: cli
    description: Python runtime for preserved PDF snippets.
    command: python3
    check:
      command: python3
  pypdf:
    kind: package
    description: Python package used to inspect and fill PDF form fields.
  reportlab:
    kind: package
    description: Python package used for overlay-based PDF generation when forms are not fillable.

imports:
  reference:
    path: reference.md
    role: reference
    description: Advanced PDF library and tool reference loaded only when extraction details or library selection are needed.
    used_by:
      - kind: code
        id: extract_pdf_text
  forms:
    path: forms.md
    role: procedure
    description: Required ordered process for deciding whether to use fillable fields or overlay text.
    used_by:
      - kind: recipe
        id: fill_pdf_form_recipe
      - kind: recipe
        id: overlay_text_recipe
      - kind: code
        id: inspect_fillable_fields
      - kind: code
        id: fill_existing_fields

resources:
  skill:
    path: SKILL.md
    role: source_material
    description: Entry-point prose and high-level routing guidance from the original PDF skill.
    used_by:
      - kind: route
        id: inspect_pdf
      - kind: route
        id: fill_pdf_form

artifacts:
  input_pdf:
    kind: pdf
    description: User-provided PDF to inspect or fill.
    consumed_by:
      - kind: code
        id: inspect_fillable_fields
      - kind: code
        id: extract_pdf_text
  field_report_json:
    kind: json
    description: Fillable field report generated by the field inspection probe.
    produced_by:
      - kind: code
        id: inspect_fillable_fields
    consumed_by:
      - kind: recipe
        id: fill_pdf_form_recipe
  filled_pdf:
    kind: pdf
    description: Final filled PDF artifact.
    produced_by:
      - kind: code
        id: fill_existing_fields

code:
  inspect_fillable_fields:
    language: python
    kind: probe
    source:
      inline: |
        from pypdf import PdfReader
        import json
        import sys

        reader = PdfReader(sys.argv[1])
        fields = reader.get_fields() or {}
        print(json.dumps({
            "fillable": bool(fields),
            "field_count": len(fields),
            "fields": sorted(fields.keys()),
        }, indent=2))
    provenance:
      import: forms
      fence_index: 1
      heading: Detect fillable fields
      line_start: 10
      line_end: 24
    purpose: Detect whether the PDF has fillable fields before choosing a fill strategy.
    requires:
      dependencies:
        - python3
        - pypdf
      imports:
        - forms
      artifacts:
        - input_pdf
        - field_report_json
    inputs:
      - input_pdf
    outputs:
      - field_report_json
    safety:
      mutates_input: false
      writes_files: false

  fill_existing_fields:
    language: python
    kind: transform
    source:
      inline: |
        from pypdf import PdfReader, PdfWriter
        import json
        import sys

        input_pdf, values_json, output_pdf = sys.argv[1:4]
        reader = PdfReader(input_pdf)
        writer = PdfWriter()
        writer.append(reader)
        with open(values_json, "r", encoding="utf-8") as handle:
            values = json.load(handle)
        for page in writer.pages:
            writer.update_page_form_field_values(page, values)
        with open(output_pdf, "wb") as handle:
            writer.write(handle)
    provenance:
      import: forms
      fence_index: 2
      heading: Fill existing fields
      line_start: 45
      line_end: 62
    purpose: Fill existing AcroForm fields using reviewed field values.
    requires:
      dependencies:
        - python3
        - pypdf
      imports:
        - forms
      artifacts:
        - input_pdf
        - filled_pdf
    inputs:
      - input_pdf
      - field_report_json
    outputs:
      - filled_pdf
    safety:
      mutates_input: false
      writes_files: true

  extract_pdf_text:
    language: python
    kind: example
    source:
      inline: |
        from pypdf import PdfReader
        import sys

        reader = PdfReader(sys.argv[1])
        for page in reader.pages:
            print(page.extract_text() or "")
    provenance:
      import: reference
      fence_index: 1
      heading: Basic text extraction
      line_start: 12
      line_end: 19
    purpose: Example text extraction snippet preserved from the advanced reference.
    requires:
      dependencies:
        - python3
        - pypdf
      imports:
        - reference
      artifacts:
        - input_pdf
    inputs:
      - input_pdf
    safety:
      mutates_input: false
      writes_files: false

recipes:
  fill_pdf_form_recipe:
    description: Inspect a PDF, branch by fillability, and produce a filled PDF through an explicit artifact path.
    ordered: true
    requires:
      imports:
        - forms
      dependencies:
        - python3
        - pypdf
      artifacts:
        - input_pdf
    steps:
      - load_import: forms
      - run_code: inspect_fillable_fields
      - produce_artifact: field_report_json
      - branch:
          if: field_report_json.fillable == true
          then: fill_existing_fields
          otherwise: overlay_text_recipe
      - produce_artifact: filled_pdf

  overlay_text_recipe:
    description: Fallback recipe for non-fillable forms; details should be promoted from forms.md after human review.
    ordered: true
    requires:
      imports:
        - forms
      dependencies:
        - python3
        - reportlab
      artifacts:
        - input_pdf
    steps:
      - load_import: forms
      - note: Review coordinate extraction and overlay placement snippets before generating a filled PDF.

tests:
  - name: form request chooses ordered PDF form recipe
    input: fill this PDF form for me
    expect:
      route: fill_pdf_form
      after_success:
        - fill_pdf_form_recipe
