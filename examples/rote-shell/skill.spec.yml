schema: skillspec/v0
id: rote.shell
title: rote shell
description: Structured version of the rote-shell skill for durable CLI, shell, process, stream, PTY, dependency, and shell-flow crystallization work.

applies_when:
  - user_intent:
      - run a local command and remember the result
      - inspect CLI output with provenance
      - follow a log or process stream
      - start or observe a background job
      - capture terminal-sensitive output
      - crystallize shell work into a TypeScript flow
      - combine local CLI facts with adapters or browser observations
      - check a repository for roadmap or contribution markdown files

entry:
  prompt: Choose the narrowest rote shell route that preserves the evidence the user will need later.
  decision_required: true
  supersedes_skills:
    - browser:browser
  forbid_before_decision:
    - raw_repo_search
    - direct_file_read
    - direct_cli_without_rote_exec
    - direct_shell_command_without_rote_exec
    - direct_harness_cli_call_without_rote_exec
    - browser_browser_skill
    - node_repl

routes:
  - id: shell_then_browser_handoff
    label: Run shell evidence, then hand off browser work
    rank: 3
    description: >
      Use when one user request combines local CLI/repo/service status work with browser-owned page or email-draft work.
      Execute the shell evidence phase through rote-shell first, then stop at the browser phase and hand off to rote-browse.
    execution_plan:
      mode: ordered
      reason: Compound shell-plus-browser requests must not let the browser handoff hide or skip the shell phase.
      phases:
        - id: shell_status_via_rote_exec
          owner_skill: rote-shell
          route: adapter_first_cli_fallback
          description: Complete repo, GitHub, local CLI, and status checks through a named rote workspace and `rote exec --` before any browser work.
          requires:
            - initialize_rote_workspace
            - discover_relevant_rote_adapters
            - verify_adapter_or_cli_readiness
            - preflight_cli_fallback
            - run_cli_only_through_rote_exec
          forbid:
            - direct_cli_without_rote_exec
            - direct_shell_command_without_rote_exec
            - direct_harness_cli_call_without_rote_exec
            - untracked_stdout_scrollback
            - rote_exec_outside_workspace
            - anonymous_workspace
        - id: browser_draft_handoff
          owner_skill: rote-browse
          route: browser_handoff
          description: Pass the shell evidence summary and browser/email-draft intent to rote-browse; do not run browser tools inside rote-shell.
          requires:
            - handoff_browser_work_to_rote_browse_skill
            - pass_browser_context_to_rote_browse
            - resume_shell_work_after_browser_evidence
          forbid:
            - native_search_as_answer
            - raw_playwright
            - native_browser_tool_without_rote_browse
            - direct_browser_tool_without_rote_browse
            - browser_cli_commands_in_rote_shell
          handoff:
            to_skill: rote-browse
            boundary: stop_current_skill
            pass_context:
              - user_intent
              - workspace
              - evidence_context
              - shell_prerequisites
              - shell_phase_result
            forbid:
              - native_browser_tool_without_rote_browse
              - direct_browser_tool_without_rote_browse
              - browser_cli_commands_in_rote_shell
              - raw_playwright
            reason: Browser drafting is owned by rote-browse after shell evidence is captured.

  - id: adapter_first_cli_fallback
    label: Use rote adapters, then rote exec CLI fallback
    rank: 4
    description: Use when the task names external services, repos, issue trackers, profile enrichment, or Parallel search. Discover adapter and CLI candidates as paired capabilities; choose a healthy adapter when present, otherwise choose a proven CLI fallback through `rote exec --`.
  - id: browser_handoff
    label: Hand off to rote-browse for browser state
    rank: 5
    description: >
      Use when the user asks to browse, click, snapshot, attach to a browser, or extract from live page state.
      Defer the browser portion to the `rote-browse` skill. This shell skill should preserve the
      user's intent, workspace/evidence context, and any shell-side prerequisites, but it must not
      prescribe browser command sequences itself.
    handoff:
      to_skill: rote-browse
      boundary: stop_current_skill
      pass_context:
        - user_intent
        - workspace
        - evidence_context
        - shell_prerequisites
      forbid:
        - native_browser_tool_without_rote_browse
        - direct_browser_tool_without_rote_browse
        - browser_cli_commands_in_rote_shell
        - raw_playwright
      reason: Browser execution is owned by rote-browse; rote-shell must stop browser execution and only pass declared context.
  - id: one_shot_process
    label: Capture a one-shot process
    rank: 10
    description: Use `rote exec --` for finite commands whose stdout, stderr, exit, or file outputs should be remembered.
  - id: declared_file_io
    label: Capture declared file inputs or outputs
    rank: 20
    description: Use stdin, stdout, stderr, and capture-file declarations when files are part of the evidence.
  - id: stream_follow
    label: Follow a moving file or process stream
    rank: 30
    description: Use stream capture when the source of truth is a log or evolving process stream.
  - id: background_process
    label: Start and track a background process lease
    rank: 40
    description: Use for long finite non-interactive jobs and services that need status, wait, follow, or cleanup.
  - id: pty_transcript
    label: Capture a one-shot PTY transcript
    rank: 50
    description: Use only when terminal behavior is the point or a bounded interactive prompt can be scripted safely.
  - id: dependency_preflight
    label: Check dependencies before replay or release
    rank: 60
    description: Use `rote deps check` before marking shell-derived flows released.
  - id: crystallized_flow
    label: Crystallize or replay a shell flow
    rank: 70
    description: Use TypeScript SDK shell wrappers or declarative process steps when the work should become reusable.
  - id: raw_shell
    label: Use raw shell for disposable inspection only
    rank: 100
    description: Allowed only for tiny local inspection where no evidence, replay, or queryability is needed.

rules:
  - id: cli_invocations_use_rote_exec
    when:
      user_says_any:
        - check
        - cli
        - command
        - shell command
        - run
        - execute
        - call
        - invoke
        - check status
        - list
        - ls
        - cat
        - grep
        - rg
        - git
        - gh
        - cargo
        - npm
        - pnpm
        - node
        - python
        - curl
        - roadmap
        - contributing
        - contribution
        - markdown
    route_order:
      - one_shot_process
      - declared_file_io
      - background_process
      - pty_transcript
    forbid:
      - direct_cli_without_rote_exec
      - direct_shell_command_without_rote_exec
      - direct_harness_cli_call_without_rote_exec
      - untracked_stdout_scrollback
    after_success:
      - run_cli_only_through_rote_exec
      - compute_workspace_trace
      - compute_workspace_stats
      - report_workspace_evidence_and_token_math
    reason: Any local CLI invocation must go through `rote exec --` so stdout, stderr, exit status, workspace context, and evidence ids are captured instead of disappearing into harness terminal scrollback.

  - id: external_service_tasks_are_adapter_first
    when:
      user_says_any:
        - adapter
        - github
        - gh
        - git
        - repo
        - remote
        - issue
        - issues
        - supabase
        - database
        - auth users
        - active users
        - users table
        - table
        - export csv
        - assignee
        - assigned to me
        - contributor
        - committers
        - profile
        - enrich
    route_order:
      - adapter_first_cli_fallback
      - one_shot_process
      - browser_handoff
    forbid:
      - skipping_adapter_discovery
      - skipping_cli_readiness_check
      - direct_cli_without_rote_exec
      - direct_mcp_tool_call
      - native_search_as_answer
      - native_codex_web_search
      - untracked_stdout_scrollback
    after_success:
      - identify_required_services_and_tools
      - discover_relevant_rote_adapters
      - verify_adapter_or_cli_readiness
      - preflight_cli_fallback
      - run_cli_only_through_rote_exec
      - compute_workspace_trace
      - compute_workspace_stats
      - report_workspace_evidence_and_token_math
    reason: External-service work should prefer rote adapters; if no healthy adapter exists, prove installed/authenticated CLI fallback through rote exec before use.

  - id: explicit_parallel_search_uses_parallel_adapter_or_cli
    when:
      user_says_any:
        - parallel
        - parallelweb
        - parallel web
        - search using parallel
        - use parallel
        - enrich their profile
        - enrich profiles
    route_order:
      - adapter_first_cli_fallback
      - one_shot_process
    forbid:
      - native_search_as_answer
      - native_codex_web_search
      - web_search_tool_without_parallel_preflight
      - direct_parallelweb_tool_call
      - direct_cli_without_rote_exec
      - using_parallel_cli_without_rote_exec
      - adapter_only_parallel_check
      - exact_parallel_binary_assumption
      - static_parallel_cli_dependency
      - parallel_cli_discovery_not_run
      - parallel_cli_candidate_not_selected
      - parallel_cli_not_checked
      - skipping_parallel_adapter_check
      - skipping_cli_readiness_check
    after_success:
      - identify_required_services_and_tools
      - discover_relevant_rote_adapters
      - pair_parallel_adapter_and_cli_discovery
      - check_parallel_adapter_before_search
      - check_parallel_cli_readiness_via_rote_exec
      - choose_parallel_adapter_else_cli
      - preflight_cli_fallback
      - use_parallel_search_via_adapter_or_cli
      - record_parallel_selection_evidence
      - capture_parallel_search_results
      - compute_workspace_trace
      - compute_workspace_stats
      - report_workspace_evidence_and_token_math
    reason: When the user names Parallel, run paired discovery for the Parallel/parallelweb adapter and a harness-discovered Parallel CLI candidate such as `parallel-cli`. Choose the adapter if healthy, otherwise choose the CLI only when readiness is proven through rote exec; never assume the binary is named `parallel` and never substitute native Codex web search.

  - id: browser_words_handoff_to_browse
    when:
      user_says_any:
        - browse
        - open this site
        - attach to my browser
        - active browser
        - existing browser
        - logged-in browser
        - click
        - type
        - snapshot
        - extract from page
        - social profile
        - email web app
        - inbox in browser
    prefer: browser_handoff
    forbid:
      - native_search_as_answer
      - raw_playwright
      - native_browser_tool_without_rote_browse
      - direct_browser_tool_without_rote_browse
      - curl_as_browser_substitute
      - adapter_setup_before_browser_handoff
      - browser_cli_commands_in_rote_shell
    allow:
      native_search: url_discovery_only
    after_success:
      - handoff_browser_work_to_rote_browse_skill
      - pass_browser_context_to_rote_browse
      - resume_shell_work_after_browser_evidence
    reason: Browser intent must be satisfied by browser evidence owned by the rote-browse skill, not search summaries, raw browser automation, or shell-level browser command recipes.

  - id: compound_shell_then_browser_uses_ordered_plan
    when:
      user_says_all_groups:
        - [gh, git, repo, branch, remote, pending checkins, pending check-ins]
        - [browse, email draft, draft email, reminder, inbox in browser, logged-in inbox]
    prefer: shell_then_browser_handoff
    forbid:
      - direct_cli_without_rote_exec
      - direct_shell_command_without_rote_exec
      - direct_harness_cli_call_without_rote_exec
      - untracked_stdout_scrollback
      - native_search_as_answer
      - raw_playwright
      - native_browser_tool_without_rote_browse
      - direct_browser_tool_without_rote_browse
      - browser_cli_commands_in_rote_shell
    after_success:
      - run_cli_only_through_rote_exec
      - handoff_browser_work_to_rote_browse_skill
      - pass_browser_context_to_rote_browse
      - resume_shell_work_after_browser_evidence
      - compute_workspace_trace
      - compute_workspace_stats
      - report_workspace_evidence_and_token_math
    reason: >
      A compound shell-plus-browser request must emit an ordered execution plan:
      shell evidence through rote exec first, then browser handoff.

  - id: durable_work_requires_named_workspace
    when:
      user_says_any:
        - rote exec
        - gh
        - git
        - repo
        - remote
        - browse
        - evidence
        - remember
        - query later
    forbid:
      - rote_exec_outside_workspace
      - anonymous_workspace
      - final_summary_without_workspace
      - final_summary_without_trace_math
    after_success:
      - compute_workspace_trace
      - compute_workspace_stats
      - report_workspace_evidence_and_token_math
    reason: Durable shell work must start in a named rote workspace and finish with workspace evidence, dependency trace, and token math.

  - id: durable_result_uses_rote_exec
    when:
      user_says_any:
        - remember
        - query later
        - compare
        - replay
        - evidence
        - audit
    prefer: one_shot_process
    forbid:
      - untracked_stdout_scrollback
      - ad_hoc_redirect_for_evidence
    reason: Durable CLI facts should be captured as typed process responses.

  - id: file_inputs_outputs_are_declared
    when:
      user_says_any:
        - file
        - markdown
        - roadmap
        - contributing
        - contribution
        - stdin
        - stdout
        - stderr
        - artifact
        - write report
        - save output
    prefer: declared_file_io
    forbid:
      - implicit_file_side_effects
    reason: File inputs and outputs need explicit provenance, hashes, and artifact pointers.

  - id: repo_markdown_discovery_uses_rote_exec
    when:
      user_says_all_groups:
        - [repo, repository]
        - [roadmap, contributing, contribution, markdown]
    prefer: one_shot_process
    forbid:
      - raw_repo_search
      - direct_file_read
      - direct_cli_without_rote_exec
      - direct_shell_command_without_rote_exec
      - direct_harness_cli_call_without_rote_exec
      - untracked_stdout_scrollback
    after_success:
      - run_cli_only_through_rote_exec
      - compute_workspace_trace
      - compute_workspace_stats
      - report_workspace_evidence_and_token_math
    reason: Repository markdown discovery must be captured as rote-shell evidence, not direct `rg`, file listing, or file reads.

  - id: long_noninteractive_jobs_use_background
    when:
      command_likely_long_running: true
      interactive_prompt_likely: false
    prefer: background_process
    after_success:
      - query_lease_status
      - follow_process_stream
      - wait_for_process
    reason: Long finite non-interactive jobs should be leased, observable, and joined.

  - id: moving_logs_use_stream_follow
    when:
      user_says_any:
        - tail
        - follow log
        - watch log
        - until ready
        - readiness log
    prefer: stream_follow
    reason: Moving logs should be followed with offsets, chunks, and stop conditions.

  - id: interactive_prompts_do_not_background
    when:
      interactive_prompt_likely: true
    route_order:
      - pty_transcript
      - browser_handoff
      - one_shot_process
    forbid:
      - background_without_human_confirm
      - hidden_credential_prompt
      - secret_in_pty_input
    reason: Interactive prompts require visible bounded handling, never hidden background execution.

  - id: terminal_sensitive_commands_use_pty
    when:
      user_says_any:
        - tty
        - terminal
        - isatty
        - interactive
        - prompt
        - auth status
    prefer: pty_transcript
    forbid:
      - persistent_repl_pty
      - secret_in_pty_input
    reason: PTY is for one-shot terminal behavior, not persistent sessions or secret entry.

  - id: release_publish_is_guarded
    when:
      user_says_any:
        - release
        - publish
        - deploy
    route_order:
      - dependency_preflight
      - one_shot_process
      - background_process
    elicit:
      - release_approval
    forbid:
      - irreversible_background_without_approval
      - release_without_dry_run
      - release_without_dependency_preflight
    reason: Mutating release work needs dependency checks, dry-run when available, and explicit approval.

  - id: missing_dependencies_elicit_install_scope
    when:
      user_says_any:
        - install missing tool
        - provision dependency
        - missing dependency
        - deps check failed
    prefer: dependency_preflight
    elicit:
      - install_scope
    forbid:
      - silent_global_install
      - released_with_missing_dependencies
    reason: Missing dependencies require a bounded install/provisioning choice before machine mutation.

  - id: crystallization_requires_deps_and_qa
    when:
      user_says_any:
        - crystallize
        - reusable flow
        - save as flow
        - release flow
        - rote deno run
    prefer: crystallized_flow
    after_success:
      - run_dependency_preflight
      - run_flow_qa
      - mark_released_after_evidence
    forbid:
      - released_without_deps_toml
      - released_without_replay_qa
    reason: Shell-derived flows need deps.toml and replay evidence before release.

  - id: mixed_browser_shell_bridges_files
    when:
      user_says_any:
        - browser plus shell
        - snapshot then process
        - page then cli
        - browse and save
    route_order:
      - browser_handoff
      - declared_file_io
      - one_shot_process
    forbid:
      - raw_playwright
      - browser_payload_in_large_argv
      - native_browser_tool_without_rote_browse
      - browser_cli_commands_in_rote_shell
    after_success:
      - handoff_browser_work_to_rote_browse_skill
      - pass_browser_context_to_rote_browse
      - resume_shell_work_after_browser_evidence
    reason: Browser state should be collected by the rote-browse skill, then materialized as evidence before local CLI processing resumes.

trace:
  mode: event_log
  required: true
  record:
    - input_received
    - spec_loaded
    - rule_evaluated
    - rule_matched
    - route_selected
    - route_order_set
    - forbid_added
    - allow_added
    - elicitation_requested
    - after_success_scheduled
    - outcome_recorded

elicitations:
  install_scope:
    question: How should missing local tools be provisioned?
    required_when:
      - route: dependency_preflight
      - missing: dependency_install_scope
    max_choices: 1
    choices:
      - id: rote_managed
        label: Rote-managed or project-local
        description: Prefer isolated provisioning that does not mutate the whole machine.
        sets:
          dependency_install_scope: rote_managed
        route: dependency_preflight
        next: prepare_workspace
        safety: local_write
      - id: user_global
        label: User/global package manager
        description: Allow broader machine mutation only after explicit approval.
        sets:
          dependency_install_scope: user_global
        route: dependency_preflight
        next: prepare_workspace
        safety: local_write
      - id: leave_draft
        label: Leave flow in draft
        description: Do not install anything; keep the flow unreleased until dependencies are installed.
        sets:
          dependency_install_scope: none
          flow_status: draft
        route: dependency_preflight
        next: done
        safety: read_only

  release_approval:
    question: Do you approve running the real mutating release/publish step?
    required_when:
      - missing: release_approval
    max_choices: 1
    choices:
      - id: approve_foreground
        label: Approve foreground run
        description: Run the final irreversible command visibly after preflight and dry-run evidence.
        sets:
          release_approval: foreground
        route: one_shot_process
        next: execute
        safety: destructive
      - id: approve_tracked_background
        label: Approve tracked background run
        description: Run as a tracked lease with stdout/stderr capture and no interruption unless requested.
        sets:
          release_approval: tracked_background
        route: background_process
        next: execute
        safety: destructive
      - id: do_not_run
        label: Do not run
        description: Stop after preflight and dry-run evidence.
        sets:
          release_approval: denied
        next: done
        safety: read_only

dependencies:
  github_adapter:
    kind: adapter
    description: Preferred GitHub access path for issues, assignees, contributors, and repo metadata. Check with `rote adapter list github --json --health --probe` or the installed GitHub adapter id before CLI fallback.
  parallelweb_adapter:
    kind: adapter
    description: Preferred Parallel web search/enrichment access path. Check likely ids such as `parallelweb`, `parallel`, or installed registry aliases before CLI fallback.
  parallel_cli:
    kind: service
    description: Harness-discovered local Parallel CLI fallback for explicit Parallel search/enrichment. The harness must scan executable names matching `*parallel*` on PATH, select the best candidate such as `parallel-cli`, and execute that selected binary only through `rote exec --`.
    permission:
      required: true
      reason: The Parallel CLI may perform authenticated network search or enrichment.
      safety: network_read
    provision:
      elicit: install_scope
      options:
        - id: user_global
          label: Install Parallel CLI with a user package manager
          safety: local_write
        - id: leave_draft
          label: Leave flow in draft
          safety: read_only
  rote_browse:
    kind: browser
    description: Browser execution capability owned by the rote-browse skill. Browser setup, daemon/session start, `rote browse` use, and cleanup must be handled by rote-browse rather than raw browser tooling in rote-shell.
    permission:
      required: true
      reason: Browser work may attach to logged-in sessions or read live page state.
      safety: browser_attach
  rote:
    kind: cli
    description: Rote CLI is required for workspace setup, process capture, stream capture, PTY capture, dependency preflight, traces, and replay.
    command: rote
    check:
      command: rote
    provision:
      elicit: install_scope
      options:
        - id: rote_managed
          label: Install or upgrade through the project-approved rote path
          description: Use the local project's install/update path rather than silently mutating the machine.
          safety: local_write
        - id: leave_draft
          label: Leave the flow in draft
          description: Do not install rote; keep the work unreleased until the tool is available.
          safety: read_only
  gh:
    kind: cli
    description: GitHub CLI may be used by shell workflows that inspect repositories, pull requests, users, or auth state.
    command: gh
    check:
      command: gh
    permission:
      required: true
      reason: GitHub CLI commands can use authenticated account state and network access.
      safety: network_read
    provision:
      elicit: install_scope
      options:
        - id: user_global
          label: Install GitHub CLI with a user package manager
          command: brew install gh
          safety: local_write
        - id: leave_draft
          label: Leave flow in draft
          safety: read_only
  git:
    kind: cli
    description: Git may be used for repository status, remotes, branches, and local history.
    command: git
    check:
      command: git
  cargo:
    kind: cli
    description: Cargo may be used for Rust project checks, tests, metadata, and release dry-runs.
    command: cargo
    check:
      command: cargo
    permission:
      required: true
      reason: Cargo commands may execute project build scripts and tests.
      safety: local_read
  deno:
    kind: cli
    description: Deno is required for TypeScript flow replay through `rote deno run`.
    command: deno
    check:
      command: deno
    provision:
      elicit: install_scope
      options:
        - id: user_global
          label: Install Deno with a user package manager
          command: brew install deno
          safety: local_write
        - id: leave_draft
          label: Leave flow in draft
          safety: read_only
  curl:
    kind: cli
    description: Curl may be used only for URL discovery or API checks when the selected route permits it.
    command: curl
    check:
      command: curl
    permission:
      required: true
      reason: Curl may perform network reads and must not substitute for browser evidence.
      safety: network_read
  deps_toml:
    kind: file
    description: Shell-crystallized flows should carry a dependency manifest before release.
    path: deps.toml
    check:
      path: deps.toml

states:
  start:
    do:
      - choose_shell_route
      - derive_workspace_name
      - identify_required_services_and_tools
    next: prepare_workspace
  choose_install_scope:
    ask: install_scope
    next: prepare_workspace
  approve_release:
    ask: release_approval
    next: execute
  prepare_workspace:
    do:
      - initialize_rote_workspace
      - confirm_workspace_context
    next: discover_adapters
  discover_adapters:
    do:
      - discover_relevant_rote_adapters
      - pair_parallel_adapter_and_cli_discovery
      - check_parallel_adapter_before_search
    next: preflight_fallbacks
  preflight_fallbacks:
    do:
      - verify_adapter_or_cli_readiness
      - check_parallel_cli_readiness_via_rote_exec
      - choose_parallel_adapter_else_cli
      - preflight_cli_fallback
      - check_rote_browse_handoff_readiness
      - prepare_browser_skill_handoff_if_selected
    next: execute
  execute:
    do:
      - run_selected_rote_primitive
      - run_cli_only_through_rote_exec
      - handoff_browser_work_to_rote_browse_skill
      - query_typed_response
    next: assess_reuse
  assess_reuse:
    do:
      - decide_whether_to_crystallize
    next: complete
  complete:
    do:
      - compute_workspace_trace
      - compute_workspace_stats
      - summarize_evidence
      - report_workspace_evidence_and_token_math
    next: done
  done:
    say: done_summary

commands:
  rote_guidance_shell:
    description: Load the complete shell command model.
    template: "rote guidance shell essential"
    safety: read_only
    requires:
      dependencies:
        - rote

  initialize_rote_workspace:
    description: Create or enter a rote workspace before durable CLI work.
    template: |
      rote init <task-derived-workspace-slug> --seq --force
      eval "$(rote cd <task-derived-workspace-slug>)"
      rote workspace sandbox <task-derived-workspace-slug> off
    safety: local_write
    requires:
      dependencies:
        - rote

  confirm_workspace_context:
    description: Confirm the active workspace before running any durable rote shell command.
    template: "rote whoami"
    safety: read_only
    requires:
      dependencies:
        - rote

  adapter_discovery:
    description: Discover installed and healthy rote adapters for the services named by the task before using any CLI fallback.
    template: |
      rote adapter list --json --health --probe
      rote adapter list <service-or-adapter-id> --json --health --probe
    safety: read_only
    requires:
      dependencies:
        - rote
        - github_adapter
        - parallelweb_adapter

  adapter_sessions:
    description: Inspect active workspace sessions for an adapter before assuming auth/session readiness.
    template: "rote adapter sessions <adapter-id>"
    safety: read_only
    requires:
      dependencies:
        - rote

  cli_readiness_via_rote_exec:
    description: If no healthy adapter exists, prove CLI fallback availability and auth/readiness through typed rote exec evidence before using that CLI.
    template: |
      rote exec -- <cli> --version
      rote exec -- <cli-auth-or-status-command>
    safety: local_read
    requires:
      dependencies:
        - rote

  github_cli_readiness:
    description: GitHub CLI fallback readiness check; only valid after adapter discovery found no healthy GitHub adapter.
    template: |
      rote exec -- gh --version
      rote exec -- gh auth status
    safety: network_read
    requires:
      dependencies:
        - rote
        - gh

  parallel_cli_readiness:
    description: Prove the harness-selected Parallel CLI fallback exists and is ready through typed rote exec evidence before it can be selected.
    template: |
      # Harness fills <selected-parallel-cli> from PATH candidates matching *parallel*, such as parallel-cli.
      rote exec -- <selected-parallel-cli> --version
      rote exec -- <selected-parallel-cli> auth status
    safety: network_read
    requires:
      dependencies:
        - rote
        - parallel_cli

  parallel_search_preflight:
    description: For explicit Parallel search/enrichment, perform paired adapter discovery and harness CLI candidate discovery. Prefer a healthy adapter; otherwise use the selected CLI only after readiness is proven through rote exec.
    template: |
      rote adapter list parallelweb --json --health --probe
      rote adapter list parallel --json --health --probe
      # Harness fills <selected-parallel-cli> from PATH candidates matching *parallel*, such as parallel-cli.
      rote exec -- <selected-parallel-cli> --version
      rote exec -- <selected-parallel-cli> auth status
    safety: network_read
    requires:
      dependencies:
        - rote
        - parallelweb_adapter
        - parallel_cli

  rote_browse_handoff_readiness:
    description: Verify the browser handoff surface before delegating browser execution to the rote-browse skill.
    template: |
      rote guidance browser essential
      rote browse --help
    safety: read_only
    requires:
      dependencies:
        - rote
        - rote_browse

  exec:
    description: Capture a finite command as a typed process response.
    template: "rote exec -- <program> [args...]"
    safety: local_read
    requires:
      dependencies:
        - rote

  exec_with_stdin_file:
    description: Capture stdin provenance from a declared input file.
    template: "rote exec --stdin-file <input> -- <program> [args...]"
    safety: local_read
    requires:
      dependencies:
        - rote

  exec_with_file_capture:
    description: Capture an output file as a named artifact.
    template: "rote exec --capture-file <label>:<path> -- <program> [args...]"
    safety: local_write
    requires:
      dependencies:
        - rote

  exec_with_stream_files:
    description: Save stdout and stderr streams to durable files.
    template: "rote exec --stdout-file <stdout-path> --stderr-file <stderr-path> -- <program> [args...]"
    safety: local_write
    requires:
      dependencies:
        - rote

  follow_file:
    description: Follow a moving log or file with an optional readiness pattern.
    template: "rote stream follow --file <path> --until <pattern>"
    safety: read_only
    requires:
      dependencies:
        - rote

  exec_background:
    description: Start a tracked background process lease.
    template: "rote exec --background --stdout-file <stdout-log> --stderr-file <stderr-log> -- <program> [args...]"
    safety: local_write
    requires:
      dependencies:
        - rote

  exec_background_ready_log:
    description: Start a tracked background process and wait for log readiness.
    template: "rote exec --background --ready-log <pattern> --ready-timeout-ms <ms> -- <program> [args...]"
    safety: local_write
    requires:
      dependencies:
        - rote

  exec_status:
    description: Query a background process lease before making claims.
    template: "rote exec status <lease>"
    safety: read_only
    requires:
      dependencies:
        - rote

  exec_wait:
    description: Join a tracked finite background job.
    template: "rote exec wait <lease> --timeout-ms <ms> --poll-ms <ms>"
    safety: read_only
    requires:
      dependencies:
        - rote

  follow_process:
    description: Follow stdout or stderr from a tracked process lease.
    template: "rote stream follow-process <lease> --stream <stdout-or-stderr> --from-start --max-bytes <bytes>"
    safety: read_only
    requires:
      dependencies:
        - rote

  exec_stop:
    description: Stop a tracked background process lease and record cleanup evidence.
    template: "rote exec stop <lease>"
    safety: local_write
    requires:
      dependencies:
        - rote

  pty_run:
    description: Capture one-shot terminal-sensitive output.
    template: "rote pty run --cols <cols> --rows <rows> -- <program> [args...]"
    safety: local_read
    requires:
      dependencies:
        - rote

  deps_check:
    description: Verify required local tools and files before replay or release.
    template: "rote deps check deps.toml"
    safety: read_only
    requires:
      dependencies:
        - rote
        - deps_toml

  deno_replay:
    description: Replay a crystallized TypeScript flow.
    template: "rote deno run --allow-all ~/.rote/flows/<name>/main.ts"
    safety: local_read
    requires:
      dependencies:
        - rote
        - deno

  trace_deps:
    description: Show the dependency trace for the current rote workspace.
    template: "rote trace --deps"
    safety: read_only
    requires:
      dependencies:
        - rote

  workspace_stats_json:
    description: Persist the workspace metrics snapshot, then collect JSON stats. Use .metrics.context_tokens for agent-consumed exploration tokens and .metrics.total_tokens for API request+response tokens; if .metrics is null, report token math as unavailable.
    template: |
      rote stats --save
      rote workspace stats <workspace> --json
    safety: local_write
    requires:
      dependencies:
        - rote

closures:
  choose_shell_route:
    description: Choose the narrowest shipped rote shell primitive that preserves necessary evidence.
  derive_workspace_name:
    description: Derive a short, stable, task-specific workspace slug before any durable rote command, such as `tulving-rote-remote-check`.
  prepare_browser_skill_handoff_if_selected:
    description: If the selected route is `browser_handoff`, stop shell-owned browser planning and prepare a concise handoff note for the `rote-browse` skill.
  handoff_browser_work_to_rote_browse_skill:
    description: Defer all browser navigation, interaction, capture, auth/session, and cleanup decisions to the `rote-browse` skill instead of prescribing them in rote-shell.
  pass_browser_context_to_rote_browse:
    description: Pass the user's browser goal, URLs or sites, workspace/evidence context, and any shell-derived inputs to `rote-browse` so it can own browser execution.
  resume_shell_work_after_browser_evidence:
    description: Resume rote-shell only after `rote-browse` has produced materialized browser evidence such as response handles, files, or a concise result.
  identify_required_services_and_tools:
    description: Extract named services and tools from the request (for example GitHub/gh/git and Parallel/parallelweb) before selecting adapters or CLI fallbacks.
  discover_relevant_rote_adapters:
    description: Run adapter discovery and health/probe checks for every named external service before using any CLI or native tool substitute.
  pair_parallel_adapter_and_cli_discovery:
    description: When Parallel is named, check both the Parallel/parallelweb adapter candidates and harness-discovered local CLI candidates whose executable names match `*parallel*` before choosing the execution path.
  check_parallel_adapter_before_search:
    description: For "search using Parallel" or profile enrichment via Parallel, check installed `parallelweb`/`parallel` rote adapters before selecting any fallback and forbid native Codex web search.
  check_parallel_cli_readiness_via_rote_exec:
    description: Prove the harness-selected local Parallel CLI is installed and authenticated/ready with `rote exec -- <selected-parallel-cli> ...` before it can be used as fallback.
  choose_parallel_adapter_else_cli:
    description: If a healthy Parallel adapter and CLI candidate are both present, choose the adapter; if the adapter is missing or unhealthy and the selected CLI is ready, choose the CLI; if neither is ready, stop for setup instead of using native search.
  record_parallel_selection_evidence:
    description: Record the adapter health result, discovered CLI candidate path/name, CLI readiness result, and final adapter-vs-CLI choice before searching or summarizing.
  check_rote_browse_handoff_readiness:
    description: For browser-selected work, verify that the `rote-browse` handoff surface is available, then leave setup, daemon/session start, `rote browse` execution, and cleanup to rote-browse.
  verify_adapter_or_cli_readiness:
    description: Record whether each service will use a healthy adapter or a CLI fallback, and capture the evidence that made that choice.
  preflight_cli_fallback:
    description: When adapter discovery is missing or unhealthy, check CLI presence, auth/session status, and readiness through `rote exec --` before the CLI is used.
  run_cli_only_through_rote_exec:
    description: Execute non-rote CLIs such as `git`, `gh`, or a harness-selected Parallel CLI only via `rote exec --`, preserving stdout, stderr, exit code, and typed response ids.
  use_parallel_search_via_adapter_or_cli:
    description: Perform Parallel search/enrichment through the healthy Parallel adapter when present; otherwise use the proven CLI fallback through `rote exec --`.
  capture_parallel_search_results:
    description: Store Parallel search/enrichment results as typed rote responses or declared files before summarizing them.
  run_selected_rote_primitive:
    description: Execute the selected shipped rote shell primitive, not an invented roadmap command.
  query_typed_response:
    description: Query the saved typed response with the exact query in @@result or @proc addresses.
  decide_whether_to_crystallize:
    description: Ask whether to crystallize after the workflow has worked and recurrence or reuse is likely.
  summarize_evidence:
    description: Summarize from typed output, artifacts, streams, and leases rather than terminal scrollback.
  compute_workspace_trace:
    description: Run `rote trace --deps` in the completed workspace and use it to describe dependency flow.
  compute_workspace_stats:
    description: >
      Run `rote stats --save`, then `rote workspace stats <workspace> --json`;
      extract `.metrics.context_tokens` as one-time exploration context-window
      tokens and `.metrics.total_tokens` as API request+response tokens. If
      metrics are missing, say measured token savings are unavailable.
  report_workspace_evidence_and_token_math:
    description: >
      End with the workspace name, important response ids, SkillSpec trace run
      directory, and a visible `Token savings` section. Explain that the
      workspace is a context file system: future steps can retrieve exact
      slices by id instead of carrying full outputs in the model window. If the
      workflow is crystallized or memoried, repeat use can avoid both API
      request tokens and context-window tokens for cached evidence. If stats or
      replay measurements were not queried, say the savings are structurally
      available but not measured yet. Do not invent numeric replay savings.
  query_lease_status:
    description: Query the lease status before acting on background process assumptions.
  follow_process_stream:
    description: Inspect process stdout or stderr with `rote stream follow-process`.
  wait_for_process:
    description: Establish completion with `rote exec wait`.
  run_dependency_preflight:
    description: Run `rote deps check deps.toml` before release.
  run_flow_qa:
    description: Run help, dependency, replay, and lint/validate checks appropriate to the flow shape.
  mark_released_after_evidence:
    description: Mark a flow released only after dependency and replay evidence pass.

snippets:
  done_summary:
    text: |
      Evidence was captured in rote workspace {{ workspace }}: {{ evidence_refs }}.
      SkillSpec route trace: {{ skillspec_trace_dir }}.
      Rote dependency trace: captured with `rote trace --deps`.
      Token savings:
      - Exploration spent {{ context_tokens }} context-window tokens and {{ total_tokens }} API request+response tokens once.
      - The important data now lives outside the prompt in the rote workspace, addressable by response ids/files instead of pasted back into the model window.
      - If this is crystallized as a flow or remembered, repeat use can skip the API work and avoid reloading the full evidence into context; measured replay savings: {{ replay_savings }} when available, otherwise say not measured yet.

proof:
  metrics:
    - route_decision_accuracy
    - forbidden_substitution_coverage
    - captured_artifact_completeness
    - crystallization_readiness

tests:
  - name: browser intent hands off to browser
    input: browse the active dashboard and summarize it
    expect:
      route: browser_handoff
      after_success:
        - handoff_browser_work_to_rote_browse_skill
        - pass_browser_context_to_rote_browse
        - resume_shell_work_after_browser_evidence
      forbid:
        - native_search_as_answer
        - raw_playwright
        - native_browser_tool_without_rote_browse
        - browser_cli_commands_in_rote_shell

  - name: active browser attach defers to rote-browse
    input: attach to my active Chrome session for a logged-in inbox and snapshot the current page
    expect:
      route: browser_handoff
      after_success:
        - handoff_browser_work_to_rote_browse_skill
        - pass_browser_context_to_rote_browse
        - resume_shell_work_after_browser_evidence
      forbid:
        - raw_playwright
        - direct_browser_tool_without_rote_browse
        - browser_cli_commands_in_rote_shell

  - name: repo status then email reminder uses ordered shell then browser plan
    input: check my gh status for repo ~/tulving/skillspec against the remote repo for pending checkins, then browse to create an email draft summary to act as a reminder
    expect:
      route: shell_then_browser_handoff
      plan_phases:
        - shell_status_via_rote_exec
        - browser_draft_handoff
      matched_rules:
        - cli_invocations_use_rote_exec
        - external_service_tasks_are_adapter_first
        - browser_words_handoff_to_browse
        - compound_shell_then_browser_uses_ordered_plan
      forbid:
        - direct_cli_without_rote_exec
        - direct_harness_cli_call_without_rote_exec
        - raw_playwright
        - direct_browser_tool_without_rote_browse
        - browser_cli_commands_in_rote_shell
      after_success:
        - run_cli_only_through_rote_exec
        - handoff_browser_work_to_rote_browse_skill
        - pass_browser_context_to_rote_browse
        - resume_shell_work_after_browser_evidence

  - name: browser setup belongs to rote-browse
    input: attach to my browser, click through the dashboard, snapshot the result, and stop the daemon when done
    expect:
      route: browser_handoff
      after_success:
        - handoff_browser_work_to_rote_browse_skill
        - pass_browser_context_to_rote_browse
        - resume_shell_work_after_browser_evidence
      forbid:
        - raw_playwright
        - direct_browser_tool_without_rote_browse
        - browser_cli_commands_in_rote_shell

  - name: browsing profiles does not trigger file io
    input: check whether ~/tulving/rote is in sync with remote using gh, then browse contributor profiles
    expect:
      route: shell_then_browser_handoff
      plan_phases:
        - shell_status_via_rote_exec
        - browser_draft_handoff
      after_success:
        - compute_workspace_trace
        - compute_workspace_stats
        - report_workspace_evidence_and_token_math
        - handoff_browser_work_to_rote_browse_skill
        - pass_browser_context_to_rote_browse
        - resume_shell_work_after_browser_evidence
      forbid:
        - native_search_as_answer
        - rote_exec_outside_workspace
        - native_browser_tool_without_rote_browse
        - browser_cli_commands_in_rote_shell

  - name: repo issues and parallel enrichment are adapter first
    input: can you check how many recent issues have been assigned to me in ~/tulving/rote repo and whether local is aligned with remote, then rank the top committers, get their emails and search using parallel to enrich their profile
    expect:
      route: adapter_first_cli_fallback
      matched_rules:
        - external_service_tasks_are_adapter_first
        - explicit_parallel_search_uses_parallel_adapter_or_cli
      after_success:
        - identify_required_services_and_tools
        - discover_relevant_rote_adapters
        - pair_parallel_adapter_and_cli_discovery
        - verify_adapter_or_cli_readiness
        - preflight_cli_fallback
        - run_cli_only_through_rote_exec
        - check_parallel_adapter_before_search
        - check_parallel_cli_readiness_via_rote_exec
        - choose_parallel_adapter_else_cli
        - use_parallel_search_via_adapter_or_cli
        - record_parallel_selection_evidence
        - capture_parallel_search_results
      forbid:
        - skipping_adapter_discovery
        - skipping_cli_readiness_check
        - direct_cli_without_rote_exec
        - using_parallel_cli_without_rote_exec
        - direct_mcp_tool_call
        - native_search_as_answer
        - native_codex_web_search
        - web_search_tool_without_parallel_preflight
        - direct_parallelweb_tool_call
        - adapter_only_parallel_check
        - exact_parallel_binary_assumption
        - static_parallel_cli_dependency
        - parallel_cli_discovery_not_run
        - parallel_cli_candidate_not_selected
        - parallel_cli_not_checked
        - skipping_parallel_adapter_check

  - name: explicit parallel search forbids native web search
    input: search using parallel to enrich contributor profiles
    expect:
      route: adapter_first_cli_fallback
      matched_rules:
        - explicit_parallel_search_uses_parallel_adapter_or_cli
      after_success:
        - pair_parallel_adapter_and_cli_discovery
        - check_parallel_adapter_before_search
        - check_parallel_cli_readiness_via_rote_exec
        - choose_parallel_adapter_else_cli
        - preflight_cli_fallback
        - use_parallel_search_via_adapter_or_cli
        - record_parallel_selection_evidence
        - capture_parallel_search_results
      forbid:
        - native_search_as_answer
        - native_codex_web_search
        - web_search_tool_without_parallel_preflight
        - direct_parallelweb_tool_call
        - direct_cli_without_rote_exec
        - using_parallel_cli_without_rote_exec
        - adapter_only_parallel_check
        - exact_parallel_binary_assumption
        - static_parallel_cli_dependency
        - parallel_cli_discovery_not_run
        - parallel_cli_candidate_not_selected
        - parallel_cli_not_checked
        - skipping_parallel_adapter_check

  - name: parallel search plus email browse pairs adapter cli and browser handoff
    input: can you use parallel to search for chetan conikee and tell me more about him and his work and then browse his email to check if there any new emails
    expect:
      route: browser_handoff
      matched_rules:
        - explicit_parallel_search_uses_parallel_adapter_or_cli
        - browser_words_handoff_to_browse
      after_success:
        - identify_required_services_and_tools
        - discover_relevant_rote_adapters
        - pair_parallel_adapter_and_cli_discovery
        - check_parallel_adapter_before_search
        - check_parallel_cli_readiness_via_rote_exec
        - choose_parallel_adapter_else_cli
        - record_parallel_selection_evidence
        - handoff_browser_work_to_rote_browse_skill
        - pass_browser_context_to_rote_browse
        - resume_shell_work_after_browser_evidence
      forbid:
        - native_search_as_answer
        - native_codex_web_search
        - direct_cli_without_rote_exec
        - using_parallel_cli_without_rote_exec
        - adapter_only_parallel_check
        - exact_parallel_binary_assumption
        - static_parallel_cli_dependency
        - parallel_cli_discovery_not_run
        - parallel_cli_candidate_not_selected
        - parallel_cli_not_checked
        - direct_browser_tool_without_rote_browse
        - browser_cli_commands_in_rote_shell

  - name: github cli fallback must be proven through rote exec
    input: if the github adapter is missing use gh to list recent assigned issues
    expect:
      route: adapter_first_cli_fallback
      matched_rules:
        - external_service_tasks_are_adapter_first
      after_success:
        - discover_relevant_rote_adapters
        - verify_adapter_or_cli_readiness
        - preflight_cli_fallback
        - run_cli_only_through_rote_exec
      forbid:
        - skipping_adapter_discovery
        - skipping_cli_readiness_check
        - direct_cli_without_rote_exec

  - name: durable evidence uses rote exec
    input: run git status and remember the result so I can query it later
    expect:
      route: one_shot_process
      after_success:
        - compute_workspace_trace
        - report_workspace_evidence_and_token_math
      forbid:
        - untracked_stdout_scrollback
        - final_summary_without_trace_math

  - name: direct cli invocation must use rote exec
    input: run ls and show me the output
    expect:
      route: one_shot_process
      after_success:
        - run_cli_only_through_rote_exec
      forbid:
        - direct_cli_without_rote_exec
        - direct_shell_command_without_rote_exec
        - direct_harness_cli_call_without_rote_exec
        - untracked_stdout_scrollback

  - name: rote exec requires named workspace and token math
    input: rote exec ls the repo and remember the evidence
    expect:
      route: one_shot_process
      after_success:
        - compute_workspace_trace
        - compute_workspace_stats
        - report_workspace_evidence_and_token_math
      forbid:
        - rote_exec_outside_workspace
        - anonymous_workspace
        - final_summary_without_workspace

  - name: file output uses declared file io
    input: save the command output to a report file
    expect:
      route: declared_file_io
      forbid:
        - implicit_file_side_effects

  - name: repo markdown discovery uses rote exec
    input: check repo ~/tulving/skillspec if there is roadmap and contribution markdown
    expect:
      route: one_shot_process
      matched_rules:
        - cli_invocations_use_rote_exec
        - repo_markdown_discovery_uses_rote_exec
      forbid:
        - raw_repo_search
        - direct_file_read
        - direct_cli_without_rote_exec
        - direct_harness_cli_call_without_rote_exec
      after_success:
        - run_cli_only_through_rote_exec

  - name: tailing logs uses stream follow
    input: tail the server log until ready
    expect:
      route: stream_follow

  - name: long cargo test uses background process
    input: run cargo test and check gh status while it runs
    expect:
      route: background_process
      after_success:
        - wait_for_process
        - follow_process_stream

  - name: terminal auth status uses pty
    input: run gh auth status in a terminal
    expect:
      route: pty_transcript
      forbid:
        - secret_in_pty_input

  - name: release work is guarded
    input: publish a release
    expect:
      elicit:
        - release_approval
      route_order:
        - dependency_preflight
        - one_shot_process
        - background_process
      forbid:
        - release_without_dry_run
        - release_without_dependency_preflight

  - name: missing dependency asks install scope
    input: deps check failed because gh is missing, install missing tool
    expect:
      route: dependency_preflight
      elicit:
        - install_scope
      forbid:
        - silent_global_install

  - name: crystallization requires deps and qa
    input: crystallize this shell workflow as a reusable flow
    expect:
      route: crystallized_flow
      after_success:
        - run_dependency_preflight
        - run_flow_qa
