        - compute_workspace_stats
        - report_workspace_evidence_and_token_math
        - handoff_browser_work_to_rote_browse_skill
        - pass_browser_context_to_rote_browse
        - resume_shell_work_after_browser_evidence
      forbid:
        - native_search_as_answer
        - rote_exec_outside_workspace
        - native_browser_tool_without_rote_browse
        - browser_cli_commands_in_rote_shell

  - name: repo issues and parallel enrichment are adapter first
    input: can you check how many recent issues have been assigned to me in ~/tulving/rote repo and whether local is aligned with remote, then rank the top committers, get their emails and search using parallel to enrich their profile
    expect:
      route: adapter_first_cli_fallback
      matched_rules:
        - external_service_tasks_are_adapter_first
        - explicit_parallel_search_uses_parallel_adapter_or_cli
      after_success:
        - identify_required_services_and_tools
        - discover_relevant_rote_adapters
        - verify_adapter_or_cli_readiness
        - preflight_cli_fallback
        - run_cli_only_through_rote_exec
        - check_parallel_adapter_before_search
        - use_parallel_search_via_adapter_or_cli
        - capture_parallel_search_results
      forbid:
        - skipping_adapter_discovery
        - skipping_cli_readiness_check
        - direct_cli_without_rote_exec
        - direct_mcp_tool_call
        - native_search_as_answer
        - native_codex_web_search
        - web_search_tool_without_parallel_preflight
        - direct_parallelweb_tool_call
        - skipping_parallel_adapter_check

  - name: explicit parallel search forbids native web search
    input: search using parallel to enrich contributor profiles
    expect:
      route: adapter_first_cli_fallback
      matched_rules:
        - explicit_parallel_search_uses_parallel_adapter_or_cli
      after_success:
        - check_parallel_adapter_before_search
        - preflight_cli_fallback
        - use_parallel_search_via_adapter_or_cli
        - capture_parallel_search_results
      forbid:
        - native_search_as_answer
        - native_codex_web_search
        - web_search_tool_without_parallel_preflight
        - direct_parallelweb_tool_call
        - direct_cli_without_rote_exec
        - skipping_parallel_adapter_check

  - name: github cli fallback must be proven through rote exec
    input: if the github adapter is missing use gh to list recent assigned issues
    expect:
      route: adapter_first_cli_fallback
      matched_rules:
        - external_service_tasks_are_adapter_first
      after_success:
        - discover_relevant_rote_adapters
        - verify_adapter_or_cli_readiness
        - preflight_cli_fallback
        - run_cli_only_through_rote_exec
      forbid:
        - skipping_adapter_discovery
        - skipping_cli_readiness_check
        - direct_cli_without_rote_exec

  - name: durable evidence uses rote exec
    input: run git status and remember the result so I can query it later
    expect:
      route: one_shot_process
      after_success:
        - compute_workspace_trace
        - report_workspace_evidence_and_token_math
      forbid:
        - untracked_stdout_scrollback
        - final_summary_without_trace_math

  - name: rote exec requires named workspace and token math
    input: rote exec ls the repo and remember the evidence
    expect:
      route: one_shot_process
      after_success:
        - compute_workspace_trace
        - compute_workspace_stats
        - report_workspace_evidence_and_token_math
      forbid:
        - rote_exec_outside_workspace
        - anonymous_workspace
        - final_summary_without_workspace

  - name: file output uses declared file io
    input: save the command output to a report file
    expect:
      route: declared_file_io
      forbid:
        - implicit_file_side_effects

  - name: tailing logs uses stream follow
    input: tail the server log until ready
    expect:
      route: stream_follow

  - name: long cargo test uses background process
    input: run cargo test and check gh status while it runs
    expect:
      route: background_process
      after_success:
        - wait_for_process
        - follow_process_stream

  - name: terminal auth status uses pty
    input: run gh auth status in a terminal
    expect:
      route: pty_transcript
      forbid:
        - secret_in_pty_input

  - name: release work is guarded
    input: publish a release
    expect:
      elicit:
        - release_approval
      route_order:
        - dependency_preflight
        - one_shot_process
        - background_process
      forbid:
        - release_without_dry_run
        - release_without_dependency_preflight

  - name: missing dependency asks install scope
    input: deps check failed because gh is missing, install missing tool
    expect:
      route: dependency_preflight
      elicit:
        - install_scope
      forbid:
        - silent_global_install

  - name: crystallization requires deps and qa
    input: crystallize this shell workflow as a reusable flow
    expect:
      route: crystallized_flow
      after_success:
        - run_dependency_preflight
        - run_flow_qa
