schema: skillspec/v0
id: skillspec
title: SkillSpec
description: SkillSpec post-install setup and skill-authoring multiplexer for importing existing prose skills, installing router mode, optionally installing durable-executor, creating specs from observed durable execution workspaces, revising SkillSpecs, compiling reviewed skills, optional install, and value reporting.
activation:
  summary: >
    Multiplex SkillSpec post-install setup: import existing SKILL.md skills from
    local folders or public URIs, install router mode, optionally install
    durable-executor, create specs from observed durable execution workspaces,
    revise SkillSpec YAML, and prove value before install or release.
  keywords:
    - skillspec
    - /skillspec
    - skillspec setup
    - post install setup
    - import SKILL.md
    - import existing skill
    - port skill
    - local folder or uri
    - install router
    - install skill-router
    - update router
    - repair skill-router
    - router mode
    - install durable-executor
    - durable executor install
    - observe durable executor
    - observed durable workspace
    - create spec skill from workspace
    - rote exec workspace
    - revise existing SkillSpec
    - update skill.spec.yml
    - prose skill to skillspec
    - skill.spec.yml
    - skillspec import-skill
    - skillspec plan
    - skillspec act
    - skillspec progress
    - phase progress
    - grammar sensemake
    - grammar checklist
    - compile skill
    - install codex agents
    - prove value
    - value report
  priority: domain
applies_when:
  - user_intent:
      - run SkillSpec post-install setup inside the harness prompt
      - convert a prose SKILL.md to skill.spec.yml
      - port a local skill folder into SkillSpec
      - import a public GitHub skill into SkillSpec
      - import an existing prose skill from a local folder or public URI
      - install skill-router after SkillSpec is installed
      - install router mode after SkillSpec is installed
      - update or repair an installed skill-router mode
      - install durable-executor as an optional first-hop skill
      - create a SkillSpec skill by observing a durable-executor rote-exec workspace
      - revise an existing SkillSpec-backed skill
      - add phase planning and progress tracking to a SkillSpec-backed skill
      - compile and optionally install a reviewed SkillSpec-backed skill
      - run proof or value reporting for a ported skill
entry:
  prompt: Multiplex SkillSpec setup inside the harness prompt. Teach the harness the current grammar, choose the right route, stage or map sources, install router or optional durable-executor only through reviewed commands, observe durable workspaces when requested, then validate, phase-plan, record progress evidence, and prove value before install.
  decision_required: true
  forbid_before_decision:
    - edit_yaml_from_memory
    - skip_grammar_sensemake
    - import_without_reading_source_skill
    - install_before_dependency_surface_approval
    - claim_unproven_execution_evidence
    - consult_existing_ports_without_user_request
    - consult_repo_history_without_user_request
    - consult_memory_or_prior_examples_without_user_request
  tool_boundary:
    default: deny
    allow:
      - skillspec_cli
      - skillspec_grammar_commands
      - local_skill_files
      - local_repo_files
      - git
      - cargo
      - rote_workspace
      - declared_commands_dependencies_imports_resources
    forbid:
      - edit_yaml_from_memory
      - skip_grammar_sensemake
      - install_before_dependency_surface_approval
      - claim_unproven_execution_evidence
      - consult_existing_ports_without_user_request
      - consult_repo_history_without_user_request
      - consult_memory_or_prior_examples_without_user_request
    permission_required_for:
      - any_unlisted_tool
      - any_forbidden_action
      - any_new_data_source
      - any_new_execution_substrate
      - any_new_provider_or_adapter
      - any_external_side_effect
routes:
  - id: local_skill_port
    label: Port local skill
    rank: 1
    description: Use when the source is a local SKILL.md file or local skill folder.
    execution_plan:
      mode: ordered
      reason: Local ports need source preservation, grammar preflight, a mechanical draft, semantic promotion, QA, and a value report.
      phases:
        - id: resolve_local_source
          owner_skill: skillspec
          description: Resolve the user-supplied local path to one skill folder and preserve sibling resources.
          requires:
            - inventory_source_folder
            - read_source_skill
          forbid:
            - copy_only_skill_md_when_resources_exist
        - id: grammar_preflight
          owner_skill: skillspec
          description: Run the grammar sensemaking and checklist commands before import or YAML editing.
          tool_boundary:
            allow:
              - skillspec_cli
              - skillspec_grammar_commands
              - local_skill_files
            permission_required_for:
              - any_grammar_source_outside_embedded_runtime_artifacts
          requires:
            - grammar_sensemake_index
            - grammar_sensemake_porting
            - grammar_checklist_import
          forbid:
            - infer_grammar_from_memory
        - id: mechanical_import
          owner_skill: skillspec
          description: Generate and inspect the draft spec without treating it as final truth.
          requires:
            - import_skill_draft
            - sensemake_draft
            - produce_mechanical_draft
        - id: semantic_promotion
          owner_skill: skillspec
          description: Fill the coverage matrix from the current source only, split source code into package-local resources/code entries, and promote routes, rules, deps, imports, resources, commands, recipes, states, closures, tests, and review notes.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_skill_files
              - local_repo_files
              - file_edit_tool
              - declared_commands_dependencies_imports_resources
            permission_required_for:
              - any_unlisted_tool
              - any_new_data_source
              - install_or_release_side_effect
          requires:
            - fill_coverage_matrix
            - split_source_code_into_resources
            - review_and_promote_draft
            - produce_reviewed_spec
          forbid:
            - consult_existing_ports_without_user_request
            - consult_repo_history_without_user_request
            - consult_memory_or_prior_examples_without_user_request
        - id: qa_and_proof
          owner_skill: skillspec
          description: Validate, test, check imports and dependencies, run a demo phase plan/action checklist, record progress evidence, and align the trace.
          tool_boundary:
            allow:
              - skillspec_cli
              - cargo
              - local_repo_files
              - local_trace_files
            permission_required_for:
              - install_or_release_side_effect
              - network_access
              - any_unlisted_tool
          requires:
            - run_structural_qa
            - plan_phase_order
            - act_named_phase
            - progress_show
            - prove_value
        - id: report_value
          owner_skill: skillspec
          description: Print the value report and contract-quality grades.
          requires:
            - generate_value_report
  - id: remote_skill_port
    label: Port remote skill
    rank: 2
    description: Use when the source is an owner/repo shorthand, GitHub URL, owner/repo/path, or GitHub tree URL.
    execution_plan:
      mode: ordered
      phases:
        - id: approve_remote_source
          owner_skill: skillspec
          requires:
            - approve_remote_source_access
        - id: stage_remote_source
          owner_skill: skillspec
          requires:
            - stage_remote_folder
            - find_skill_candidates
          forbid:
            - install_from_remote_checkout
            - execute_imported_snippets_during_staging
        - id: continue_as_local_port
          owner_skill: skillspec
          route: local_skill_port
          requires:
            - local_porting_loop
  - id: install_skill_router
    label: Install router mode
    rank: 3
    description: Use when the user wants post-install setup to create or refresh the explicit-only skill-router surface in the configured skill roots.
    execution_plan:
      mode: ordered
      reason: Router mode changes skill visibility, so it must inventory roots, run the router install command, and verify the explicit-only router surface.
      phases:
        - id: inspect_router_targets
          owner_skill: skillspec
          description: Identify the skill roots where router mode should be installed and verify the SkillSpec CLI supports router commands.
          requires:
            - list_install_targets
            - router_help
          forbid:
            - infer_router_roots_without_check
        - id: install_router_surface
          owner_skill: skillspec
          description: Install or refresh the router skill inside the selected roots without using a separate router root.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
              - declared_commands_dependencies_imports_resources
            permission_required_for:
              - install_or_release_side_effect
              - any_unlisted_tool
          requires:
            - router_install
            - verify_router_install
          forbid:
            - use_removed_router_root
            - make_router_implicit_when_durable_executor_missing
        - id: report_router_mode
          owner_skill: skillspec
          description: Report which roots were changed, whether durable-executor stayed implicit, and whether durable first-hop is unavailable.
          requires:
            - verify_router_installed
  - id: update_skill_router
    label: Update router mode
    rank: 4
    description: Use when the user wants to update or repair an existing skill-router install, including stale generated text, missing router spec files, or recorded harness roots that need to be rewritten.
    execution_plan:
      mode: ordered
      reason: Router update mutates recorded harness roots, so it must start from the saved router config, create a backup, rewrite every managed router skill, and warn the operator to restart active harness sessions.
      phases:
        - id: inspect_router_update
          owner_skill: skillspec
          description: Verify the SkillSpec CLI supports router update and that router mode has an existing config to update.
          requires:
            - router_help
          forbid:
            - mutate_unrecorded_router_roots
        - id: update_router_surface
          owner_skill: skillspec
          description: Back up the existing router state, rewrite every recorded router skill, reapply visibility, rebuild the index, and check preparedness.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
              - declared_commands_dependencies_imports_resources
            permission_required_for:
              - install_or_release_side_effect
              - any_unlisted_tool
          requires:
            - router_update
          forbid:
            - update_router_without_backup
            - mutate_unrecorded_router_roots
        - id: report_router_update
          owner_skill: skillspec
          description: Report the backup path, updated router roots, preparedness status, durable-executor status, and restart warning.
          requires:
            - verify_router_updated
  - id: install_durable_executor
    label: Install durable-executor
    rank: 5
    description: Use when the user wants the optional durable-executor first-hop skill installed or refreshed after SkillSpec itself is installed.
    execution_plan:
      mode: ordered
      reason: Durable-executor is optional and may come from a local folder or URI, so the source and target must be explicit before writing skill roots.
      phases:
        - id: resolve_durable_source
          owner_skill: skillspec
          description: Determine whether durable-executor is already present or whether the user supplied a local folder or public URI source.
          requires:
            - find_durable_executor
            - choose_durable_source
          forbid:
            - assume_bundled_durable_executor
        - id: import_or_install_durable
          owner_skill: skillspec
          description: Port or install durable-executor from the approved source using the same reviewed import/install path as other skills.
          requires:
            - local_porting_loop
            - install_skill
            - verify_durable_executor
          forbid:
            - install_durable_without_source_or_existing_skill
            - make_durable_executor_explicit_in_router_mode
        - id: report_durable_status
          owner_skill: skillspec
          description: Report whether durable-executor is installed and remains the router-managed implicit exception.
          requires:
            - verify_durable_optional_status
  - id: observed_durable_workspace_to_skill
    label: Create skill from observed durable workspace
    rank: 6
    description: Use when the user wants to ask for a real task, let durable-executor run it through rote-exec evidence, inspect the workspace, and synthesize a reviewed SkillSpec-backed skill from the observed workflow.
    execution_plan:
      mode: ordered
      reason: Observed-workflow creation depends on evidence from a named durable workspace rather than a pre-existing prose SKILL.md.
      phases:
        - id: elicit_observation_task
          owner_skill: skillspec
          description: Ask for the task to run or identify the existing durable workspace to observe; when the prompt already includes the task, carry it forward without inventing a workspace.
          requires:
            - choose_observation_workspace
            - capture_observation_task
          forbid:
            - observe_anonymous_workspace
          jumps:
            - when: existing_named_workspace_supplied
              to_phase: observe_durable_workspace
              reason: Existing durable workspaces can be observed directly without running another task.
        - id: run_observation_task
          owner_skill: durable-executor
          description: Run the quoted observation task through durable-executor first, preserving the selected substrate, capability evidence, workspace name, artifacts, and return packet for synthesis.
          tool_boundary:
            allow:
              - durable-executor
              - skillspec_cli
              - rote_exec
              - local_trace_files
            permission_required_for:
              - any_unlisted_tool
              - external_network_or_browser_action
              - credentialed_or_private_data_access
          requires:
            - verify_durable_executor
            - handoff_observation_task_to_durable_executor
            - capture_observation_workspace
            - record_capability_selection_ledger
          forbid:
            - direct_cli_without_rote_exec
            - direct_shell_command_without_rote_exec
            - direct_api_call_without_rote_adapter_or_rote_exec
            - observe_anonymous_workspace
          handoff:
            to_skill: durable-executor
            boundary: resume_after_handoff
            pass_context:
              - user_intent
              - observation_task
              - workspace
              - trace_dir
              - return_to
              - execution_policy
              - evidence_context
            forbid:
              - direct_cli_without_rote_exec
              - direct_shell_command_without_rote_exec
              - direct_api_call_without_rote_adapter_or_rote_exec
              - generated_skill_install_without_review
            reason: The observed workflow must be created by durable execution evidence first; skillspec resumes only after a named workspace exists to inspect.
        - id: observe_durable_workspace
          owner_skill: skillspec
          description: Inspect rote workspace stats, command log, metadata, and artifacts without replaying unsafe actions.
          tool_boundary:
            allow:
              - rote_workspace
              - rote_exec
              - local_trace_files
              - local_repo_files
              - skillspec_cli
            permission_required_for:
              - replay_or_mutating_action
              - any_unlisted_tool
          requires:
            - observe_workspace_stats
            - observe_workspace_log
            - observe_workspace_meta
          forbid:
            - replay_workspace_actions_without_approval
            - claim_workspace_tokens_without_stats
        - id: synthesize_observed_spec
          owner_skill: skillspec
          description: Build a reviewed skill.spec.yml from observed commands, dependencies, inputs, outputs, rules, elicitations, tests, and proof gaps.
          requires:
            - synthesize_from_workspace
            - synthesize_observed_skill_spec
            - fill_coverage_matrix
            - produce_observed_workspace_spec
        - id: qa_observed_spec
          owner_skill: skillspec
          description: Validate, test, decide, align, and value-report the observed-workflow spec before optional install.
          requires:
            - run_structural_qa
            - prove_value
  - id: revise_existing_skillspec
    label: Revise existing SkillSpec
    rank: 7
    description: Use when a skill already has skill.spec.yml and the user wants to revise, improve, or update it.
    execution_plan:
      mode: ordered
      phases:
        - id: grammar_and_current_map
          owner_skill: skillspec
          description: Learn the current grammar and summarize the existing SkillSpec before editing it.
          requires:
            - grammar_sensemake_index
            - grammar_sensemake_porting
            - sensemake_current_spec
            - grammar_checklist_import
          forbid:
            - patch_yaml_from_memory
        - id: inspect_active_handles
          owner_skill: skillspec
          description: Use query/refs plus the phase plan to inspect only active handles and execution order.
          requires:
            - plan_phase_order
            - act_named_phase
            - query_active_handles
            - refs_active_handles
        - id: revise_reviewed_spec
          owner_skill: skillspec
          description: Patch only the reviewed SkillSpec constructs required by the requested change.
          requires:
            - fill_coverage_matrix
            - produce_reviewed_spec
        - id: rerun_qa
          owner_skill: skillspec
          description: Re-run structural QA, phase progress, proof, compile, and value reporting after revision.
          requires:
            - run_structural_qa
            - progress_show
            - prove_value
  - id: compile_and_install_reviewed_skill
    label: Compile and install reviewed skill
    rank: 8
    description: Use only after a reviewed spec validates and the user explicitly approves install targets and dependency surface.
    execution_plan:
      mode: ordered
      phases:
        - id: dependency_surface
          owner_skill: skillspec
          requires:
            - deps_check_all
            - show_dependency_surface
            - approve_dependency_surface
        - id: compile_targets
          owner_skill: skillspec
          requires:
            - compile_codex_skill
            - compile_claude_skill
        - id: dry_run_install
          owner_skill: skillspec
          requires:
            - list_install_targets
            - install_dry_run
            - approve_install_targets
        - id: install
          owner_skill: skillspec
          requires:
            - install_skill
  - id: prove_skill_value
    label: Prove skill value
    rank: 9
    description: Use when the user asks to prove, demo, align, or value-report a ported SkillSpec skill.
    execution_plan:
      mode: ordered
      phases:
        - id: run_demo_decision
          owner_skill: skillspec
          requires:
            - plan_phase_order
            - act_named_phase
            - decide_demo
            - produce_decision_trace
        - id: align_trace
          owner_skill: skillspec
          requires:
            - progress_show
            - trace_align
            - report_alignment_status
        - id: print_value
          owner_skill: skillspec
          requires:
            - value_report
rules:
  - id: route_local_sources_to_local_port
    when:
      user_says_any:
        - SKILL.md
        - local skill
        - local folder
        - /skills/
        - ~/.codex/skills
        - ~/.agents/skills
    prefer: local_skill_port
    after_success:
      - local_porting_loop
      - generate_value_report
    reason: Local SKILL.md and skill folders can be staged directly with resources intact.
  - id: route_remote_sources_to_remote_port
    when:
      user_says_any:
        - github.com
        - owner/repo
        - tree/main
        - public repo
        - remote skill
    prefer: remote_skill_port
    elicit:
      - approve_remote_source_access
      - choose_candidate_skill
    forbid:
      - install_from_remote_checkout
      - execute_imported_snippets_during_staging
    reason: Remote inputs must be staged locally before import and install.
  - id: post_install_setup_routes_to_multiplexer
    when:
      user_says_any:
        - post install
        - post-install
        - setup after install
        - skillspec setup
        - /skillspec
        - installed skillspec
    route_order:
      - install_skill_router
      - update_skill_router
      - install_durable_executor
      - observed_durable_workspace_to_skill
      - local_skill_port
      - remote_skill_port
      - revise_existing_skillspec
    reason: Once SkillSpec is installed, the prompt skill should be the single setup entry point for router, durable, import, observe, revise, and proof workflows.
  - id: route_prompt_import_to_skill_port
    when:
      user_says_any:
        - /skillspec import
        - import existing skill
        - import local skill
        - import remote skill
    route_order:
      - local_skill_port
      - remote_skill_port
    after_success:
      - local_porting_loop
      - generate_value_report
    reason: The post-install prompt uses import language, but it should still enter the reviewed local or remote porting path.
  - id: route_router_install_to_router_setup
    when:
      user_says_any:
        - install router
        - install skill-router
        - router mode
        - setup router
        - explicit-only router
        - skill-router explicit
    prefer: install_skill_router
    forbid:
      - use_removed_router_root
      - make_router_implicit_when_durable_executor_missing
    after_success:
      - verify_router_installed
    reason: Router setup is its own post-install path and must install into selected roots, not a separate router root.
  - id: route_router_update_to_router_maintenance
    when:
      user_says_any:
        - update router
        - router update
        - update skill-router
        - repair router
        - repair skill-router
        - stale router
        - missing router spec
        - restart harness
    prefer: update_skill_router
    forbid:
      - update_router_without_backup
      - mutate_unrecorded_router_roots
    after_success:
      - verify_router_updated
    reason: Router update is backup-first maintenance for already-recorded harness roots, not a fresh install or index-only refresh.
  - id: route_durable_install_to_optional_durable
    when:
      user_says_any:
        - install durable-executor
        - install durable executor
        - durable first-hop
        - durable first hop
        - optional durable
        - durable-executor setup
    prefer: install_durable_executor
    elicit:
      - choose_durable_source
      - approve_install_targets
    forbid:
      - assume_bundled_durable_executor
      - install_durable_without_source_or_existing_skill
      - make_durable_executor_explicit_in_router_mode
    after_success:
      - verify_durable_optional_status
    reason: Durable-executor is optional; install it only from an existing local skill or approved source, and keep it implicit when router mode is active.
  - id: route_observed_workspace_to_spec
    when:
      user_says_any:
        - observe durable workspace
        - create spec from durable
        - create specskill
        - create spec skill
        - rote-exec workspace
        - durable execution workspace
        - observe workspace and create skill
        - create from observed durable execution
        - create skill from observed durable execution
        - turn observed durable execution into a skill
        - create skill by observing durable execution
        - run task first and create skill
        - observe durable execution and create skill
    prefer: observed_durable_workspace_to_skill
    elicit:
      - choose_observation_workspace
    forbid:
      - observe_anonymous_workspace
      - replay_workspace_actions_without_approval
      - claim_workspace_tokens_without_stats
    after_success:
      - produce_observed_workspace_spec
      - generate_value_report
    reason: Observed-workflow skill creation starts from durable evidence, not prose source, so the workspace must be named and inspected before synthesis.
  - id: grammar_preflight_is_mandatory
    when:
      user_says_any:
        - port
        - import
        - convert
        - revise
        - improve
        - create skill.spec.yml
    route_order:
      - local_skill_port
      - remote_skill_port
      - revise_existing_skillspec
    forbid:
      - skip_grammar_sensemake
      - infer_grammar_from_memory
      - patch_yaml_from_memory
    after_success:
      - run_grammar_preflight
    reason: The harness must learn the runtime grammar artifact before fitting prose into SkillSpec.
  - id: mechanical_import_is_draft_only
    when:
      user_says_any:
        - import-skill
        - mechanical draft
        - deterministic extractor
    prefer: local_skill_port
    forbid:
      - treat_mechanical_draft_as_final
      - install_unreviewed_draft
      - claim_generated_tests_reviewed
    after_success:
      - sensemake_draft
      - fill_coverage_matrix
    reason: The source prose states the deterministic import command is first-pass scaffolding, not a finished contract.
  - id: field_import_uses_only_current_source
    when:
      user_says_any:
        - port
        - import
        - convert
        - semantic promotion
        - coverage matrix
    forbid:
      - consult_existing_ports_without_user_request
      - consult_repo_history_without_user_request
      - consult_memory_or_prior_examples_without_user_request
      - infer_from_example_skill_specs
    after_success:
      - fill_coverage_matrix
    reason: Field imports must derive semantics from the staged source, embedded grammar, draft sensemake, and user-approved references only.
  - id: source_code_becomes_resources_and_code
    when:
      user_says_any:
        - source code
        - fenced code
        - code blocks
        - scripts
        - source/
    forbid:
      - leave_source_code_unreferenced
      - flatten_source_code_into_prompt_blob
      - execute_imported_snippets_during_staging
    after_success:
      - split_source_code_into_resources
    reason: Source code found in source material must be preserved as package-local resource files and referenced through resources/code instead of loose prompt prose.
  - id: imports_resources_must_be_connected
    when:
      user_says_any:
        - references
        - resources
        - imports
        - scripts
        - assets
        - source material
    forbid:
      - leave_orphaned_imports
      - leave_orphaned_resources
      - flatten_referenced_files_into_prompt_blob
    after_success:
      - imports_check
    reason: Runtime guidance and provenance must be package-local and connected to routes, rules, commands, recipes, artifacts, or review notes.
  - id: dependency_surface_requires_review
    when:
      user_says_any:
        - install it
        - install the result
        - install generated skill
        - install reviewed skill
        - release
        - compile
        - deps
        - dependency
    route_order:
      - compile_and_install_reviewed_skill
    elicit:
      - approve_dependency_surface
    forbid:
      - install_before_dependency_surface_approval
      - silently_install_missing_tools
      - claim_missing_dependency_present
    after_success:
      - deps_check_all
      - show_dependency_surface
    reason: Old prose dependency assumptions must become explicit checks and provision choices before side effects.
  - id: install_requires_validated_reviewed_spec
    when:
      user_says_any:
        - install codex
        - install agents
        - install it
        - install the result
        - install generated skill
        - install reviewed skill
        - codex and agents
        - --install
        - install target
    route_order:
      - compile_and_install_reviewed_skill
    elicit:
      - approve_install_targets
    forbid:
      - install_unreviewed_draft
      - install_before_validate_test_imports_deps
      - install_from_remote_checkout
    after_success:
      - install_skill
      - generate_value_report
    reason: Installing writes into harness roots, so it requires reviewed QA and explicit target approval.
  - id: prove_requests_route_to_value
    when:
      user_says_any:
        - prove
        - value
        - demo decision
        - alignment
        - trace align
        - value report
        - skillspec plan
        - skillspec act
        - skillspec progress
        - progress report
    route_order:
      - prove_skill_value
    after_success:
      - decide_demo
      - trace_align
      - value_report
    forbid:
      - claim_unproven_execution_evidence
    reason: The product is the visible value report backed by decision and alignment evidence.
  - id: revision_starts_with_grammar_and_current_spec
    when:
      user_says_any:
        - revise existing SkillSpec
        - existing SkillSpec
        - existing SkillSpec-backed
        - existing skillspec yaml
        - skillspec yaml
        - update this skillspec spec
        - route coverage
        - improve this spec
        - update skill.spec.yml
        - update the spec
        - update existing spec
        - patch the YAML
        - plan act progress
        - phase progress
        - progress ledger
    prefer: revise_existing_skillspec
    forbid:
      - patch_yaml_from_memory
      - skip_current_spec_sensemake
    after_success:
      - run_structural_qa
    reason: Existing SkillSpecs, including skillspec itself, must be revised from the current grammar, active handles, phase plan, and progress contract, not broad YAML edits or prose import.
  - id: durable_tool_work_uses_durable_substrate
    when:
      user_says_any:
        - run command
        - call API
        - execute
        - trace
        - evidence
        - future recall
    forbid:
      - direct_cli_without_durable_wrapper
      - untracked_stdout_as_evidence
    after_success:
      - produce_return_packet
    reason: Porting and proof work that executes tools must preserve evidence and route through the durable execution substrate.
  - id: degraded_draft_blocks_install
    when:
      user_says_any:
        - missing imports check
        - missing deps check
        - no imports check
        - no deps check
        - unavailable CLI
        - degraded draft
        - release
    forbid:
      - install_degraded_draft
      - release_degraded_draft
      - claim_dependency_presence_without_check
    after_success:
      - report_degraded_status
    reason: Missing grammar/import/dependency capability must be visible and cannot produce a release-ready skill.
elicitations:
  choose_candidate_skill:
    question: Which discovered SKILL.md should be ported?
    required_when:
      - route: remote_skill_port
    choices:
      - id: first_candidate
        label: First candidate
        description: Port the highest-ranked discovered skill folder.
      - id: named_path
        label: Named path
        description: Use the exact path supplied by the user.
      - id: stop_and_list
        label: List only
        description: Stop after listing candidates for explicit selection.
    default: stop_and_list
  approve_remote_source_access:
    question: May I stage the public remote source locally for read-only import?
    required_when:
      - route: remote_skill_port
    choices:
      - id: approve_read_only
        label: Approve read-only staging
        description: Clone or download the source into a temporary local folder without executing it.
      - id: local_source_only
        label: Use local source only
        description: Do not access the remote; wait for a local path.
    default: approve_read_only
  choose_durable_source:
    question: Which durable-executor source should be used?
    required_when:
      - route: install_durable_executor
    choices:
      - id: existing_installed
        label: Existing installed
        description: Use the durable-executor already present in a selected skill root.
      - id: supplied_source
        label: Supplied source
        description: Use the local folder or public URI supplied in the prompt.
      - id: skip_durable
        label: Skip durable
        description: Leave durable first-hop unavailable and report that router mode can still install.
    default: existing_installed
  choose_observation_workspace:
    question: Which durable execution evidence should be used?
    required_when:
      - route: observed_durable_workspace_to_skill
    choices:
      - id: run_task_first
        label: Run task first
        description: Use the concrete task in the prompt, run it through durable-executor, then observe the resulting workspace.
      - id: current_workspace
        label: Current workspace
        description: Observe the named rote workspace already active in this session.
      - id: named_workspace
        label: Named workspace
        description: Use the workspace name provided by the user.
    default: run_task_first
  approve_dependency_surface:
    question: Do you approve the inferred dependency surface for validation, proof, compile, or install?
    required_when:
      - route: compile_and_install_reviewed_skill
    choices:
      - id: approve_checked_only
        label: Checked dependencies only
        description: Continue when required dependencies are present or deferred with explicit review notes.
      - id: draft_only
        label: Keep draft-only
        description: Do not install or release until missing dependencies are resolved.
      - id: choose_provision
        label: Provision missing
        description: Ask before running any provision command for a missing tool.
    default: draft_only
  approve_install_targets:
    question: Which harness targets should receive the generated SkillSpec-backed skill?
    required_when:
      - route: compile_and_install_reviewed_skill
    choices:
      - id: codex_and_agents
        label: Codex and Agents
        description: Install into both detected personal skill roots after dry-run.
      - id: codex_only
        label: Codex only
        description: Install only into the Codex skill root after dry-run.
      - id: agents_only
        label: Agents only
        description: Install only into the Agents skill root after dry-run.
    default: codex_and_agents
dependencies:
  skillspec_cli:
    kind: cli
    description: SkillSpec CLI with grammar, import, validate, imports, deps, test, compile, plan, act, progress, decide, and trace commands.
    command: skillspec
    check:
      command: skillspec
    permission:
      required: false
      reason: Read-only checks and local compilation are safe, but install commands need explicit target approval.
      safety: local_read
    provision:
      elicit: approve_dependency_surface
      options:
        - id: install_from_repo
          label: Build from repo
          description: Build the checked-out workspace binary when developing SkillSpec itself.
          command: cargo build
          safety: local_write
  git_cli:
    kind: cli
    description: Required only for staging public GitHub repositories or tree URLs.
    command: git
    check:
      command: git
    permission:
      required: true
      reason: Remote staging performs network reads and writes a temporary local checkout.
      safety: network_read
  rg_cli:
    kind: cli
    description: Fast local inventory and candidate discovery for staged skill folders.
    command: rg
    check:
      command: rg
    permission:
      required: false
      safety: local_read
  cargo_cli:
    kind: cli
    description: Optional development fallback for building the checked-out SkillSpec binary when the installed CLI is stale.
    command: cargo
    check:
      command: cargo
    permission:
      required: true
      reason: Building from source writes local target artifacts.
      safety: local_write
  rote_cli:
    kind: cli
    description: Required when creating a SkillSpec from observed durable execution evidence in a named rote workspace.
    command: rote
    check:
      command: rote
    permission:
      required: true
      reason: Observing a workspace reads local command logs, metadata, stats, and artifact references that may include sensitive user workflow evidence.
      safety: local_read
resources:
  source_skill_md:
    path: source/SKILL.md
    role: source_material
    description: Preserved full prose source for the skillspec skill before compilation replaces the visible loader.
    used_by:
      - kind: route
        id: local_skill_port
      - kind: route
        id: revise_existing_skillspec
      - kind: recipe
        id: local_porting_loop
      - kind: artifact
        id: preserved_source
artifacts:
  preserved_source:
    kind: file
    path: source/SKILL.md
    description: Full prose SKILL.md retained for provenance and future review.
    produced_by:
      - kind: command
        id: preserve_source_skill
    consumed_by:
      - kind: recipe
        id: local_porting_loop
  mechanical_draft:
    kind: file
    path: .skillspec/drafts/skill.spec.yml
    description: Deterministic import-skill output used as review scaffolding, never as the final contract.
    produced_by:
      - kind: command
        id: import_skill_draft
    consumed_by:
      - kind: recipe
        id: local_porting_loop
  reviewed_spec:
    kind: file
    path: skill.spec.yml
    description: Human-reviewed SkillSpec contract with semantic routes, rules, dependencies, tests, and review notes.
    produced_by:
      - kind: recipe
        id: local_porting_loop
    consumed_by:
      - kind: command
        id: validate_spec
      - kind: command
        id: compile_codex_skill
  compiled_codex_skill:
    kind: file
    path: SKILL.md
    description: Minimal generated loader that points agents at the colocated skill.spec.yml.
    produced_by:
      - kind: command
        id: compile_codex_skill
  compiled_claude_skill:
    kind: file
    path: .generated/claude/SKILL.md
    description: Optional Claude-target compiled skill output.
    produced_by:
      - kind: command
        id: compile_claude_skill
  coverage_matrix:
    kind: report
    path: .skillspec/reports/coverage-matrix.yml
    description: Prose-span to SkillSpec-construct mapping with confidence and review status.
    produced_by:
      - kind: recipe
        id: coverage_review_loop
  value_report:
    kind: report
    path: .skillspec/reports/value-report.md
    description: User-facing summary synthesized from sensemake, test, dependency, decision, progress, and alignment outputs; no native `skillspec skill value` command exists yet.
    produced_by:
      - kind: command
        id: value_report
  decision_trace:
    kind: directory
    path: .skillspec/traces/run-*
    description: Decision trace captured during the realistic demo route.
    produced_by:
      - kind: command
        id: decide_demo
    consumed_by:
      - kind: command
        id: trace_align
  execution_ledger:
    kind: file
    path: .skillspec/traces/<run-id>/execution.jsonl
    description: Structured progress and action evidence ledger for phase completion, requirement proof, handoffs, and evidence references.
    produced_by:
      - kind: command
        id: progress_record_phase
      - kind: command
        id: progress_record_requirement
    consumed_by:
      - kind: command
        id: progress_show
      - kind: command
        id: trace_align
  progress_report:
    kind: file
    path: .skillspec/traces/<run-id>/progress.json
    description: Derived view of completed, current, blocked, and remaining phases for the selected route.
    produced_by:
      - kind: command
        id: progress_show
    consumed_by:
      - kind: command
        id: value_report
  durable_workspace_report:
    kind: report
    path: .skillspec/reports/durable-workspace-report.md
    description: Summary of the observed rote workspace commands, dependencies, inputs, outputs, stats, artifacts, and proof gaps.
    produced_by:
      - kind: command
        id: observe_workspace_stats
      - kind: command
        id: observe_workspace_log
      - kind: command
        id: observe_workspace_meta
    consumed_by:
      - kind: code
        id: synthesize_observed_skill_spec
  observed_skill_spec:
    kind: file
    path: skill.spec.yml
    description: Reviewed SkillSpec synthesized from a durable workspace observation rather than from a prose SKILL.md source.
    produced_by:
      - kind: code
        id: synthesize_observed_skill_spec
    consumed_by:
      - kind: command
        id: validate_spec
      - kind: command
        id: test_spec
commands:
  grammar_sensemake_index:
    description: Learn the available grammar affordances without reading compiler source.
    template: skillspec grammar sensemake --view index
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  grammar_sensemake_porting:
    description: Load prose-to-SkillSpec mapping guidance and the import coverage checklist.
    template: skillspec grammar sensemake --view porting
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  grammar_checklist_import:
    description: Load the explicit checklist that gates semantic promotion and install readiness.
    template: skillspec grammar checklist --for import-skill
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  grammar_schema_json:
    description: Inspect the runtime JSON schema when a field shape is unclear.
    template: skillspec grammar schema
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  inventory_source_folder:
    description: Inventory source files before import so resources, scripts, examples, and sibling references are not dropped.
    template: rg --files <source-skill-folder>
    safety: local_read
    requires:
      dependencies:
        - rg_cli
  read_source_skill:
    description: Read the full SKILL.md and directly referenced resources before semantic promotion; source code blocks and scripts are review material until declared as resources/code.
    template: sed -n '1,999p' <source-skill-folder>/SKILL.md
    safety: local_read
  preserve_source_skill:
    description: Preserve the full prose source before compiling over the visible SKILL.md loader.
    template: cp -f <source-skill-folder>/SKILL.md <output-skill-folder>/source/SKILL.md
    safety: local_write
  stage_remote_folder:
    description: Stage a public GitHub repository path locally with sparse checkout when possible.
    template: git clone --depth 1 --filter=blob:none --sparse <repo-url> <tmp-root>/<repo-name>
    safety: network_read
    requires:
      dependencies:
        - git_cli
  find_skill_candidates:
    description: Find candidate SKILL.md files inside a staged repository when the user supplied only a repo.
    template: rg --files <staged-repo> | rg '/SKILL\\.md$'
    safety: local_read
    requires:
      dependencies:
        - rg_cli
  import_skill_draft:
    description: Generate a deterministic draft from a local skill folder.
    template: skillspec import-skill <source-skill-folder> --out <draft-dir>/skill.spec.yml
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  sensemake_draft:
    description: Summarize the mechanical draft's actual routes, rules, deps, commands, imports, tests, and query handles.
    template: skillspec sensemake <draft-dir>/skill.spec.yml --view index
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  sensemake_current_spec:
    description: Summarize the current reviewed spec before revising it.
    template: skillspec sensemake <skill-folder>/skill.spec.yml --view index
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  plan_phase_order:
    description: List the selected route and ordered phase names before acting so the harness knows the task order.
    template: skillspec plan <skill-folder>/skill.spec.yml --input '<task>' --trace-dir <skill-folder>/.skillspec/traces
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  act_named_phase:
    description: Expand one named phase into the active OODA checklist, allowed actions, forbids, handoffs, dependencies, and evidence expectations.
    template: skillspec act <skill-folder>/skill.spec.yml --input '<task>' --run <trace-dir> --phase <phase-id>
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  progress_record_phase:
    description: Append structured evidence that a phase started, completed, or blocked.
    template: skillspec progress record <trace-dir> phase-completed <phase-id> --evidence-kind <kind> --evidence-ref <ref>
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  progress_record_requirement:
    description: Append structured evidence that a phase requirement was satisfied or failed.
    template: skillspec progress record <trace-dir> requirement-satisfied <phase-id> <requirement-id> --evidence-kind <kind> --evidence-ref <ref>
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  progress_show:
    description: Show completed, current, blocked, and remaining phases from the run execution ledger and write progress.json.
    template: skillspec progress show <skill-folder>/skill.spec.yml --run <trace-dir>
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  query_active_handles:
    description: Inspect a specific route, rule, command, state, or dependency handle instead of reading the whole YAML.
    template: skillspec query <skill-folder>/skill.spec.yml <handle> --view summary
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  refs_active_handles:
    description: Inspect references from an active handle during targeted revision.
    template: skillspec refs <skill-folder>/skill.spec.yml <handle> --view summary
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  validate_spec:
    description: Validate the reviewed spec schema and cross-references.
    template: skillspec validate <skill-folder>/skill.spec.yml
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  imports_check:
    description: Verify package-local imports and resource load relationships.
    template: skillspec imports check <skill-folder>/skill.spec.yml
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  deps_check_all:
    description: Check every declared dependency and surface permission/provision status.
    template: skillspec deps check <skill-folder>/skill.spec.yml
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  deps_check_command:
    description: Check only the dependencies for one command template.
    template: skillspec deps check <skill-folder>/skill.spec.yml --command <command-id>
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  test_spec:
    description: Run scenario tests for route, rule, forbid, elicitation, and closure expectations.
    template: skillspec test <skill-folder>/skill.spec.yml
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  compile_codex_skill:
    description: Compile the reviewed spec into a minimal Codex-style SKILL.md loader.
    template: skillspec compile <skill-folder>/skill.spec.yml --target codex-skill
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  compile_claude_skill:
    description: Compile the reviewed spec into a Claude-compatible skill loader when requested.
    template: skillspec compile <skill-folder>/skill.spec.yml --target claude-skill
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  list_install_targets:
    description: Show detected harness roots before writing generated files.
    template: skillspec install targets
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  router_help:
    description: Verify that the installed CLI exposes the router command surface.
    template: skillspec router --help
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  router_install:
    description: Install or refresh the explicit-only skill-router surface in the selected skill roots.
    template: skillspec router install --roots <skill-roots> --index <router-index>
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  router_update:
    description: Back up and update every recorded skill-router install, visibility state, and index, then report the harness restart warning.
    template: skillspec router update --json
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  verify_router_install:
    description: Verify the generated skill-router files and visibility metadata under the selected roots.
    template: skillspec router index status --roots <skill-roots> --index <router-index>
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  find_durable_executor:
    description: Check whether durable-executor is already present in the selected skill roots or source path.
    template: rg --files <skill-roots-or-source> | rg '(^|/)durable-executor/(SKILL.md|skill.spec.yml)$'
    safety: local_read
    requires:
      dependencies:
        - rg_cli
  verify_durable_executor:
    description: Verify durable-executor exists after install and remains available as the router-managed implicit first hop.
    template: rg --files <skill-roots> | rg '(^|/)durable-executor/(SKILL.md|skill.spec.yml|agents/openai.yaml)$'
    safety: local_read
    requires:
      dependencies:
        - rg_cli
  observe_workspace_stats:
    description: Collect rote workspace stats for token and evidence accounting before synthesizing a SkillSpec.
    template: rote workspace stats <workspace>
    safety: local_read
    requires:
      dependencies:
        - rote_cli
  observe_workspace_log:
    description: Inspect the rote workspace command log to recover observed commands, dependencies, files, and errors.
    template: rote workspace inspect log --last <count>
    safety: local_read
    requires:
      dependencies:
        - rote_cli
  observe_workspace_meta:
    description: Inspect rote workspace metadata and variables that explain the observed workflow context.
    template: rote workspace inspect meta
    safety: local_read
    requires:
      dependencies:
        - rote_cli
  synthesize_from_workspace:
    description: Rote-specific synthesis command that creates a draft SkillSpec skill from a named durable rote workspace after stats, command log, and metadata evidence are available.
    template: skillspec synthesize-from-workspace <workspace> --task '<observed-task>' --out <skill-folder>
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
        - rote_cli
  install_dry_run:
    description: Preview install writes for the selected target without modifying harness roots.
    template: skillspec install skill <skill-folder> --target <target> --dry-run
    safety: local_read
    requires:
      dependencies:
        - skillspec_cli
  install_skill:
    description: Install the compiled SKILL.md and reviewed skill.spec.yml into an explicitly approved harness target.
    template: skillspec install skill <skill-folder> --target <target>
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  decide_demo:
    description: Run a realistic demo decision against the reviewed spec and capture a trace.
    template: skillspec decide <skill-folder>/skill.spec.yml --input '<task>' --trace-dir <skill-folder>/.skillspec/traces
    safety: local_write
    requires:
      dependencies:
        - skillspec_cli
  trace_align:
    description: Replay and align a captured decision trace plus execution ledger, reporting pass, unproven, or fail with specific evidence gaps.
    template: skillspec trace align <skill-folder>/skill.spec.yml --decision-trace <trace-dir> --execution-trace <trace-dir>/execution.jsonl
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
  value_report:
    description: Print the structured SkillSpec map used as one input to the harness-synthesized value report; the final value report is assembled from existing command outputs and explicit proof gaps.
    template: skillspec sensemake <skill-folder>/skill.spec.yml --view index
    safety: read_only
    requires:
      dependencies:
        - skillspec_cli
recipes:
  run_grammar_preflight:
    description: Required grammar-first setup before import or revision.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
    steps:
      - run_command: grammar_sensemake_index
      - run_command: grammar_sensemake_porting
      - run_command: grammar_checklist_import
      - note: Use the returned grammar map as the active contract. Do not infer grammar from memory or old examples.
  coverage_review_loop:
    description: Anti-bullshit review loop that maps prose obligations to concrete SkillSpec constructs.
    ordered: true
    requires:
      resources:
        - source_skill_md
      artifacts:
        - coverage_matrix
    steps:
      - load_resource: source_skill_md
      - note: Fill prose_span, obligation, skillspec_construct, confidence, status, and review_note for every source section.
      - note: Use only the current source folder, embedded grammar, draft sensemake, and user-approved references; do not consult existing ports, repo history, memory, or examples unless the user explicitly asks.
      - note: Extract source code blocks and scripts into package-local resource files, then reference them from resources/code, commands, recipes, tests, or review notes.
      - produce_artifact: coverage_matrix
  local_porting_loop:
    description: End-to-end local conversion from prose folder to reviewed SkillSpec and value report.
    ordered: true
    requires:
      resources:
        - source_skill_md
      dependencies:
        - skillspec_cli
        - rg_cli
      artifacts:
        - preserved_source
        - mechanical_draft
        - reviewed_spec
        - value_report
    steps:
      - run_command: inventory_source_folder
      - run_command: read_source_skill
      - run_command: preserve_source_skill
      - run_command: grammar_sensemake_index
      - run_command: grammar_sensemake_porting
      - run_command: import_skill_draft
      - run_command: sensemake_draft
      - run_command: grammar_checklist_import
      - run_code: review_and_promote_draft
      - note: If source code was found in source prose or sibling files, split durable snippets into resource files and declare matching resources/code entries before QA.
      - produce_artifact: reviewed_spec
      - run_command: validate_spec
      - run_command: imports_check
      - run_command: deps_check_all
      - run_command: test_spec
      - run_command: compile_codex_skill
      - run_command: plan_phase_order
      - run_command: act_named_phase
      - run_command: progress_record_requirement
      - run_command: progress_record_phase
      - run_command: progress_show
      - run_command: decide_demo
      - run_command: trace_align
      - run_command: value_report
  remote_porting_loop:
    description: Stage a public remote source and continue through the local porting loop.
    ordered: true
    requires:
      dependencies:
        - git_cli
        - rg_cli
        - skillspec_cli
    steps:
      - ask: approve_remote_source_access
      - run_command: stage_remote_folder
      - run_command: find_skill_candidates
      - ask: choose_candidate_skill
      - note: If there is exactly one candidate, use it as the default local source; otherwise honor the selected candidate.
      - branch:
          if: candidate selected or exactly one candidate exists
          then: local_porting_loop
          otherwise: find_skill_candidates
  install_reviewed_skill_loop:
    description: Compile and install only after QA and explicit approvals.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
      artifacts:
        - reviewed_spec
        - compiled_codex_skill
    steps:
      - run_command: validate_spec
      - run_command: imports_check
      - run_command: deps_check_all
      - run_command: plan_phase_order
      - run_command: act_named_phase
      - run_command: progress_show
      - ask: approve_dependency_surface
      - run_command: compile_codex_skill
      - run_command: list_install_targets
      - run_command: install_dry_run
      - ask: approve_install_targets
      - run_command: install_skill
  router_install_loop:
    description: Post-install router setup through the prompt skill.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
    steps:
      - run_command: router_help
      - run_command: list_install_targets
      - note: Choose roots explicitly; do not use or ask for a separate router root.
      - run_command: router_install
      - run_command: verify_router_install
      - note: Report whether durable-executor is present and remains implicit, or whether durable first-hop is unavailable.
  router_update_loop:
    description: Backup-first router maintenance through the prompt skill.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
    steps:
      - run_command: router_help
      - run_command: router_update
      - note: Report the backup path, every updated router root, preparedness status, durable-executor status, and the harness restart warning.
  durable_executor_install_loop:
    description: Optional durable-executor setup through an existing installed skill or approved source path/URI.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
        - rg_cli
    steps:
      - run_command: find_durable_executor
      - ask: choose_durable_source
      - branch:
          if: durable-executor already exists
          then: verify_durable_executor
          otherwise: local_porting_loop
      - ask: approve_install_targets
      - run_command: install_skill
      - run_command: verify_durable_executor
      - note: Keep durable-executor as the router-managed implicit exception.
  observed_workspace_to_spec_loop:
    description: Create a reviewed SkillSpec-backed skill from observed durable execution evidence.
    ordered: true
    requires:
      dependencies:
        - skillspec_cli
        - rote_cli
      artifacts:
        - durable_workspace_report
        - observed_skill_spec
    steps:
      - ask: choose_observation_workspace
      - note: If the prompt contains a concrete task and no existing workspace, hand it to durable-executor first and resume with the returned workspace.
      - run_command: observe_workspace_stats
      - run_command: observe_workspace_log
      - run_command: observe_workspace_meta
      - run_command: synthesize_from_workspace
      - produce_artifact: observed_skill_spec
      - run_command: validate_spec
      - run_command: deps_check_all
      - run_command: test_spec
      - run_command: decide_demo
      - run_command: trace_align
      - run_command: value_report
code:
  review_and_promote_draft:
    language: text
    kind: validator
    source:
      inline: "For each source section, decide whether it becomes activation, route, rule, elicitation, dependency, import, resource, code, artifact, recipe, state, command, closure, test, review_required, or metadata. The mechanical draft is evidence, not authority. Do not consult existing ports, repo history, memory, or examples unless the user explicitly asks. When source code appears in source prose or sibling files, preserve it as package-local resource files and connect it through resources/code with provenance."
    provenance:
      resource: source_skill_md
      heading: Creation Procedure
    purpose: Semantic review checklist that turns prose obligations into typed SkillSpec constructs.
    requires:
      resources:
        - source_skill_md
      artifacts:
        - mechanical_draft
        - coverage_matrix
    inputs:
      - mechanical_draft
      - preserved_source
    outputs:
      - reviewed_spec
    safety:
      mutates_input: false
      writes_files: true
      network: false
      notes:
        - Produces a reviewed spec but does not install or run imported snippets.
  synthesize_observed_skill_spec:
    language: text
    kind: transform
    source:
      inline: "Read the durable workspace report, map observed user intent, capability-selection evidence, commands, dependencies, files, prompts, errors, outputs, and proof gaps into a reviewed skill.spec.yml. Preserve why a substrate such as a Parallel CLI, rote adapter, browser handoff, or CLI fallback was selected, and record alternatives rejected by policy or readiness. Use observed facts as evidence, mark inferred behavior in the coverage matrix, do not turn a transcript into a brittle command list, and do not replay mutating workspace actions without approval."
    provenance:
      resource: source_skill_md
      heading: Post-install multiplexer
    purpose: Convert a named durable rote workspace into a SkillSpec-backed skill contract; this path is rote-specific and depends on rote workspace evidence.
    requires:
      dependencies:
        - skillspec_cli
        - rote_cli
      artifacts:
        - durable_workspace_report
        - coverage_matrix
    inputs:
      - durable_workspace_report
    outputs:
      - observed_skill_spec
    safety:
      mutates_input: false
      writes_files: true
      network: false
      notes:
        - Observes local rote workspace evidence and synthesizes a draft; it does not replay commands or install the result.
states:
  start:
    do:
      - run_grammar_preflight
    next: resolve_source
  resolve_source:
    do:
      - inventory_source_folder
      - read_source_skill
    next: import_draft
  import_draft:
    do:
      - import_skill_draft
      - sensemake_draft
    next: review
  review:
    do:
      - coverage_review_loop
      - review_and_promote_draft
    next: qa
  qa:
    do:
      - run_structural_qa
    next: prove
  prove:
    do:
      - prove_value
    next: done
  done:
    do:
      - generate_value_report
snippets:
  dependency_surface_shape:
    text: |
      Inferred dependency surface:
      - skillspec_cli: required, checkable CLI
      - git_cli: required only for remote public sources, network-read sensitive
      - rg_cli: recommended for local inventory
      - cargo_cli: optional development fallback
      I will not install, connect, or write into harness roots unless you approve the provision or install option.
closures:
  fill_coverage_matrix:
    description: Record prose_span, obligation, skillspec_construct, confidence, status, and review_note before semantic edits or install.
  split_source_code_into_resources:
    description: When source material contains scripts or code blocks, preserve each durable code surface as a package-local resource file, declare matching resources/code entries with provenance, and reference them from commands, recipes, tests, artifacts, or review notes.
  produce_mechanical_draft:
    description: Save the import-skill output and report its inferred deps, commands, imports, and review notes.
  produce_reviewed_spec:
    description: Write a reviewed skill.spec.yml that connects source obligations to typed constructs.
  run_structural_qa:
    description: Run validate, imports check, deps check, command-level deps check, scenario tests, phase plan, and current-phase action checklist.
    commands:
      - validate_spec
      - imports_check
      - deps_check_all
      - deps_check_command
      - test_spec
      - plan_phase_order
      - act_named_phase
  prove_value:
    description: Run a realistic phase plan, action checklist, progress ledger update, decision, align the trace, and grade unproven execution evidence honestly.
    commands:
      - plan_phase_order
      - act_named_phase
      - progress_record_requirement
      - progress_record_phase
      - progress_show
      - decide_demo
      - trace_align
  generate_value_report:
    description: Print extracted triggers, routes, rules, dependencies, commands, tests, resources moved out of prompt path, phase progress, token consumption and savings, decision trace, alignment summary, and contract-quality grades.
  show_dependency_surface:
    description: Show dependency ids, status, permission sensitivity, and provision choices before compile/install approval.
  verify_router_installed:
    description: Report the router install/index status, selected roots, router skill location, and whether a separate router root was avoided.
    commands:
      - router_install
      - verify_router_install
  verify_router_updated:
    description: Report the router update backup path, updated recorded roots, preparedness state, durable-executor status, and harness restart warning.
    commands:
      - router_update
  verify_durable_optional_status:
    description: Report whether durable-executor is installed, skipped, or unavailable, and whether it remains implicit under router mode.
    commands:
      - find_durable_executor
      - verify_durable_executor
  produce_observed_workspace_spec:
    description: Produce a reviewed SkillSpec from durable workspace evidence, including observed commands, dependencies, artifacts, tests, token stats, and explicit proof gaps.
    commands:
      - observe_workspace_stats
      - observe_workspace_log
      - observe_workspace_meta
      - synthesize_from_workspace
      - validate_spec
      - test_spec
  capture_observation_task:
    description: Preserve the quoted or otherwise supplied real task that durable-executor should run before synthesis, without replacing it with a vague workspace placeholder.
  handoff_observation_task_to_durable_executor:
    description: Hand the observation task to durable-executor with return_to=skillspec so the task is executed once through rote-backed evidence before SkillSpec synthesis resumes.
  capture_observation_workspace:
    description: Record the durable workspace name, trace directory, artifacts, and return packet produced by durable-executor before inspecting logs or stats.
  record_capability_selection_ledger:
    description: Preserve why the execution substrate was chosen, including detected tools such as Parallel CLI, accepted or rejected adapter/browser options, readiness checks, and policy gates.
  report_alignment_status:
    description: Report trace alignment with Decision replay, Phase order, Requirements, Missing proof, Forbidden actions, and Alignment pass/partial/fail instead of a bare unproven label.
  report_degraded_status:
    description: Mark the generated skill draft-only when grammar, imports, deps, validate, test, or compile capability is missing.
  produce_decision_trace:
    description: Preserve the trace directory from the demo decision, including trace.jsonl, execution.jsonl, and progress.json when present.
  produce_return_packet:
    description: Return status, selected route, artifacts, evidence handles, blockers, and trace paths to durable-executor when invoked through a durable handoff.
trace:
  mode: event_log
  required: true
  record:
    - input_received
    - spec_loaded
    - rule_evaluated
    - rule_matched
    - route_selected
    - route_order_set
    - forbid_added
    - elicitation_requested
    - after_success_scheduled
    - outcome_recorded
proof:
  metrics:
    - grammar commands run before import or revision
    - source SKILL.md fully read and preserved
    - post-install router setup avoids a separate router root and verifies the router index
    - durable-executor install is optional and source-aware
    - observed durable workspace synthesis uses named rote workspace stats and logs
    - field imports do not consult existing ports, repo history, memory, or examples unless the user explicitly asks
    - mechanical draft sensemade before semantic edits
    - coverage matrix completed before install
    - source code in source material is preserved as package-local resources/code with provenance
    - validate/imports/deps/test pass
    - phase plan and current-phase action checklist produced
    - progress ledger and progress report generated when proving value
    - demo decision trace captured
    - trace alignment summary reported as pass, partial, or fail with missing proof rows
tests:
  - name: local prose skill ports through grammar-first loop
    input: Port /tmp/my-skill/SKILL.md into SkillSpec
    expect:
      route: local_skill_port
      matched_rules:
        - route_local_sources_to_local_port
        - grammar_preflight_is_mandatory
      after_success:
        - local_porting_loop
        - generate_value_report
      forbid:
        - skip_grammar_sensemake
        - infer_grammar_from_memory
  - name: local folder preserves sibling resources
    input: Convert ~/.agents/skills/rote-browse to skill.spec.yml
    expect:
      route: local_skill_port
      matched_rules:
        - route_local_sources_to_local_port
      after_success:
        - local_porting_loop
  - name: public github source stages before import
    input: Import https://github.com/org/repo/tree/main/skills/pdf as a SkillSpec skill
    expect:
      route: remote_skill_port
      matched_rules:
        - route_remote_sources_to_remote_port
        - grammar_preflight_is_mandatory
      elicit:
        - approve_remote_source_access
        - choose_candidate_skill
      forbid:
        - install_from_remote_checkout
        - execute_imported_snippets_during_staging
  - name: prompt skill is named skillspec
    input: /skillspec import /Users/me/.agents/skills/durable-executor
    expect:
      route: local_skill_port
      matched_rules:
        - post_install_setup_routes_to_multiplexer
        - route_prompt_import_to_skill_port
        - grammar_preflight_is_mandatory
      after_success:
        - local_porting_loop
        - generate_value_report
  - name: router install routes to post install router setup
    input: /skillspec install router mode into my skill roots
    expect:
      route: install_skill_router
      matched_rules:
        - post_install_setup_routes_to_multiplexer
        - route_router_install_to_router_setup
      after_success:
        - verify_router_installed
      forbid:
        - use_removed_router_root
        - make_router_implicit_when_durable_executor_missing
  - name: router update routes to backup-first router maintenance
    input: /skillspec update router and repair stale skill-router files
    expect:
      route: update_skill_router
      matched_rules:
        - post_install_setup_routes_to_multiplexer
        - route_router_update_to_router_maintenance
      after_success:
        - verify_router_updated
      forbid:
        - update_router_without_backup
        - mutate_unrecorded_router_roots
  - name: durable executor install is optional and source aware
    input: /skillspec install durable-executor from /Users/me/.agents/skills/durable-executor
    expect:
      route: install_durable_executor
      matched_rules:
        - post_install_setup_routes_to_multiplexer
        - route_durable_install_to_optional_durable
      elicit:
        - choose_durable_source
        - approve_install_targets
      forbid:
        - assume_bundled_durable_executor
        - install_durable_without_source_or_existing_skill
        - make_durable_executor_explicit_in_router_mode
  - name: observed durable workspace creates spec skill
    input: /skillspec observe durable workspace skillspec-demo and create a spec skill
    expect:
      route: observed_durable_workspace_to_skill
      matched_rules:
        - post_install_setup_routes_to_multiplexer
        - route_observed_workspace_to_spec
      elicit:
        - choose_observation_workspace
      after_success:
        - produce_observed_workspace_spec
        - generate_value_report
      forbid:
        - observe_anonymous_workspace
        - replay_workspace_actions_without_approval
        - claim_workspace_tokens_without_stats
  - name: observed durable execution task runs before skill synthesis
    input: '/skillspec create from observed durable execution: "use parallel web to enrich this profile"'
    expect:
      route: observed_durable_workspace_to_skill
      matched_rules:
        - post_install_setup_routes_to_multiplexer
        - route_observed_workspace_to_spec
      elicit:
        - choose_observation_workspace
      after_success:
        - produce_observed_workspace_spec
        - generate_value_report
      forbid:
        - observe_anonymous_workspace
        - replay_workspace_actions_without_approval
        - claim_workspace_tokens_without_stats
  - name: mechanical draft cannot be installed directly
    input: Run skillspec import-skill and install the result
    expect:
      route: local_skill_port
      matched_rules:
        - mechanical_import_is_draft_only
        - install_requires_validated_reviewed_spec
      forbid:
        - treat_mechanical_draft_as_final
        - install_unreviewed_draft
        - consult_existing_ports_without_user_request
  - name: compound remote import install proof starts with remote port
    input: /skillspec import https://github.com/anthropics/skills/tree/main/skills/pdf, compile it for Codex, install it, and prove it
    expect:
      route: remote_skill_port
      matched_rules:
        - route_remote_sources_to_remote_port
        - route_prompt_import_to_skill_port
        - grammar_preflight_is_mandatory
        - dependency_surface_requires_review
        - install_requires_validated_reviewed_spec
        - prove_requests_route_to_value
      elicit:
        - approve_remote_source_access
        - choose_candidate_skill
        - approve_dependency_surface
        - approve_install_targets
      forbid:
        - install_from_remote_checkout
        - execute_imported_snippets_during_staging
        - consult_existing_ports_without_user_request
  - name: dependency approval required for install
    input: Port a skill and install it into codex and agents
    expect:
      route: compile_and_install_reviewed_skill
      matched_rules:
        - dependency_surface_requires_review
        - install_requires_validated_reviewed_spec
      elicit:
        - approve_dependency_surface
        - approve_install_targets
      forbid:
        - install_before_dependency_surface_approval
        - install_before_validate_test_imports_deps
  - name: prove value routes to trace and report
    input: Prove value for the ported rote-browse skill with a demo decision
    expect:
      route: prove_skill_value
      matched_rules:
        - prove_requests_route_to_value
      after_success:
        - decide_demo
        - trace_align
        - value_report
      forbid:
        - claim_unproven_execution_evidence
  - name: revise existing spec starts with grammar and handles
    input: Improve this skill.spec.yml route coverage
    expect:
      route: revise_existing_skillspec
      matched_rules:
        - revision_starts_with_grammar_and_current_spec
        - grammar_preflight_is_mandatory
      forbid:
        - patch_yaml_from_memory
        - skip_current_spec_sensemake
  - name: update existing skillspec routes to revision
    input: Update skillspec existing skillspec yaml with plan act progress command goodness
    expect:
      route: revise_existing_skillspec
      matched_rules:
        - revision_starts_with_grammar_and_current_spec
      forbid:
        - patch_yaml_from_memory
        - skip_current_spec_sensemake
  - name: phase progress commands route to value proof
    input: Prove the ported skill with skillspec plan, skillspec act, skillspec progress, and value report
    expect:
      route: prove_skill_value
      matched_rules:
        - prove_requests_route_to_value
      after_success:
        - decide_demo
        - trace_align
        - value_report
      forbid:
        - claim_unproven_execution_evidence
  - name: imports and resources stay connected
    input: This skill has references, resources, scripts, and assets to extract
    expect:
      route: local_skill_port
      matched_rules:
        - imports_resources_must_be_connected
        - source_code_becomes_resources_and_code
      forbid:
        - leave_orphaned_imports
        - leave_orphaned_resources
        - flatten_referenced_files_into_prompt_blob
        - leave_source_code_unreferenced
  - name: field import does not consult history or examples
    input: Import a prose SKILL.md into SkillSpec from this staged source
    expect:
      route: local_skill_port
      matched_rules:
        - field_import_uses_only_current_source
        - grammar_preflight_is_mandatory
      forbid:
        - consult_existing_ports_without_user_request
        - consult_repo_history_without_user_request
        - consult_memory_or_prior_examples_without_user_request
  - name: degraded draft blocks release
    input: The CLI has no deps check, but go ahead and release it
    expect:
      route: compile_and_install_reviewed_skill
      matched_rules:
        - dependency_surface_requires_review
        - degraded_draft_blocks_install
      forbid:
        - install_degraded_draft
        - release_degraded_draft
        - claim_dependency_presence_without_check
  - name: durable execution routes preserve evidence
    input: Run the porting command with trace evidence and future recall
    expect:
      route: local_skill_port
      matched_rules:
        - durable_tool_work_uses_durable_substrate
      after_success:
        - produce_return_packet
      forbid:
        - direct_cli_without_durable_wrapper
        - untracked_stdout_as_evidence
review_required:
  - Execution evidence remains unproven until the generated skill runs a real user task end-to-end through the target harness.
  - Remote staging assumes a public GitHub source; private repositories and non-GitHub archives need explicit auth/source handling.
  - durable-executor is optional and not assumed to be bundled with router mode; install requires an existing skill or approved source path/URI.
  - Observed-workspace spec creation is a rote-specific optional integration; it depends on the quality of the durable rote workspace log and should mark inferred behavior in the coverage matrix.
  - The value-report command is the intended UX surface; until implemented as a native CLI command, the harness must synthesize the report from sensemake, test, deps, imports, decide, and align outputs.
  - The optional Claude compile/install path should be verified in a Claude-compatible harness before release claims.
metadata:
  source:
    preserved_prose: source/SKILL.md
    source_lines: 756
    imported_from: skills/skillspec/SKILL.md
  mechanical_import_observation:
    routes: 0
    rules: 0
    states: 0
    dependencies: 6
    commands: 30
    recipes: 0
    tests: 0
    review_notes: 5
    note: Mechanical import found command surfaces but no strategic routes, rules, recipes, or tests, so semantic promotion is mandatory.
  extracted_value_targets:
    activation_triggers: 12
    routes: 9
    rules: 19
    dependency_checks: 5
    command_templates: 42
    recipes: 9
    tests: 20
    references_moved_out_of_prompt_path: 1
    estimated_context_reduction: 85%
  contract_quality:
    activation: strong
    dependencies: good
    route_coverage: strong
    execution_evidence: unproven_until_real_harness_run
    tests: reviewed_behavior_tests
    hallucination_risk: low_medium
  coverage_matrix:
    - prose_span: Source Contract
      obligation: Accept local file/folder and public GitHub source forms, stage remotes locally, and never install directly from remote checkout.
      skillspec_construct: routes.remote_skill_port, route.local_skill_port, rules.route_remote_sources_to_remote_port, commands.stage_remote_folder, elicitation.approve_remote_source_access
      confidence: high
      status: proven_by_tests
      review_note: Private repo auth is intentionally review_required.
    - prose_span: Creation Procedure 1-8
      obligation: Run grammar sensemake/checklist before import/edit, then run mechanical import and sensemake the draft.
      skillspec_construct: recipe.run_grammar_preflight, commands.grammar_sensemake_index, commands.grammar_sensemake_porting, commands.import_skill_draft, commands.sensemake_draft
      confidence: high
      status: proven_by_tests
      review_note: Runtime grammar artifact is the authoritative teacher.
    - prose_span: Creation Procedure 9-20
      obligation: Extract routes, rules, elicitations, imports, resources, code, artifacts, commands, and dependencies with checks and approvals.
      skillspec_construct: rules.imports_resources_must_be_connected, rules.dependency_surface_requires_review, dependencies, commands, artifacts, code.review_and_promote_draft
      confidence: high
      status: reviewed
      review_note: This spec uses one source resource because the original skill has no sibling reference files beyond preserved source.
    - prose_span: Harness Install Targets and Dependency Approval
      obligation: Do not install by default; show dependency surface, dry-run, and ask for install targets.
      skillspec_construct: route.compile_and_install_reviewed_skill, elicitations.approve_dependency_surface, elicitations.approve_install_targets, commands.install_dry_run, commands.install_skill
      confidence: high
      status: proven_by_tests
      review_note: Actual install was not performed during this self-port.
    - prose_span: Code-Heavy Skill Porting, Semantic Promotion, Rule Extraction
      obligation: Preserve provenance, classify snippets, create recipes/artifacts, write testable rules, and add review notes for uncertainty.
      skillspec_construct: recipe.coverage_review_loop, code.review_and_promote_draft, rules.mechanical_import_is_draft_only, review_required
      confidence: medium_high
      status: reviewed
      review_note: Source examples are represented as command templates rather than executable snippets.
    - prose_span: Revising Existing SkillSpecs and Done Definition
      obligation: For revisions use grammar/current spec handles, plan ordered phases, act on the current phase, record progress, then validate, imports check, deps check, test, decide, align, compile, and report value.
      skillspec_construct: route.revise_existing_skillspec, route.prove_skill_value, commands.plan_phase_order, commands.act_named_phase, commands.progress_record_phase, commands.progress_show, commands.validate_spec, commands.imports_check, commands.deps_check_all, commands.test_spec, commands.decide_demo, commands.trace_align
      confidence: high
      status: proven_by_tests
      review_note: Execution alignment can remain unproven if no real execution ledger is available.
    - prose_span: Post-install setup multiplexer
      obligation: Provide one prompt entry point named skillspec that imports existing skills, installs router mode, optionally installs durable-executor, and creates SkillSpec-backed skills from observed durable rote workspaces.
      skillspec_construct: routes.install_skill_router, routes.install_durable_executor, routes.observed_durable_workspace_to_skill, rules.post_install_setup_routes_to_multiplexer, rules.route_router_install_to_router_setup, rules.route_durable_install_to_optional_durable, rules.route_observed_workspace_to_spec, recipes.router_install_loop, recipes.durable_executor_install_loop, recipes.observed_workspace_to_spec_loop
      confidence: high
      status: reviewed
      review_note: Router setup uses roots plus index and forbids a separate router root; durable-executor remains optional and source-aware.
