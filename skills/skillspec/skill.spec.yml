schema: skillspec/v0
id: skillspec
title: SkillSpec
description: SkillSpec post-install setup and skill-authoring multiplexer for inspecting skill/repo shape with doctor, mapping multi-skill and plugin-shaped workspaces, importing existing prose skills, inspecting SkillSpec status, installing compiled workspaces with visibility planning, installing/updating/enabling/disabling router mode, installing/updating/enabling/disabling/deleting durable-executor, creating specs from observed durable execution workspaces, revising SkillSpecs, compiling reviewed skills, optional install, and value reporting.
activation:
  summary: >
    Multiplex SkillSpec post-install setup: inspect skill/repo shape with doctor, map multi-skill and plugin-shaped repositories before fanout import, import existing SKILL.md skills from
    local folders or public URIs, inspect installed status, install compiled workspaces with entry/support visibility planning, install/update/enable/disable router mode, optionally
    install/update/enable/disable/delete durable-executor, create specs from observed durable execution workspaces,
    revise SkillSpec YAML, and prove value before install or release.
  keywords:
    - skillspec
    - /skillspec
    - skillspec setup
    - post install setup
    - import SKILL.md
    - import existing skill
    - port skill
    - what is the shape of this skill
    - what is the shape of skill
    - shape of skill
    - skill shape
    - source shape
    - classify skill repo
    - run doctor on this repo
    - run doctor on this url
    - port-one-shot
    - one-shot port
    - workspace map
    - workspace validate
    - workspace import
    - workspace converge
    - workspace compile
    - workspace install
    - skillspec workspace
    - skillspec workspace install
    - skillspec.workspace.yml
    - multi-skill repo
    - multi-skill workspace
    - plugin-shaped repo
    - plugin-shaped workspace
    - plugin namespace
    - plugin namespaces
    - namespaced skills
    - namespaced skill packages
    - .claude-plugin/plugin.json
    - .mcp.json
    - plugin slash command
    - claude plugin skills
    - many SKILL.md files
    - parent folder with multiple skills
    - fanout converge
    - fanout import
    - workspace cache
    - workspace-cache.json
    - cache hits
    - run-loop
    - command batching
    - chunked source map
    - parallel strategy
    - sequential strategy
    - converge workspace
    - compile workspace
    - install workspace
    - token economy
    - token savings
    - compact metrics
    - agent-visible tokens
    - workspace proof
    - workspace install proof
    - workspace-install.report.md
    - workspace-install.manifest.json
    - workspace visibility
    - workspace visibility policy
    - visibility-policy
    - apply visibility
    - apply-visibility
    - entry-implicit
    - manual-only support skill
    - workspace-visibility.manifest.json
    - import workspace packages
    - cross-skill references
    - skill dependency graph
    - shared standards package
    - local folder or uri
    - dependency ledger
    - deps.toml
    - dependency preservation
    - skillspec status
    - status report
    - lifecycle status
    - installed skills inventory
    - skillspec-backed skills
    - legacy prose skills
    - install router
    - install skill-router
    - update router
    - enable router
    - disable router
    - repair skill-router
    - router mode
    - install durable-executor
    - durable executor install
    - update durable-executor
    - durable executor update
    - enable durable-executor
    - durable executor enable
    - disable durable-executor
    - durable executor disable
    - delete durable-executor
    - durable executor delete
    - observe durable executor
    - observed durable workspace
    - create spec skill from workspace
    - rote exec workspace
    - revise existing SkillSpec
    - update skill.spec.yml
    - prose skill to skillspec
    - skill.spec.yml
    - skillspec import-skill
    - skillspec port-one-shot
    - skillspec doctor
    - skillspec source map
    - skillspec source query
    - source-map.json
    - skillspec plan
    - skillspec act
    - skillspec progress
    - phase progress
    - grammar sensemake
    - grammar checklist
    - compile skill
    - install codex agents
    - retire existing skill
    - replace old skill
    - --retire-existing
    - backup old skill
    - prove value
    - value report
    - schema-safe port
    - typed shape crib
  priority: domain
applies_when:
  - user_intent:
      - run SkillSpec post-install setup inside the harness prompt
      - inspect the shape of a skill, skill folder, repository, or URL without importing it
      - convert a prose SKILL.md to skill.spec.yml
      - port a local skill folder into SkillSpec
      - run one-shot porting for one atomic skill package
      - map a skills repository that contains multiple SKILL.md packages before import
      - map a plugin-shaped skills repository without flattening repeated skill names
      - validate a multi-skill workspace graph before fanout import
      - fanout-import a validated workspace graph into one generated package draft per atomic skill
      - converge generated workspace package drafts against the workspace graph before compile or install
      - compile converged workspace package drafts into harness-ready SKILL.md loaders without installing them
      - dry-run or install compiled workspace packages into harness roots using install_slug folders and collision proof
      - detect cross-skill references, shared standards packages, and skill dependency edges
      - import a public GitHub skill into SkillSpec
      - import an existing prose skill from a local folder or public URI
      - diagnose reliability debt and context burden in a prose skill before porting
      - preserve imported dependency mentions, package authority, install risk, and missing dependency proof gaps
      - inspect installed SkillSpec status, lifecycle state, roots, router index state, and skill inventory
      - install skill-router after SkillSpec is installed
      - install router mode after SkillSpec is installed
      - update, enable, disable, or repair an installed skill-router mode
      - install durable-executor as an optional first-hop skill
      - update, enable, disable, or delete a managed durable-executor install
      - create a SkillSpec skill by observing a durable-executor rote-exec workspace
      - revise an existing SkillSpec-backed skill
      - add phase planning and progress tracking to a SkillSpec-backed skill
      - compile and optionally install a reviewed SkillSpec-backed skill
      - replace an existing active prose skill with a reviewed SkillSpec-backed skill without leaving both discoverable
      - run proof or value reporting for a ported skill
entry:
  prompt: Multiplex SkillSpec setup inside the harness prompt. Teach the harness the current grammar, choose the right route, answer read-only source-shape questions with doctor, map multi-skill and plugin-shaped workspaces before import, choose sequential phase gates versus isolated package fanout deliberately, stage or map single-skill sources, install compiled workspaces only after dry-run proof, install router or optional durable-executor only through reviewed commands, prefer compact summaries and handles over full reports in chat, observe durable workspaces when requested, then validate, phase-plan, record progress evidence, and prove value before install.
  decision_required: true
  forbid_before_decision:
    - edit_yaml_from_memory
    - skip_grammar_sensemake
    - import_without_reading_source_skill
    - install_before_dependency_surface_approval
    - claim_unproven_execution_evidence
    - consult_existing_ports_without_user_request
    - consult_repo_history_without_user_request
    - consult_memory_or_prior_examples_without_user_request
    - drop_imported_dependency_mentions
    - work_around_missing_dependency_without_waiver
    - claim_partial_dependency_proof_as_full
    - leave_old_and_new_skill_discoverable_without_user_choice
    - parallelize_dependency_bound_or_mutating_phases
    - load_full_reports_when_summary_suffices
    - claim_token_savings_without_metrics
  tool_boundary:
    default: deny
    allow:
      - skillspec_cli
      - skillspec_grammar_commands
      - local_skill_files
      - local_repo_files
      - git
      - cargo
      - rote_workspace
      - declared_commands_dependencies_imports_resources
    forbid:
      - edit_yaml_from_memory
      - skip_grammar_sensemake
      - install_before_dependency_surface_approval
      - claim_unproven_execution_evidence
      - consult_existing_ports_without_user_request
      - consult_repo_history_without_user_request
      - consult_memory_or_prior_examples_without_user_request
      - parallelize_dependency_bound_or_mutating_phases
      - load_full_reports_when_summary_suffices
      - claim_token_savings_without_metrics
    permission_required_for:
      - any_unlisted_tool
      - any_forbidden_action
      - any_new_data_source
      - any_new_execution_substrate
      - any_new_provider_or_adapter
      - any_external_side_effect
routes:
  - id: inspect_source_shape
    label: Inspect source shape
    rank: 12
    description: Use when the user asks what shape a skill, skill folder, repository, or URL has, or asks to run doctor without requesting import, port, compile, install, or proof.
    execution_plan:
      mode: ordered
      reason: Shape inspection is a read-only diagnostic gate. It should run doctor, report simple_skill, entry_skill_with_subskills, multi_skill_workspace, plugin_workspace, or non_skill_repository, and stop before import or mutation.
      phases:
        - id: run_shape_doctor
          owner_skill: skillspec
          description: Run skillspec doctor on the supplied local folder, skill folder, or public GitHub repo URI and capture the shape report.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_skill_files
              - local_repo_files
              - git
            permission_required_for:
              - network_access
              - any_unlisted_tool
          requires:
            - doctor_source_shape
          forbid:
            - port_one_shot_or_manual_import
            - import_skill_draft
            - workspace_import_packages
            - workspace_converge_build
            - workspace_compile_build
            - workspace_install_packages
            - workspace_install_apply_visibility
            - install_from_remote_checkout
            - execute_imported_snippets_during_staging
        - id: report_shape
          owner_skill: skillspec
          description: Explain the detected shape, the recommended next command, and whether full structural scoring ran or stopped as shape_only.
          requires:
            - report_source_shape
          forbid:
            - port_one_shot_or_manual_import
            - import_skill_draft
            - workspace_import_packages
            - workspace_compile_build
            - workspace_install_packages
  - id: local_skill_port
    label: Port local skill
    rank: 1
    description: Use when source-shape recon proves exactly one atomic local prose skill package. If the source has multiple SKILL.md files, plugin markers, cross-skill references, or an existing reviewed skill.spec.yml, route to workspace or revision instead.
    execution_plan:
      mode: ordered
      reason: Local ports need source-shape classification, source preservation, grammar preflight, a mechanical draft, semantic promotion, QA, and a value report. One-shot is allowed only after recon confirms a single atomic prose package.
      phases:
        - id: resolve_local_source
          owner_skill: skillspec
          description: Resolve the user-supplied local path, classify the source shape, and preserve package-local sibling resources. Use one-shot only for exactly one SKILL.md with no workspace/plugin markers; hand multi-skill, cross-referenced, or plugin-shaped roots to workspace map; hand existing reviewed skill.spec.yml changes to the revision route.
          requires:
            - decide_import_mode_from_source_shape
            - inventory_source_folder
            - doctor_source_skill
            - source_map_create
            - source_map_coverage
            - source_map_nodes
            - source_map_dependencies
            - source_map_code
            - source_map_stale
          forbid:
            - copy_only_skill_md_when_resources_exist
            - load_large_source_without_source_map
            - use_port_one_shot_without_shape_recon
            - use_port_one_shot_for_workspace_root
            - use_port_one_shot_for_plugin_root
            - revise_existing_spec_through_import
        - id: grammar_preflight
          owner_skill: skillspec
          description: Run the grammar sensemaking and checklist commands before import or YAML editing.
          tool_boundary:
            allow:
              - skillspec_cli
              - skillspec_grammar_commands
              - local_skill_files
            permission_required_for:
              - any_grammar_source_outside_embedded_runtime_artifacts
          requires:
            - grammar_sensemake_index
            - grammar_sensemake_porting
            - grammar_checklist_import
          forbid:
            - infer_grammar_from_memory
        - id: mechanical_import
          owner_skill: skillspec
          description: Generate and inspect the draft spec without treating it as final truth. Run port-one-shot only when source-shape recon has proven one atomic prose package; otherwise stop and switch to workspace or revision flow.
          requires:
            - port_one_shot_or_manual_import
            - import_skill_draft
            - sensemake_draft
            - produce_mechanical_draft
          forbid:
            - port_one_shot_for_multi_skill_workspace
            - port_one_shot_for_plugin_workspace
            - port_one_shot_for_existing_reviewed_spec
        - id: semantic_promotion
          owner_skill: skillspec
          description: Guide the agent through a small source-backed promotion pass instead of auto-filling the scaffold. Fill the coverage matrix from the current source only, split source code into package-local resources/code entries, and promote only evidenced activation, routes, rules, deps, imports, resources, artifacts, commands, recipes, states, closures, tests, and review notes. Quote YAML string scalars that contain colon-space, especially elicitation questions, descriptions, steps[].note, recipe/procedure notes, and review notes. Use artifact produced_by/consumed_by only for command, code, or recipe refs; do not attach artifacts directly to routes or rules.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_skill_files
              - local_repo_files
              - file_edit_tool
              - declared_commands_dependencies_imports_resources
            permission_required_for:
              - any_unlisted_tool
              - any_new_data_source
              - install_or_release_side_effect
          requires:
            - fill_coverage_matrix
            - promote_only_source_backed_behavior
            - split_source_code_into_resources
            - review_and_promote_draft
            - produce_reviewed_spec
          forbid:
            - auto_fill_scaffold_from_inference
            - guess_routes_rules_or_tests
            - leave_colon_strings_unquoted
            - use_route_or_rule_as_artifact_consumer
            - consult_existing_ports_without_user_request
            - consult_repo_history_without_user_request
            - consult_memory_or_prior_examples_without_user_request
        - id: qa_and_proof
          owner_skill: skillspec
          description: Validate, test, check imports and dependencies, run a demo phase plan/action checklist, record progress evidence, and align the trace.
          tool_boundary:
            allow:
              - skillspec_cli
              - cargo
              - local_repo_files
              - local_trace_files
            permission_required_for:
              - install_or_release_side_effect
              - network_access
              - any_unlisted_tool
          requires:
            - run_structural_qa
            - plan_phase_order
            - act_named_phase
            - progress_show
            - prove_value
        - id: report_value
          owner_skill: skillspec
          description: Print the value report and contract-quality grades.
          requires:
            - generate_value_report
  - id: remote_skill_port
    label: Port remote skill
    rank: 2
    description: Use when the source is an owner/repo shorthand, GitHub URL, owner/repo/path, or GitHub tree URL.
    execution_plan:
      mode: ordered
      phases:
        - id: approve_remote_source
          owner_skill: skillspec
          requires:
            - approve_remote_source_access
        - id: stage_remote_source
          owner_skill: skillspec
          requires:
            - stage_remote_folder
          forbid:
            - install_from_remote_checkout
            - execute_imported_snippets_during_staging
            - web_search_for_remote_source
            - fetch_raw_github_skill_md_for_import
        - id: continue_as_local_port
          owner_skill: skillspec
          route: local_skill_port
          requires:
            - local_porting_loop
  - id: workspace_skill_authoring
    label: Map multi-skill workspace
    rank: 3
    description: Use when the source root may contain multiple atomic skill packages, plugin-shaped skill folders, shared standards packages, wrapper skills, or cross-skill references that must be mapped before fanout import.
    execution_plan:
      mode: ordered
      reason: Multi-skill and plugin-shaped repositories need structure recon before import so each SKILL.md becomes an atomic package, plugin namespaces are preserved, file dependencies are explicit, and slash-command workflow links do not create false cycles.
      phases:
        - id: inventory_workspace_source
          owner_skill: skillspec
          description: Inventory the source root and confirm it is a workspace candidate, not one ordinary skill package.
          requires:
            - inventory_source_folder
          forbid:
            - use_router_index_for_authoring_recon
            - import_workspace_root_as_single_skill
        - id: map_workspace_graph
          owner_skill: skillspec
          description: Generate skillspec.workspace.yml and a markdown recon report from the source tree, preserving plugin namespaces when plugin-shaped roots are present.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_skill_files
              - local_repo_files
            permission_required_for:
              - any_unlisted_tool
          requires:
            - workspace_map_source
            - produce_workspace_manifest
          forbid:
            - use_router_index_for_authoring_recon
        - id: validate_workspace_graph
          owner_skill: skillspec
          description: Validate package boundaries, plugin namespace naming, deterministic install slugs, dependency edges, missing targets, and cycles before fanout import planning.
          requires:
            - workspace_validate_manifest
            - validate_workspace_graph
          forbid:
            - proceed_with_circular_skill_dependencies
            - ignore_install_slug_collision
        - id: report_workspace_recon
          owner_skill: skillspec
          description: Explain plugin namespaces, package map, dependency graph, workflow references, warnings, and the next fanout/converge implementation phase without importing yet.
          requires:
            - choose_execution_strategy
            - preserve_compact_evidence
            - report_workspace_recon
  - id: workspace_fanout_import
    label: Fanout import workspace
    rank: 4
    description: Use when a validated skillspec.workspace.yml should be imported into one generated package draft per atomic skill under a mirrored build root.
    execution_plan:
      mode: ordered
      reason: Fanout import must preserve the validated workspace graph, process dependencies before dependents, and keep successful package outputs when another package fails.
      phases:
        - id: validate_workspace_before_import
          owner_skill: skillspec
          description: Validate the workspace graph before writing generated package outputs.
          requires:
            - workspace_validate_manifest
            - validate_workspace_graph
          forbid:
            - proceed_with_circular_skill_dependencies
            - import_workspace_root_as_single_skill
        - id: import_workspace_packages
          owner_skill: skillspec
          description: Run per-package doctor, source map, and import-skill through the workspace import command, preserving built packages and blocking dependents of failed packages.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_skill_files
              - local_repo_files
            permission_required_for:
              - any_unlisted_tool
          requires:
            - workspace_import_packages
            - produce_workspace_import_report
          forbid:
            - use_router_index_for_authoring_recon
            - compile_or_install_during_workspace_import
        - id: report_workspace_import
          owner_skill: skillspec
          description: Report built, failed, skipped, and blocked packages plus per-package evidence paths and the next converge command.
          requires:
            - choose_execution_strategy
            - preserve_compact_evidence
            - report_workspace_import
  - id: workspace_converge
    label: Converge workspace build
    rank: 5
    description: Use when generated workspace package drafts should be checked against the validated workspace graph before compile or install.
    execution_plan:
      mode: ordered
      reason: Converge is the graph-level proof gate after fanout import; it must verify generated specs and dependency readiness without compiling or installing.
      phases:
        - id: validate_workspace_for_converge
          owner_skill: skillspec
          description: Revalidate the workspace manifest before trusting build outputs.
          requires:
            - workspace_validate_manifest
            - validate_workspace_graph
        - id: converge_workspace_build
          owner_skill: skillspec
          description: Verify each package has a ready generated spec or explicit failure evidence, and block dependents whose dependencies are not ready.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
            permission_required_for:
              - any_unlisted_tool
          requires:
            - workspace_converge_build
            - produce_workspace_converge_report
          forbid:
            - compile_or_install_during_workspace_import
            - use_router_index_for_authoring_recon
        - id: report_workspace_converge
          owner_skill: skillspec
          description: Report ready, failed, blocked, and missing packages plus review/compile guidance only when every package is ready.
          requires:
            - choose_execution_strategy
            - preserve_compact_evidence
            - report_workspace_converge
  - id: workspace_compile
    label: Compile workspace build
    rank: 6
    description: Use when converged workspace package drafts should be compiled into harness-ready SKILL.md loaders under the mirrored build root.
    execution_plan:
      mode: ordered
      reason: Workspace compile is the Phase 6 gate after convergence; it writes loaders for ready packages but must not install skills or refresh router indexes.
      phases:
        - id: validate_workspace_for_compile
          owner_skill: skillspec
          description: Revalidate the workspace manifest and recheck convergence before writing loaders.
          requires:
            - workspace_validate_manifest
            - workspace_converge_build
            - validate_workspace_graph
        - id: compile_workspace_build
          owner_skill: skillspec
          description: Compile ready package specs into SKILL.md loaders and block dependents whose dependencies did not compile.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
            permission_required_for:
              - any_unlisted_tool
          requires:
            - workspace_compile_build
            - produce_workspace_compile_report
          forbid:
            - install_during_workspace_compile
            - refresh_router_during_workspace_compile
            - use_router_index_for_authoring_recon
        - id: report_workspace_compile
          owner_skill: skillspec
          description: Report compiled, failed, blocked, missing, and skipped packages plus Phase 7 install guidance.
          requires:
            - choose_execution_strategy
            - preserve_compact_evidence
            - report_workspace_compile
  - id: workspace_install
    label: Install workspace build
    rank: 7
    description: Use when compiled workspace packages should be dry-run planned or installed into harness roots using manifest install_slug folders, with explicit workspace visibility policy planning.
    execution_plan:
      mode: ordered
      reason: Workspace install is the Phase 7 gate after compile; it must prove the full install plan, block collisions before mutation, install dependencies first, report entry/support visibility, and leave router refresh separate.
      phases:
        - id: validate_workspace_for_install
          owner_skill: skillspec
          description: Revalidate the workspace manifest before trusting install slugs and dependency edges.
          requires:
            - workspace_validate_manifest
            - validate_workspace_graph
        - id: plan_workspace_install
          owner_skill: skillspec
          description: Run the workspace install dry-run so every harness write, visibility target, collision, missing loader, and dependency blocker is visible before mutation. Use workspace-path slugs for side-by-side or plugin-safe installs; use local-name with --retire-existing only when replacing canonical existing skill folders.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
            permission_required_for:
              - any_unlisted_tool
          requires:
            - workspace_install_dry_run
            - produce_workspace_install_report
            - produce_workspace_visibility_plan
          forbid:
            - install_without_workspace_dry_run
            - refresh_router_during_workspace_install
        - id: install_workspace_packages
          owner_skill: skillspec
          description: Install the compiled packages only after the dry-run report is clean or the user explicitly requested install with reviewed collision and visibility behavior.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
            permission_required_for:
              - install_or_release_side_effect
              - any_unlisted_tool
          requires:
            - workspace_install_packages
            - produce_workspace_install_manifest
            - produce_workspace_visibility_plan
          forbid:
            - install_without_workspace_dry_run
            - refresh_router_during_workspace_install
        - id: report_workspace_install
          owner_skill: skillspec
          description: Report installed, planned, failed, blocked, and missing packages plus install manifest paths, visibility policy, optional visibility manifest, and router-refresh separation.
          requires:
            - choose_execution_strategy
            - preserve_compact_evidence
            - report_workspace_install
  - id: install_skill_router
    label: Install router mode
    rank: 3
    description: Use when the user wants post-install setup to create or refresh router mode in the configured skill roots.
    execution_plan:
      mode: ordered
      reason: Router mode changes skill visibility and harness prompt hooks, so it must inventory roots, run the router install command, verify managed guard hooks and first_hop_ready, verify routed skills are explicit-only, and explain the fast path; guard owns freshness, ordinary requests run one route query with harness/root context when available, duplicate physical roots collapse to one logical skill, and route JSON only loads a skill for decision use_skill while bypass or ambiguous continues normal behavior.
      phases:
        - id: inspect_router_targets
          owner_skill: skillspec
          description: Identify the skill roots where router mode should be installed and verify the SkillSpec CLI supports router commands.
          requires:
            - list_install_targets
            - router_help
          forbid:
            - infer_router_roots_without_check
        - id: install_router_surface
          owner_skill: skillspec
          description: Install or refresh the router skill and managed Codex/Claude guard hooks inside the selected roots without using a separate router root.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
              - declared_commands_dependencies_imports_resources
            permission_required_for:
              - install_or_release_side_effect
              - any_unlisted_tool
          requires:
            - router_install
            - verify_router_install
            - router_guard
          forbid:
            - use_removed_router_root
        - id: report_router_mode
          owner_skill: skillspec
          description: Report which roots and harness hook files were changed, whether router guard reports first_hop_ready, whether routed skills are explicit-only, whether no-match fallback returns to normal agent behavior, and whether durable first-hop is unavailable.
          requires:
            - verify_router_installed
  - id: update_skill_router
    label: Update router mode
    rank: 4
    description: Use when the user wants to update or repair an existing skill-router install, including stale generated text, missing router spec files, or recorded harness roots that need to be rewritten.
    execution_plan:
      mode: ordered
      reason: Router update mutates recorded harness roots, so it must start from the saved router config, create a backup, rewrite every managed router skill, and warn the operator to restart active harness sessions.
      phases:
        - id: inspect_router_update
          owner_skill: skillspec
          description: Verify the SkillSpec CLI supports router update and that router mode has an existing config to update.
          requires:
            - router_help
          forbid:
            - mutate_unrecorded_router_roots
        - id: update_router_surface
          owner_skill: skillspec
          description: Back up the existing router state, rewrite every recorded router skill, reapply visibility, rebuild the index, and check preparedness.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
              - declared_commands_dependencies_imports_resources
            permission_required_for:
              - install_or_release_side_effect
              - any_unlisted_tool
          requires:
            - router_update
          forbid:
            - update_router_without_backup
            - mutate_unrecorded_router_roots
        - id: report_router_update
          owner_skill: skillspec
          description: Report the backup path, updated router roots, preparedness status, durable-executor status, and restart warning.
          requires:
            - verify_router_updated
  - id: switch_skill_router_mode
    label: Enable or disable router mode
    rank: 5
    description: Use when the user wants to switch router mode on or off without uninstalling the managed router package.
    execution_plan:
      mode: ordered
      reason: Router enable/disable mutates native Codex and Claude visibility metadata and managed prompt guard hooks while preserving router files, config, manifest, and index.
      phases:
        - id: inspect_router_switch
          owner_skill: skillspec
          description: Verify router lifecycle help and that router config exists before switching mode.
          requires:
            - router_help
          forbid:
            - mutate_unrecorded_router_roots
        - id: switch_router_mode
          owner_skill: skillspec
          description: Enable rebuilds the index from current roots, installs managed guard hooks, makes the router the first hop when hooks are loaded, and makes routed skills explicit-only; disable removes managed guard hooks, makes router explicit-only, and restores routed skills to implicit/default visibility.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
              - declared_commands_dependencies_imports_resources
            permission_required_for:
              - install_or_release_side_effect
              - any_unlisted_tool
          requires:
            - router_enable_or_disable
          forbid:
            - mutate_unrecorded_router_roots
        - id: report_router_switch
          owner_skill: skillspec
          description: Report enabled state, harness_hooks installed/removed status, visibility change count, index rebuild/preparedness for enable, and restart warning.
          requires:
            - verify_router_updated
  - id: inspect_skillspec_status
    label: Inspect SkillSpec status
    rank: 6
    description: Use when the user wants a read-only report of installed SkillSpec lifecycle state, supported roots, router index status, and SkillSpec-backed versus legacy prose skills.
    execution_plan:
      mode: ordered
      reason: Status inspection must not mutate router, durable-executor, visibility metadata, or indexes.
      phases:
        - id: inspect_status_help
          owner_skill: skillspec
          description: Verify the CLI exposes the read-only status command before collecting status.
          requires:
            - status_help
          forbid:
            - install_or_release_side_effect
            - mutate_unrecorded_router_roots
        - id: collect_status_report
          owner_skill: skillspec
          description: Run the read-only lifecycle and inventory status command and preserve the report.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
              - declared_commands_dependencies_imports_resources
          requires:
            - status_lifecycle_inventory
          forbid:
            - install_or_release_side_effect
            - mutate_unrecorded_router_roots
            - rebuild_index_for_status
        - id: report_status_summary
          owner_skill: skillspec
          description: Report router and durable enabled/disabled state, supported and scanned roots, last router index state, and SkillSpec-backed versus legacy skill counts and names.
          requires:
            - report_skillspec_status
  - id: install_durable_executor
    label: Install durable-executor
    rank: 6
    description: Use when the user wants the optional durable-executor first-hop skill installed after SkillSpec itself is installed.
    execution_plan:
      mode: ordered
      reason: Durable-executor is optional and must come from an explicit local source, so source and target approval must happen before writing skill roots.
      phases:
        - id: resolve_durable_source
          owner_skill: skillspec
          description: Determine whether rote is available, whether the user supplied a local durable-executor source folder, and which harness targets should receive it.
          requires:
            - durable_help
            - verify_rote_cli
            - find_durable_executor
            - choose_durable_source
          forbid:
            - assume_bundled_durable_executor
        - id: import_or_install_durable
          owner_skill: skillspec
          description: Install durable-executor through the managed durable lifecycle command and refresh router state when configured.
          requires:
            - durable_install
            - verify_durable_executor
          forbid:
            - install_durable_without_source_or_existing_skill
            - make_durable_executor_explicit_in_router_mode
        - id: report_durable_status
          owner_skill: skillspec
          description: Report whether durable-executor is installed and whether it is implicit or explicit-only under its lifecycle state.
          requires:
            - verify_durable_optional_status
  - id: update_durable_executor
    label: Update durable-executor
    rank: 7
    description: Use when the user wants to refresh every managed durable-executor install from its recorded source or an explicit replacement source.
    execution_plan:
      mode: ordered
      reason: Durable-executor update mutates recorded harness roots, so it must use durable config, create a backup, refresh router state when configured, and warn the operator to restart active harness sessions.
      phases:
        - id: inspect_durable_update
          owner_skill: skillspec
          description: Verify the SkillSpec CLI exposes durable-executor update and that durable config exists.
          requires:
            - durable_help
          forbid:
            - mutate_unrecorded_durable_roots
        - id: update_durable_surface
          owner_skill: skillspec
          description: Back up durable config and every recorded durable-executor install, rewrite those installs, and refresh router state when configured.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
              - declared_commands_dependencies_imports_resources
            permission_required_for:
              - install_or_release_side_effect
              - any_unlisted_tool
          requires:
            - durable_update
          forbid:
            - update_durable_without_backup
            - mutate_unrecorded_durable_roots
        - id: report_durable_update
          owner_skill: skillspec
          description: Report the backup path, updated durable installs, router refresh status, and restart warning.
          requires:
            - verify_durable_optional_status
  - id: switch_durable_executor_mode
    label: Enable or disable durable-executor
    rank: 8
    description: Use when the user wants to switch durable-executor implicit invocation on or off without uninstalling the managed durable package.
    execution_plan:
      mode: ordered
      reason: Durable enable/disable mutates native Codex and Claude visibility metadata while preserving durable files, managed markers, and config.
      phases:
        - id: inspect_durable_switch
          owner_skill: skillspec
          description: Verify durable-executor lifecycle help and the saved durable config before switching mode.
          requires:
            - durable_help
          forbid:
            - mutate_unrecorded_durable_roots
        - id: switch_durable_mode
          owner_skill: skillspec
          description: Enable makes recorded durable installs implicit; disable makes recorded durable installs explicit-only and refreshes router state when configured and enabled.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
              - declared_commands_dependencies_imports_resources
            permission_required_for:
              - install_or_release_side_effect
              - any_unlisted_tool
          requires:
            - durable_enable_or_disable
          forbid:
            - mutate_unrecorded_durable_roots
        - id: report_durable_switch
          owner_skill: skillspec
          description: Report enabled state, visibility change count, router refresh status if present, and restart warning.
          requires:
            - verify_durable_optional_status
  - id: delete_durable_executor
    label: Delete durable-executor
    rank: 9
    description: Use when the user wants to remove every managed durable-executor install and refresh router state when configured.
    execution_plan:
      mode: ordered
      reason: Durable-executor delete must remove only recorded, marked durable installs so ordinary user skills are not deleted.
      phases:
        - id: inspect_durable_delete
          owner_skill: skillspec
          description: Verify durable-executor lifecycle help and the saved durable config before deleting anything.
          requires:
            - durable_help
          forbid:
            - delete_unmarked_durable_executor
            - mutate_unrecorded_durable_roots
        - id: delete_durable_surface
          owner_skill: skillspec
          description: Delete only marker-protected durable-executor folders recorded in durable config, remove config, and refresh router state when configured.
          tool_boundary:
            allow:
              - skillspec_cli
              - local_repo_files
              - declared_commands_dependencies_imports_resources
            permission_required_for:
              - install_or_release_side_effect
              - any_unlisted_tool
          requires:
            - durable_delete
          forbid:
            - delete_unmarked_durable_executor
            - mutate_unrecorded_durable_roots
        - id: report_durable_delete
          owner_skill: skillspec
          description: Report removed managed durable installs, removed config, router refresh status, and restart warning.
          requires:
            - verify_durable_optional_status
  - id: observed_durable_workspace_to_skill
    label: Create skill from observed durable workspace
    rank: 8
    description: Use when the user wants to ask for a real task, let durable-executor run it through rote-exec evidence, inspect the workspace, and synthesize a reviewed SkillSpec-backed skill from the observed workflow.
    execution_plan:
      mode: ordered
      reason: Observed-workflow creation depends on evidence from a named durable workspace rather than a pre-existing prose SKILL.md.
      phases:
        - id: elicit_observation_task
          owner_skill: skillspec
          description: Ask for the task to run or identify the existing durable workspace to observe; when the prompt already includes the task, carry it forward without inventing a workspace.
          requires:
            - choose_observation_workspace
            - capture_observation_task
          forbid:
            - observe_anonymous_workspace
          jumps:
            - when: existing_named_workspace_supplied
              to_phase: observe_durable_workspace
              reason: Existing durable workspaces can be observed directly without running another task.
        - id: run_observation_task
          owner_skill: durable-executor
          description: Run the quoted observation task through durable-executor first, preserving the selected substrate, capability evidence, workspace name, artifacts, and return packet for synthesis.
          tool_boundary:
            allow:
              - durable-executor
              - skillspec_cli
              - rote_exec
              - local_trace_files
            permission_required_for:
              - any_unlisted_tool
              - external_network_or_browser_action
              - credentialed_or_private_data_access
          requires:
            - verify_durable_executor
            - handoff_observation_task_to_durable_executor
            - capture_observation_workspace
            - record_capability_selection_ledger
          forbid:
            - direct_cli_without_rote_exec
            - direct_shell_command_without_rote_exec
            - direct_api_call_without_rote_adapter_or_rote_exec
            - observe_anonymous_workspace
          handoff:
            to_skill: durable-executor
            boundary: resume_after_handoff
            pass_context:
              - user_intent
              - observation_task
              - workspace
              - trace_dir
              - return_to
              - execution_policy
              - evidence_context
            forbid:
              - direct_cli_without_rote_exec
              - direct_shell_command_without_rote_exec
              - direct_api_call_without_rote_adapter_or_rote_exec
              - generated_skill_install_without_review
            reason: The observed workflow must be created by durable execution evidence first; skillspec resumes only after a named workspace exists to inspect.
        - id: observe_durable_workspace
          owner_skill: skillspec
          description: Inspect rote workspace stats, command log, metadata, and artifacts without replaying unsafe actions.
          tool_boundary:
            allow:
              - rote_workspace
              - rote_exec
              - local_trace_files
              - local_repo_files
              - skillspec_cli
            permission_required_for:
              - replay_or_mutating_action
              - any_unlisted_tool
          requires:
            - observe_workspace_stats
            - observe_workspace_log
            - observe_workspace_meta
          forbid:
            - replay_workspace_actions_without_approval
            - claim_workspace_tokens_without_stats
        - id: synthesize_observed_spec
          owner_skill: skillspec
          description: Show the observed result and evidence summary for approval, then build a reviewed skill.spec.yml from observed commands, dependencies, inputs, outputs, rules, elicitations, tests, and proof gaps.
          requires:
            - approve_observed_result_for_synthesis
            - synthesize_from_workspace
            - synthesize_observed_skill_spec
            - fill_coverage_matrix
            - produce_observed_workspace_spec
          forbid:
            - synthesize_without_observation_approval
        - id: qa_observed_spec
          owner_skill: skillspec
          description: Validate, test, decide, align, and value-report the observed-workflow spec before optional install.
          requires:
            - run_structural_qa
            - prove_value
  - id: revise_existing_skillspec
    label: Revise existing SkillSpec
    rank: 9
    description: Use when a skill already has skill.spec.yml and the user wants to revise, improve, or update it.
    execution_plan:
      mode: ordered
      phases:
        - id: grammar_and_current_map
          owner_skill: skillspec
          description: Learn the current grammar and summarize the existing SkillSpec before editing it.
          requires:
            - grammar_sensemake_index
            - grammar_sensemake_porting
            - sensemake_current_spec
            - grammar_checklist_import
          forbid:
            - patch_yaml_from_memory
        - id: inspect_active_handles
          owner_skill: skillspec
          description: Use query/refs plus the phase plan to inspect only active handles and execution order.
          requires:
            - plan_phase_order
            - act_named_phase
            - query_active_handles
            - refs_active_handles
        - id: revise_reviewed_spec
          owner_skill: skillspec
          description: Patch only the reviewed SkillSpec constructs required by the requested change.
          requires:
            - fill_coverage_matrix
            - produce_reviewed_spec
        - id: rerun_qa
          owner_skill: skillspec
          description: Re-run structural QA, phase progress, proof, compile, and value reporting after revision.
          requires:
            - run_structural_qa
            - progress_show
            - prove_value
  - id: compile_and_install_reviewed_skill
    label: Compile and install reviewed skill
    rank: 10
    description: Use only after a reviewed spec validates and the user explicitly approves dependency surface, install targets, and whether any existing active skill should be retired before replacement.
    execution_plan:
      mode: ordered
      phases:
        - id: dependency_surface
          owner_skill: skillspec
          requires:
            - deps_check_all
            - show_dependency_surface
            - approve_dependency_surface
        - id: compile_targets
          owner_skill: skillspec
          requires:
            - compile_codex_skill
            - compile_claude_skill
        - id: dry_run_install
          owner_skill: skillspec
          requires:
            - list_install_targets
            - install_dry_run
            - approve_install_targets
            - approve_retire_existing_skill
        - id: install
          owner_skill: skillspec
          requires:
            - install_skill
  - id: prove_skill_value
    label: Prove skill value
    rank: 11
    description: Use when the user asks to prove, demo, align, or value-report a ported SkillSpec skill.
    execution_plan:
      mode: ordered
      phases:
        - id: run_demo_decision
          owner_skill: skillspec
          requires:
            - plan_phase_order
            - act_named_phase
            - decide_demo
            - produce_decision_trace
        - id: align_trace
          owner_skill: skillspec
          requires:
            - progress_show
            - trace_align
            - report_alignment_status
        - id: print_value
          owner_skill: skillspec
          requires:
            - value_report
rules:
  - id: single_atomic_source_uses_one_shot
    when:
      user_says_any:
        - single atomic skill
        - one SKILL.md
        - one-shot port
        - port-one-shot
        - single skill folder
        - atomic skill package
    prefer: local_skill_port
    forbid:
      - use_port_one_shot_without_shape_recon
      - use_port_one_shot_for_workspace_root
      - use_port_one_shot_for_plugin_root
    after_success:
      - local_porting_loop
      - generate_value_report
    reason: One-shot is the fast path only after source-shape recon proves there is exactly one atomic prose skill package.
  - id: route_multi_skill_repos_to_workspace_recon
    when:
      user_says_any:
        - workspace map
        - workspace validate
        - skillspec workspace
        - skillspec.workspace.yml
        - multiple SKILL.md
        - many SKILL.md
        - multi-skill repo
        - multi-skill workspace
        - plugin-shaped repo
        - plugin-shaped workspace
        - claude plugin
        - claude plugin skills
        - plugin namespace
        - namespaced skills
        - repeated skill names
        - parent folder with multiple skills
        - fanout converge
        - shared standards package
        - cross-skill references
        - cross references another skill
        - references another skill
        - coding-standards/SKILL.md
        - skill dependency graph
        - skill depends on another skill
        - plugin.json
        - .claude-plugin
        - CLAUDE.md plugin
        - MCP plugin
        - same skill name collision
    prefer: workspace_skill_authoring
    forbid:
      - use_router_index_for_authoring_recon
      - import_workspace_root_as_single_skill
      - proceed_with_circular_skill_dependencies
      - use_port_one_shot_for_workspace_root
      - use_port_one_shot_for_plugin_root
    after_success:
      - report_workspace_recon
    reason: A folder containing multiple SKILL.md packages or plugin-shaped skill roots must be mapped as a workspace before any single-skill import or fanout/converge plan.
  - id: route_workspace_import_to_fanout
    when:
      user_says_any:
        - workspace import
        - skillspec workspace import
        - fanout import
        - import workspace packages
        - import skillspec.workspace.yml
        - generate workspace package drafts
        - run fanout import
    prefer: workspace_fanout_import
    forbid:
      - use_router_index_for_authoring_recon
      - import_workspace_root_as_single_skill
      - compile_or_install_during_workspace_import
    after_success:
      - report_workspace_import
    reason: Fanout import starts from a validated workspace manifest and writes one generated package draft per atomic skill; it must not compile, install, or refresh router indexes.
  - id: route_workspace_converge_to_proof
    when:
      user_says_any:
        - workspace converge
        - skillspec workspace converge
        - converge workspace
        - workspace proof
        - verify workspace build
        - check workspace package drafts
        - workspace-converge.report.md
    prefer: workspace_converge
    forbid:
      - use_router_index_for_authoring_recon
      - compile_or_install_during_workspace_import
    after_success:
      - report_workspace_converge
    reason: Converge verifies generated package drafts and dependency readiness after fanout import and before compile or install.
  - id: route_workspace_compile_to_phase6
    when:
      user_says_any:
        - workspace compile
        - skillspec workspace compile
        - compile workspace
        - compile workspace build
        - compile workspace package drafts
        - workspace-compile.report.md
    prefer: workspace_compile
    forbid:
      - install_during_workspace_compile
      - refresh_router_during_workspace_compile
      - use_router_index_for_authoring_recon
    after_success:
      - report_workspace_compile
    reason: Workspace compile runs after convergence, writes generated loaders in the build tree, and must stop before install or router refresh.
  - id: route_workspace_install_to_phase7
    when:
      user_says_any:
        - workspace install
        - skillspec workspace install
        - install workspace
        - install compiled workspace
        - workspace install dry-run
        - workspace-install.report.md
        - workspace-install.manifest.json
        - workspace visibility
        - workspace visibility policy
        - apply visibility
        - --apply-visibility
        - entry-implicit
        - manual-only support skills
        - workspace-visibility.manifest.json
    prefer: workspace_install
    forbid:
      - install_without_workspace_dry_run
      - refresh_router_during_workspace_install
      - use_router_index_for_authoring_recon
    after_success:
      - report_workspace_install
    reason: Workspace install runs after compile, plans every harness write and visibility target first, uses install_slug folders, blocks collisions, optionally applies native visibility metadata, and keeps router refresh separate.
  - id: route_local_sources_to_local_port
    when:
      user_says_any:
        - SKILL.md
        - local skill
        - local folder
        - /skills/
        - ~/.codex/skills
        - ~/.agents/skills
    route_order:
      - local_skill_port
      - remote_skill_port
    after_success:
      - local_porting_loop
      - generate_value_report
    reason: Local SKILL.md and skill folders can be staged directly with resources intact.
  - id: route_remote_sources_to_remote_port
    when:
      user_says_any:
        - github.com
        - owner/repo
        - tree/main
        - public repo
        - remote skill
      user_says_all_groups:
        - - import
          - port
          - convert
          - compile
          - install
          - prove
          - stage
          - as a SkillSpec
    prefer: remote_skill_port
    elicit:
      - approve_remote_source_access
      - choose_candidate_skill
    forbid:
      - install_from_remote_checkout
      - execute_imported_snippets_during_staging
      - web_search_for_remote_source
      - fetch_raw_github_skill_md_for_import
    reason: Remote inputs must be staged locally before import and install.
  - id: route_source_shape_questions_to_doctor
    when:
      user_says_any:
        - what is the shape of this skill
        - what is the shape of skill
        - shape of skill
        - skill shape
        - source shape
        - classify this skill repo
        - classify skill repo
        - run doctor
        - run doctor on this repo
        - run doctor on this url
        - doctor on this repo
        - doctor on this url
        - diagnose source shape
    prefer: inspect_source_shape
    forbid:
      - port_one_shot_or_manual_import
      - import_skill_draft
      - workspace_import_packages
      - workspace_converge_build
      - workspace_compile_build
      - workspace_install_packages
      - workspace_install_apply_visibility
      - install_from_remote_checkout
      - execute_imported_snippets_during_staging
    after_success:
      - report_source_shape
    reason: Shape questions should run the static doctor shape gate and stop; they should not import, port, compile, install, or choose a remote candidate.
  - id: post_install_setup_routes_to_multiplexer
    when:
      user_says_any:
        - post install
        - post-install
        - setup after install
        - skillspec setup
        - /skillspec
        - installed skillspec
    route_order:
      - workspace_skill_authoring
      - workspace_fanout_import
      - workspace_converge
      - workspace_compile
      - workspace_install
      - install_skill_router
      - update_skill_router
      - install_durable_executor
      - update_durable_executor
      - delete_durable_executor
      - observed_durable_workspace_to_skill
      - local_skill_port
      - remote_skill_port
      - revise_existing_skillspec
    reason: Once SkillSpec is installed, the prompt skill should be the single setup entry point for router, durable, import, observe, revise, and proof workflows.
  - id: route_prompt_import_to_skill_port
    when:
      user_says_any:
        - /skillspec import
        - import existing skill
        - import local skill
        - import remote skill
    route_order:
      - local_skill_port
      - remote_skill_port
    after_success:
      - local_porting_loop
      - generate_value_report
    reason: The post-install prompt uses import language, but it should still enter the reviewed local or remote porting path.
  - id: route_router_install_to_router_setup
    when:
      user_says_any:
        - install router
        - install skill-router
        - router mode
        - setup router
        - skill-router explicit
    prefer: install_skill_router
    forbid:
      - use_removed_router_root
    after_success:
      - verify_router_installed
    reason: Router setup is its own post-install path and must install into selected roots, not a separate router root.
  - id: route_router_switch_to_lifecycle
    when:
      user_says_any:
        - enable router
        - router enable
        - disable router
        - router disable
        - switch off router
        - switch on router
        - turn off router mode
        - turn on router mode
    prefer: switch_skill_router_mode
    forbid:
      - mutate_unrecorded_router_roots
    after_success:
      - verify_router_updated
    reason: Router enable/disable is a reversible lifecycle switch, not uninstall; enable must rebuild the index from current roots.
  - id: route_status_to_read_only_inventory
    when:
      user_says_any:
        - skillspec status
        - status report
        - installed status
        - lifecycle status
        - router status
        - durable status
        - skill inventory
        - legacy skills
        - skillspec-backed skills
    prefer: inspect_skillspec_status
    forbid:
      - install_or_release_side_effect
      - rebuild_index_for_status
      - mutate_unrecorded_router_roots
    after_success:
      - report_skillspec_status
    reason: Status is a read-only inspection path for lifecycle state, roots, router index freshness, and SkillSpec-backed versus legacy skill inventory.
  - id: route_router_update_to_router_maintenance
    when:
      user_says_any:
        - update router
        - router update
        - update skill-router
        - repair router
        - repair skill-router
        - stale router
        - missing router spec
        - restart harness
    prefer: update_skill_router
    forbid:
      - update_router_without_backup
      - mutate_unrecorded_router_roots
    after_success:
      - verify_router_updated
    reason: Router update is backup-first maintenance for already-recorded harness roots, not a fresh install or index-only refresh.
  - id: route_durable_install_to_optional_durable
    when:
      user_says_any:
        - install durable-executor
        - install durable executor
        - durable first-hop
        - durable first hop
        - optional durable
