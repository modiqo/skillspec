name: Doctor Report Request

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

permissions:
  contents: read
  issues: write

concurrency:
  group: doctor-report-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  doctor-report:
    name: Generate doctor report
    if: contains(github.event.issue.labels.*.name, 'doctor-report') || startsWith(github.event.issue.title, 'Doctor report:')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Parse request
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";
            const match =
              body.match(/### Public GitHub skill URL\s*\n([\s\S]*?)(?=\n### |\n---|$)/) ||
              body.match(/### Skill repo URL\s*\n([\s\S]*?)(?=\n### |\n---|$)/);
            const titleMatch = (context.payload.issue.title || "").match(/https:\/\/github\.com\/\S+/);
            const raw = match
              ? match[1]
                  .split(/\r?\n/)
                  .map((line) => line.trim())
                  .filter((line) => line && line !== "_No response_")[0] || ""
              : titleMatch
                ? titleMatch[0].replace(/[),.;]+$/, "")
                : "";

            let valid = false;
            let reason = "The issue form did not include a public GitHub skill URL.";
            let normalized = "";
            let displayTarget = "";
            let owner = "";
            let repo = "";

            if (raw.length > 400) {
              reason = "The URL is too long for the public report workflow.";
            } else if (raw) {
              try {
                const url = new URL(raw);
                if (url.protocol !== "https:") {
                  reason = "Use an https://github.com/... URL.";
                } else if (url.hostname.toLowerCase() !== "github.com") {
                  reason = "Only github.com repository and folder URLs are supported.";
                } else if (url.username || url.password) {
                  reason = "Do not include credentials in the URL.";
                } else if (url.search || url.hash) {
                  reason = "Remove query strings and fragments from the URL.";
                } else {
                  const parts = url.pathname.split("/").filter(Boolean);
                  if (parts.length < 2) {
                    reason = "Use a GitHub repository URL such as https://github.com/org/repo.";
                  } else {
                    owner = parts[0];
                    repo = parts[1].replace(/\.git$/, "");
                    const safeSegment = /^[A-Za-z0-9._-]+$/;
                    if (!safeSegment.test(owner) || !safeSegment.test(repo)) {
                      reason = "The owner or repository name contains unsupported characters.";
                    } else {
                      const rest = parts.slice(2).join("/");
                      normalized = `https://github.com/${owner}/${repo}${rest ? `/${rest}` : ""}`;
                      displayTarget = displayForTarget(normalized);
                      valid = true;
                      reason = "";
                    }
                  }
                }
              } catch (error) {
                reason = "The submitted value is not a valid URL.";
              }
            }

            core.setOutput("valid", String(valid));
            core.setOutput("reason", reason);
            core.setOutput("target", normalized || raw);
            core.setOutput("display_target", displayTarget || displayForTarget(normalized || raw));
            core.setOutput("owner", owner);
            core.setOutput("repo", repo);

            function displayForTarget(value) {
              try {
                const url = new URL(value);
                if (url.protocol !== "https:" || url.hostname.toLowerCase() !== "github.com") {
                  return "[submitted target]";
                }
                const parts = url.pathname.split("/").filter(Boolean);
                if (parts.length < 2) {
                  return "github.com/[repository]";
                }
                const ownerRepo = `${parts[0]}/${parts[1].replace(/\.git$/, "")}`;
                let rest = parts.slice(2);
                if (/^(tree|blob)$/i.test(rest[0] || "") && rest.length >= 3) {
                  rest = rest.slice(2);
                }
                return rest.length === 0 ? `github.com/${ownerRepo}` : `github.com/${ownerRepo}/.../${rest.at(-1)}`;
              } catch (error) {
                return "[submitted target]";
              }
            }

      - name: Check public repository visibility
        id: visibility
        if: steps.parse.outputs.valid == 'true'
        uses: actions/github-script@v7
        env:
          TARGET_OWNER: ${{ steps.parse.outputs.owner }}
          TARGET_REPO: ${{ steps.parse.outputs.repo }}
        with:
          script: |
            const owner = process.env.TARGET_OWNER;
            const repo = process.env.TARGET_REPO;

            try {
              const response = await github.rest.repos.get({ owner, repo });
              if (response.data.private) {
                core.setOutput("public", "false");
                core.setOutput("reason", "The repository is private. Public report requests can only inspect public GitHub repositories.");
              } else {
                core.setOutput("public", "true");
                core.setOutput("reason", "");
              }
            } catch (error) {
              core.setOutput("public", "false");
              if (error.status === 404) {
                core.setOutput("reason", "The repository could not be read publicly. If it is private, run SkillSpec locally on a local checkout.");
              } else {
                core.setOutput("reason", `GitHub API could not verify the repository: ${error.message}`);
              }
            }

      - name: Comment with local-run instructions
        if: steps.parse.outputs.valid != 'true' || steps.visibility.outputs.public != 'true'
        uses: actions/github-script@v7
        env:
          DISPLAY_TARGET: ${{ steps.parse.outputs.display_target }}
          PARSE_REASON: ${{ steps.parse.outputs.reason }}
          VISIBILITY_REASON: ${{ steps.visibility.outputs.reason }}
        with:
          script: |
            const marker = "<!-- skillspec-doctor-report -->";
            const target = process.env.DISPLAY_TARGET || "not provided";
            const reason = process.env.PARSE_REASON || process.env.VISIBILITY_REASON || "The URL could not be read as a public GitHub repository.";
            const body = [
              marker,
              "### SkillSpec Doctor report",
              "",
              "I could not run a public report for:",
              "",
              "````text",
              target,
              "````",
              "",
              `Reason: ${reason}`,
              "",
              "Public report requests only support publicly readable GitHub repositories or folders. For a private repository, run SkillSpec locally:",
              "",
              "````sh",
              "curl -fsSL https://skillspec.sh/install.sh | sh",
              "git clone <your-private-repo-url>",
              "skillspec doctor /path/to/local/skill",
              "skillspec doctor /path/to/local/skill --markdown > skillspec-doctor.md",
              "skillspec doctor /path/to/local/skill --html > skillspec-doctor.html",
              "skillspec doctor /path/to/local/skill --json > skillspec-doctor.json",
              "````",
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === "Bot" && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Check out repository
        if: steps.visibility.outputs.public == 'true'
        uses: actions/checkout@v4

      - name: Install Rust
        if: steps.visibility.outputs.public == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        if: steps.visibility.outputs.public == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Build SkillSpec CLI
        if: steps.visibility.outputs.public == 'true'
        run: cargo build --locked -p skillspec

      - name: Assess source shape
        id: shape
        if: steps.visibility.outputs.public == 'true'
        shell: bash
        env:
          TARGET: ${{ steps.parse.outputs.target }}
          DISPLAY_TARGET: ${{ steps.parse.outputs.display_target }}
        run: |
          set -euo pipefail
          mkdir -p doctor-report
          target/debug/skillspec source stage "${TARGET}" --out doctor-source-stage --json > doctor-report/source-stage.json
          node .github/scripts/doctor-shape-gate.mjs

      - name: Run doctor
        id: doctor
        if: steps.visibility.outputs.public == 'true' && steps.shape.outputs.run_full_doctor == 'true'
        shell: bash
        env:
          TARGET: ${{ steps.parse.outputs.target }}
          DISPLAY_TARGET: ${{ steps.parse.outputs.display_target }}
          DOCTOR_TARGET: ${{ steps.shape.outputs.staged_source_path }}
        run: |
          set -euo pipefail
          mkdir -p doctor-report

          set +e
          target/debug/skillspec doctor "${DOCTOR_TARGET}" > doctor-report/doctor-report.txt 2> doctor-report/doctor-stderr.txt
          status=$?
          set -e
          echo "status=${status}" >> "${GITHUB_OUTPUT}"

          if [ "${status}" -eq 0 ]; then
            target/debug/skillspec doctor "${DOCTOR_TARGET}" --markdown > doctor-report/doctor-report.md
            target/debug/skillspec doctor "${DOCTOR_TARGET}" --html > doctor-report/doctor-report.html
            target/debug/skillspec doctor "${DOCTOR_TARGET}" --json > doctor-report/doctor-report.json
          fi

      - name: Prepare public doctor artifacts
        if: steps.visibility.outputs.public == 'true'
        shell: bash
        env:
          TARGET: ${{ steps.parse.outputs.target }}
          DISPLAY_TARGET: ${{ steps.parse.outputs.display_target }}
          DOCTOR_TARGET: ${{ steps.shape.outputs.staged_source_path }}
          STAGED_SOURCE_PATH: ${{ steps.shape.outputs.staged_source_path }}
        run: node .github/scripts/sanitize-doctor-report.mjs

      - name: Add doctor report to run summary
        if: ${{ steps.visibility.outputs.public == 'true' && (steps.shape.outputs.run_full_doctor != 'true' || steps.doctor.outputs.status == '0') }}
        shell: bash
        run: |
          set -euo pipefail
          max_report_chars=52000
          if [ "${{ steps.shape.outputs.run_full_doctor }}" = "true" ]; then
            {
              cat doctor-report-public/shape-gate.md
              echo
              echo "---"
              echo
            } >> "${GITHUB_STEP_SUMMARY}"
          fi
          report_bytes=$(wc -c < doctor-report-public/doctor-report.md | tr -d ' ')

          {
            head -c "${max_report_chars}" doctor-report-public/doctor-report.md
            echo
            if [ "${report_bytes}" -gt "${max_report_chars}" ]; then
              echo
              echo "> Report truncated in run summary. Download the artifact for the full report."
            fi
            echo
            echo "---"
            echo
            echo "Full Markdown, text, HTML, and JSON reports are attached as workflow artifacts."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Add doctor failure to run summary
        if: steps.visibility.outputs.public == 'true' && steps.shape.outputs.run_full_doctor == 'true' && steps.doctor.outputs.status != '0'
        shell: bash
        env:
          DISPLAY_TARGET: ${{ steps.parse.outputs.display_target }}
        run: |
          set -euo pipefail
          max_error_chars=12000

          {
            echo "## SkillSpec Doctor report failed"
            echo
            echo "Target:"
            echo
            echo '```text'
            printf '%s\n' "${DISPLAY_TARGET}"
            echo '```'
            echo
            echo "Error:"
            echo
            echo '```text'
            if [ -f doctor-report-public/doctor-stderr.txt ]; then
              head -c "${max_error_chars}" doctor-report-public/doctor-stderr.txt
            else
              echo "No stderr was captured."
            fi
            echo
            echo '```'
            echo
            echo "Artifacts include the captured stdout/stderr for debugging."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload doctor report artifacts
        id: upload
        if: steps.visibility.outputs.public == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: doctor-report-${{ github.event.issue.number }}
          path: doctor-report-public/
          retention-days: 14
          if-no-files-found: error

      - name: Comment with doctor report
        if: ${{ steps.visibility.outputs.public == 'true' && (steps.shape.outputs.run_full_doctor != 'true' || steps.doctor.outputs.status == '0') }}
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          RUN_FULL_DOCTOR: ${{ steps.shape.outputs.run_full_doctor }}
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- skillspec-doctor-report -->";
            const report = fs.readFileSync("doctor-report-public/doctor-report.md", "utf8");
            const shapeGate = fs.existsSync("doctor-report-public/shape-gate.md")
              ? fs.readFileSync("doctor-report-public/shape-gate.md", "utf8")
              : "";
            const maxReportChars = 52000;
            const fullReport = process.env.RUN_FULL_DOCTOR === "true" && shapeGate
              ? `${shapeGate}\n\n---\n\n${report}`
              : report;
            const renderedReport = fullReport.length > maxReportChars
              ? `${fullReport.slice(0, maxReportChars)}\n\n> Report truncated in issue comment. Download the artifact for the full report.`
              : fullReport;
            const artifactUrl = process.env.ARTIFACT_URL;
            const body = [
              marker,
              renderedReport,
              "",
              `Full artifacts: ${artifactUrl}`,
              "",
              "The artifact contains:",
              "",
              "- `doctor-report.txt`",
              "- `doctor-report.md`",
              "- `doctor-report.html`",
              "- `doctor-report.json`",
              "- `shape-gate.md`",
              "- `shape-gate.json`",
              "- `source-stage.json`",
              "- `target.txt`",
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === "Bot" && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment with doctor failure
        if: steps.visibility.outputs.public == 'true' && steps.shape.outputs.run_full_doctor == 'true' && steps.doctor.outputs.status != '0'
        uses: actions/github-script@v7
        env:
          DISPLAY_TARGET: ${{ steps.parse.outputs.display_target }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- skillspec-doctor-report -->";
            const stderr = fs.existsSync("doctor-report-public/doctor-stderr.txt")
              ? fs.readFileSync("doctor-report-public/doctor-stderr.txt", "utf8")
              : "No stderr was captured.";
            const target = process.env.DISPLAY_TARGET || "[submitted target]";
            const artifactUrl = process.env.ARTIFACT_URL;
            const body = [
              marker,
              "### SkillSpec Doctor report",
              "",
              "SkillSpec could not complete the public report for:",
              "",
              "````text",
              target,
              "````",
              "",
              "Error:",
              "",
              "````text",
              stderr.slice(0, 12000),
              "````",
              "",
              `Artifacts: ${artifactUrl}`,
              "",
              "If this is a private repository or requires credentials, run SkillSpec locally on a local checkout:",
              "",
              "````sh",
              "curl -fsSL https://skillspec.sh/install.sh | sh",
              "skillspec doctor /path/to/local/skill",
              "skillspec doctor /path/to/local/skill --markdown > skillspec-doctor.md",
              "skillspec doctor /path/to/local/skill --html > skillspec-doctor.html",
              "````",
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === "Bot" && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }
