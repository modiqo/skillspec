name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    name: Format, lint, examples, and conformance
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Provide example-only dependency stubs
        shell: bash
        run: |
          mkdir -p .ci-bin
          for tool in rote deno jq gh; do
            printf '#!/usr/bin/env sh\nexit 0\n' > ".ci-bin/${tool}"
            chmod +x ".ci-bin/${tool}"
          done
          echo "${PWD}/.ci-bin" >> "${GITHUB_PATH}"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace --all-targets

      - name: Verify crates.io package
        run: cargo publish --locked --dry-run -p skillspec

      - name: Build CLI
        shell: bash
        run: |
          cargo build --locked --workspace
          echo "${PWD}/target/debug" >> "${GITHUB_PATH}"

      - name: Dogfood doctor on SkillSpec skill
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p doctor-reports
          skillspec doctor skills/skillspec/ | tee doctor-reports/skillspec-doctor.txt
          skillspec doctor skills/skillspec/ --markdown > doctor-reports/skillspec-doctor.md
          skillspec doctor skills/skillspec/ --json > doctor-reports/skillspec-doctor.json
          skillspec doctor skills/skillspec/ --html > doctor-reports/skillspec-doctor.html

          {
            cat doctor-reports/skillspec-doctor.md
            echo
            echo "---"
            echo
            echo "Artifacts:"
            echo "- \`skillspec-doctor.txt\`"
            echo "- \`skillspec-doctor.md\`"
            echo "- \`skillspec-doctor.json\`"
            echo "- \`skillspec-doctor.html\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload dogfood doctor reports
        uses: actions/upload-artifact@v4
        with:
          name: skillspec-doctor-dogfood
          path: doctor-reports/
          retention-days: 14
          if-no-files-found: error

      - name: Validate all examples
        shell: bash
        run: |
          while IFS= read -r spec; do
            cargo run --locked -p skillspec -- validate "${spec}"
          done < <(find examples -name '*.yml' | sort)

      - name: Run all example scenario tests
        shell: bash
        run: |
          while IFS= read -r spec; do
            cargo run --locked -p skillspec -- test "${spec}"
          done < <(find examples -name '*.yml' | sort)

      - name: Check all example dependencies
        shell: bash
        run: |
          while IFS= read -r spec; do
            cargo run --locked -p skillspec -- deps check "${spec}"
          done < <(find examples -name '*.yml' | sort)

      - name: Check conformance fixtures
        shell: bash
        run: |
          while IFS= read -r spec; do
            cargo run --locked -p skillspec -- validate "${spec}"
          done < <(find conformance/valid -name '*.yml' | sort)

          while IFS= read -r spec; do
            if cargo run --locked -p skillspec -- validate "${spec}"; then
              echo "invalid conformance fixture unexpectedly passed: ${spec}" >&2
              exit 1
            fi
          done < <(find conformance/invalid -name '*.yml' | sort)

  platform:
    name: Native build and tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked --workspace --all-targets

      - name: Build CLI
        run: cargo build --locked --workspace
